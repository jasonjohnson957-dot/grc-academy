        <div class="warning-box"><strong>The most dangerous assumption:</strong> "the cloud provider handles security." No provider handles all security, and no regulator accepts "the provider was responsible" as a defense when sensitive data is breached. ISO 27017 exists to formalize that shared responsibility is real, specific, and must be documented before go-live.</div>`,
        quiz:{ q:"A retailer on SaaS suffers a breach: the CSP's infrastructure was secure, but the customer never configured role-based access, so all employees could see all customer data. Who bears primary responsibility?", opts:["The CSP — they should prevent configuration errors","The customer — user access management within a SaaS app is a customer responsibility; the CSP can't know which employees should access which data","Shared equally","The SaaS provider for allowing misconfiguration"], ans:1, explain:"User access management within a SaaS app is a customer responsibility. The CSP secures the platform; the customer secures their use of it. ISO 27017's documentation requirements make these boundaries explicit before incidents." } },

      { title:"The 7 New CLD Controls", tagline:"Cloud-specific controls with no traditional-IT equivalent",
        body:`<p>ISO 27017 adds cloud security two ways: extended guidance for existing ISO 27002 controls, and <strong>7 new controls</strong> prefixed "CLD" that address situations that don't exist in traditional IT.</p>
        <div class="ctrl-new"><b>CLD.6.3.1 — Shared ICT Infrastructure</b><br>Multi-tenancy isolation — one customer's data and activities cannot impact another's.</div>
        <div class="ctrl-new"><b>CLD.8.1.1 — Roles &amp; Responsibilities</b><br>Clear, documented assignment of security roles for CSP and customer.</div>
        <div class="ctrl-new"><b>CLD.8.1.2 — Removal of Access Rights</b><br>Procedures for removing access when relationships end — data persists in the provider's infrastructure.</div>
        <div class="ctrl-new"><b>CLD.9.5.1 — Segregation in Virtual Environments</b> (CSP)<br>Hypervisor, network, and storage isolation between tenants.</div>
        <div class="ctrl-new"><b>CLD.9.5.2 — Virtual Machine Hardening</b> (CSP)<br>Hardening for VMs and the virtualization infrastructure.</div>
        <div class="ctrl-new"><b>CLD.12.4.5 — Monitoring of Cloud Services</b> (CSC)<br>Customer visibility into their cloud environment even when the provider manages the infrastructure.</div>
        <div class="ctrl-new"><b>CLD.13.1.4 — Virtual &amp; Physical Network Alignment</b> (CSP)<br>Virtual-network security equivalent to physical-network security.</div>`,
        quiz:{ q:"Why do the 'CLD' controls exist separately rather than as guidance within ISO 27002 controls?", opts:["Because ISO 27002 controls are too hard in cloud","Because they address cloud-specific situations — multi-tenancy, VM isolation, hypervisor security — that don't exist in traditional IT and have no ISO 27002 equivalent","Because providers prefer separate controls","Because CLD controls are mandatory and 27002 optional"], ans:1, explain:"The CLD controls address security scenarios created by virtualization and multi-tenancy that physically never existed before cloud — so they're introduced as distinct controls rather than extensions." } },

      { title:"Multi-Tenancy Isolation (CLD.6.3.1)", tagline:"Keeping every tenant separate in shared infrastructure",
        body:`<p><span class="key-term">CLD.6.3.1</span> addresses the core cloud challenge: when many organizations share the same physical or virtual infrastructure, they must remain isolated — the cloud equivalent of apartment residents who can't access each other's units despite shared walls and utilities.</p>
        <div class="highlight-box"><strong>What it requires:</strong> customers must not be aware of each other unless agreed, and one customer's activities cannot adversely affect another's security or availability — via logical data isolation, network segregation, access controls, and monitoring for attempted cross-tenant access.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Data Commingling</strong><span>Risk that one customer's data is returned to another's query — prevented by storage and database isolation.</span></div>
          <div class="cheat-pill"><strong>Noisy Neighbor</strong><span>One tenant consuming excessive resources and degrading others — managed by resource isolation and quotas.</span></div>
          <div class="cheat-pill"><strong>Side-Channel Attacks</strong><span>Attackers exploiting shared hardware (cache timing) to infer neighbors' data — mitigated by hardware-level isolation.</span></div>
          <div class="cheat-pill"><strong>VM Escape</strong><span>A compromised workload breaking out of isolation to reach the hypervisor or other VMs — countered by hardening (CLD.9.5.x).</span></div>
        </div>`,
        quiz:{ q:"A misconfiguration let one customer's database backups be stored where another customer's admins could read them. Which control was violated?", opts:["CLD.12.4.5 — Monitoring (a logging failure)","CLD.6.3.1 — Shared ICT Infrastructure, a data-commingling failure where tenant isolation broke down, exposing one customer's data to another","CLD.13.1.4 — Network security","An ISO 27002 access-control failure unrelated to 27017"], ans:1, explain:"CLD.6.3.1 governs tenant isolation in shared infrastructure. Exposing one customer's backups to another is exactly the multi-tenancy isolation failure it's designed to prevent — only possible in shared cloud environments." } }
    ]
  });

  F.push({ id:"iso27018", name:"ISO/IEC 27018", subtitle:"Protection of PII in Public Clouds",
    category:"ISO/IEC Standards", color:"#0f6e56", lessonsTotal:30, source:"ISO/ISO27018/iso27018_30day_curriculum.html",
    desc:"Privacy controls for protecting personal data (PII) processed in public cloud services.",
    days:[
      { title:"What Is ISO 27018?", tagline:"The first standard for protecting personal data in the cloud",
        body:`<p><span class="key-term">ISO/IEC 27018</span> (published 2014) is the first international standard focused on protecting <strong>Personally Identifiable Information (PII)</strong> in public cloud environments. It guides cloud providers acting as <em>processors</em> of personal data on behalf of their customers.</p>
        <div class="analogy-box"><strong>For executives:</strong> when you put customer personal data in a public cloud, ISO 27018 is the assurance that the provider handles it with privacy-specific safeguards — consent, transparency, data return and deletion, and crucially, no use of your customers' data for the provider's own advertising or product development.</div>
        <div class="highlight-box">It extends ISO 27002 with PII-specific guidance and additional privacy controls, and is the natural companion to ISO 27017 (cloud security) — together forming a complete cloud security-and-privacy package. It was deliberately aligned with the then-emerging GDPR.</div>`,
        quiz:{ q:"What does ISO 27018 specifically protect?", opts:["Network bandwidth","Personally identifiable information (PII) processed in public clouds","Source code","Physical buildings"], ans:1, explain:"ISO 27018 provides privacy controls for protecting PII handled by public cloud providers acting as processors — the first international standard dedicated to this." } },

      { title:"Why Was ISO 27018 Created?", tagline:"The privacy vacuum in cloud computing",
        body:`<p>By the early 2010s, organizations were moving vast amounts of personal data to the cloud with no international standard governing how providers should protect it. Privacy laws existed but were territorial, inconsistent, and didn't address the cloud processing relationship.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Cloud Opacity</strong><span>Once data goes to the cloud, the customer can't directly observe how it's handled — they needed verifiable assurance, not just contractual promises.</span></div>
          <div class="cheat-pill"><strong>Global Jurisdiction</strong><span>Cloud data is processed across many countries; one international standard was far more practical than dozens of national requirements.</span></div>
          <div class="cheat-pill"><strong>Procurement</strong><span>No common criteria existed to compare providers' privacy practices — every evaluation required custom questionnaires.</span></div>
          <div class="cheat-pill"><strong>GDPR Anticipation</strong><span>GDPR was in development; 27018 was designed to align with it, positioning adopters for 2018 compliance.</span></div>
        </div>
        <div class="analogy-box"><strong>The food-safety analogy:</strong> before food-safety certification, consumers couldn't evaluate a restaurant's handling practices. Certification gives a common, trusted benchmark. ISO 27018 does the same for cloud privacy.</div>`,
        quiz:{ q:"What gap did ISO 27018 fill when published in 2014?", opts:["It was the first standard to address cloud security","It was the first international standard dedicated to protecting PII in public cloud environments — a common framework for providers, customers, and regulators","It replaced GDPR","It specified cloud encryption algorithms"], ans:1, explain:"Security standards (27001/27002) and national privacy laws existed, but no international standard addressed the cloud PII-processor role specifically. ISO 27018 filled that gap." } },

      { title:"PII, Controllers, and Processors", tagline:"The roles and relationships ISO 27018 governs",
        body:`<p>ISO 27018's core concepts align closely with GDPR. <span class="key-term">PII</span> is any information that can directly or indirectly identify a person — when in doubt, treat data as PII.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>PII Principal</strong><span>The individual whose personal data is processed — whom ISO 27018 ultimately protects.</span></div>
          <div class="cheat-pill"><strong>PII Controller</strong><span>The organization that decides why and how data is processed — usually the cloud's business customer. Bears primary compliance responsibility.</span></div>
          <div class="cheat-pill"><strong>Public Cloud PII Processor</strong><span>The cloud provider that processes data on the controller's behalf, under the controller's instructions. The role ISO 27018 governs.</span></div>
          <div class="cheat-pill"><strong>The Processor Constraint</strong><span>Providers may only use PII for purposes the controller specified — never for their own marketing, product development, or other purposes.</span></div>
        </div>
        <div class="analogy-box"><strong>The accountant analogy:</strong> a business hires an accounting firm to process payroll. The business is the controller; the firm is the processor handling data under instruction. The firm can't use employees' bank details for its own purposes or share them with other clients. ISO 27018 applies this ethics to cloud providers.</div>`,
        quiz:{ q:"A marketing company stores customer data in a cloud CRM. Who is controller and who is processor?", opts:["The CRM platform is both","The marketing company is the PII controller (it decided to collect the data and how it's used); the cloud CRM is the PII processor (processing under the company's instructions)","The customers are joint controllers","The CRM is controller because the data resides there"], ans:1, explain:"The controller-processor distinction depends on who decides purpose and means — not where data resides. The marketing company decides; the CRM processes under instruction. ISO 27018 governs the CRM's processor obligations." } },

      { title:"ISO 27018's Nine Privacy Principles", tagline:"The organizing framework for cloud PII protection",
        body:`<p>ISO 27018 is organized around internationally recognized <span class="key-term">privacy principles</span> that generate concrete control requirements for cloud providers.</p>
        <div class="principle-card"><b>1. Consent &amp; Choice</b> — process PII only with controller authorization, never for the provider's own purposes without permission.</div>
        <div class="principle-card"><b>2. Purpose Legitimacy</b> — process only for specified, explicit, legitimate purposes the controller authorized.</div>
        <div class="principle-card"><b>3–4. Collection Limitation &amp; Data Minimization</b> — access and process the minimum PII necessary for the service.</div>
        <div class="principle-card"><b>5. Use, Retention &amp; Disclosure Limitation</b> — no unauthorized secondary use; retain only as long as necessary.</div>
        <div class="principle-card"><b>6. Accuracy &amp; Quality</b> — prevent unauthorized alteration; support correction.</div>
        <div class="principle-card"><b>7. Openness &amp; Transparency</b> — public policies, sub-processor and geographic disclosure, change notice.</div>
        <div class="principle-card"><b>8. Individual Participation</b> — build technical capabilities so controllers can fulfill data subject rights.</div>
        <div class="principle-card"><b>9. Accountability</b> — implement controls, demonstrate compliance, and remain accountable for sub-processors.</div>`,
        quiz:{ q:"A cloud provider realizes customer PII could improve its AI features. Under the Purpose Legitimacy principle, what must happen?", opts:["They may use it since they already have access","They must not use the PII for AI improvement without explicit authorization from the controllers — using customer data for the provider's own product development violates purpose limitation","They may use anonymized data for any purpose","They can proceed with a terms-of-service update"], ans:1, explain:"Cloud providers often have incentives to use platform data for their own development, but ISO 27018 prohibits this without explicit controller authorization, regardless of how valuable the data is." } },

      { title:"Consent and Lawful Processing", tagline:"No marketing, no ad profiling, no unauthorized use",
        body:`<p>In cloud processing, the legal basis flows from the individual to the <em>controller</em> (the cloud customer), not directly to the provider. So ISO 27018's consent controls govern the provider-customer relationship.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>No Processing Without Authorization</strong><span>Every processing activity must map to a purpose the controller specified; the provider can't initiate processing on its own.</span></div>
          <div class="cheat-pill"><strong>No Marketing Use</strong><span>Providers must not use stored customer PII to market their own services to those individuals.</span></div>
          <div class="cheat-pill"><strong>No Ad Profiling</strong><span>PII processed for customers must not be used to build advertising profiles or for ad targeting.</span></div>
          <div class="cheat-pill"><strong>Lawful Sub-Processing</strong><span>Sub-processors must be authorized by the controller and bound by the same privacy requirements.</span></div>
        </div>
        <div class="highlight-box"><strong>For executives:</strong> these are the clauses that prevent your cloud vendor from quietly monetizing your customers' data. This is exactly why "we updated our terms" is not a substitute for genuine controller authorization.</div>`,
        quiz:{ q:"A cloud productivity suite wants to train its AI on customer email content. Under ISO 27018, what's required first?", opts:["Improving the service is an implied purpose justifying it","Explicit authorization from each affected controller — training AI on email content is a purpose beyond the contracted service, not satisfied by a unilateral terms-of-service update","Only a privacy-policy notice","Authorization only if data is shared with third parties"], ans:1, explain:"Training AI on customer content is a separate processing purpose requiring explicit controller authorization. A provider updating its own terms is not controller authorization — the business must explicitly agree to this use of its employees' PII." } },

      { title:"Transparency and Notice Requirements", tagline:"What cloud providers must disclose about PII handling",
        body:`<p><span class="key-term">Transparency</span> converts "we protect your data" from an unverifiable claim into specific, checkable commitments.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Public Privacy Policy</strong><span>A publicly accessible policy describing actual (not aspirational) PII practices.</span></div>
          <div class="cheat-pill"><strong>Sub-Processor Disclosure</strong><span>Name all third-party sub-processors specifically — not "major cloud providers" — and notify customers of changes.</span></div>
          <div class="cheat-pill"><strong>Geographic Disclosure</strong><span>Disclose which countries PII is stored and processed in — essential for data-residency and export obligations.</span></div>
          <div class="cheat-pill"><strong>Government Access Notification</strong><span>Notify controllers of government requests for their PII, to the extent legally permitted.</span></div>
        </div>
        <div class="analogy-box"><strong>For executives:</strong> these disclosures are what let you answer your own regulators' questions — "where is our data, who touches it, and who has asked for it?" Without them, you can't fulfill your obligations as the controller.</div>`,
        quiz:{ q:"Why does ISO 27018 require providers to disclose the specific countries where PII is processed?", opts:["For marketing transparency","Because controllers can't meet their own data-residency, export, and jurisdiction obligations without knowing where their data physically is","To reduce the provider's costs","It's optional guidance"], ans:1, explain:"Geographic disclosure is essential because the controller remains responsible for compliance — and can't manage residency requirements or export restrictions without knowing where the cloud provider stores and processes the data." } }
    ]
  });

  F.push({ id:"iso27701", name:"ISO/IEC 27701", subtitle:"Privacy Information Management (PIMS)",
    category:"ISO/IEC Standards", color:"#0f6e56", lessonsTotal:30, source:"ISO/ISO27701/iso27701_30day_curriculum.html",
    desc:"Extends ISO 27001/27002 into a certifiable Privacy Information Management System.",
    days:[
      { title:"What Is ISO 27701?", tagline:"The world's first certifiable privacy management system standard",
        body:`<p><span class="key-term">ISO/IEC 27701</span> extends your ISO 27001 ISMS into a <strong>Privacy Information Management System (PIMS)</strong>. Published in 2019, it adds privacy-specific requirements and new privacy controls, and it maps directly to regulations like GDPR — giving organizations a certifiable way to prove their privacy program actually works.</p>
        <div class="analogy-box"><strong>For executives:</strong> 27701 lets an organization that already manages information security extend the same management discipline to privacy — and earn an independently audited certificate that demonstrates GDPR-aligned privacy governance to regulators and customers, rather than self-declared "we take privacy seriously."</div>
        <div class="highlight-box">It is an <strong>extension</strong>, not a standalone standard: you must have (or simultaneously implement) an ISO 27001 ISMS. It adds privacy requirements to every management clause, extends ISO 27002 controls with privacy guidance, and adds new controls for data controllers and processors.</div>`,
        quiz:{ q:"What does ISO 27701 add to ISO 27001?", opts:["Cloud cost controls","Privacy management requirements, turning an ISMS into a certifiable Privacy Information Management System (PIMS) that maps to laws such as GDPR","Physical security only","Nothing — they are identical"], ans:1, explain:"ISO 27701 extends ISO 27001/27002 with privacy-specific requirements and controls, creating a certifiable PIMS — the first standard to enable independent certification of privacy management." } },

      { title:"Why Was ISO 27701 Created?", tagline:"A fragmented privacy landscape that demanded a unified standard",
        body:`<p>By the mid-2010s, privacy had become a strategic imperative. GDPR was coming into force, and over 130 countries had privacy legislation — but no certifiable international standard existed to demonstrate systematic privacy management to regulators across jurisdictions.</p>
        <div class="highlight-box"><strong>The forces driving its creation:</strong> Regulatory proliferation (organizations running separate programs for GDPR, LGPD, PDPA, PIPL); the shift to accountability-based law (demonstrate effectiveness, not just follow rules); the efficiency of extending the widely-held ISO 27001 certification rather than building a parallel system; the need for consistent supplier privacy due diligence; and the "privacy theater" problem — writing policies and calling yourself compliant without real practices.</div>
        <div class="analogy-box"><strong>The unified electrical standard analogy:</strong> Before international electrical standards, every country used different voltages and plug shapes. A unified system let manufacturers design once and travelers rely on it. ISO 27701 does the same for privacy management across jurisdictions.</div>`,
        quiz:{ q:"What gap did ISO 27701 fill that frameworks like the NIST Privacy Framework or ISO 27018 could not?", opts:["They used outdated definitions of personal data","ISO 27701 provided a certifiable management system — enabling independent, third-party certification of privacy management, which guidance-only frameworks could not offer","They only covered healthcare","They were too technical to implement"], ans:1, explain:"The critical gap was the absence of a certifiable privacy management standard. Guidance frameworks could only be self-assessed; ISO 27701 created the first pathway for independent, accredited certification of a privacy program." } },

      { title:"The PIMS Concept", tagline:"The management-system approach that makes privacy sustainable",
        body:`<p>The central concept of ISO 27701 is the <span class="key-term">Privacy Information Management System (PIMS)</span> — a systematic, process-based approach to managing privacy risk, fundamentally different from a set of privacy policies.</p>
        <div class="highlight-box"><strong>Management system vs. policies:</strong> A privacy policy tells you what the organization intends to do. A PIMS tells you how it ensures it actually does so — consistently, measurably, and improvably. It includes the processes that implement policies, the controls that enforce them, the monitoring that verifies them, and the management review and improvement cycle. This is what certification verifies.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Plan-Do-Check-Act</strong><span>Built on the PDCA improvement cycle — privacy management is an ongoing capability, not a one-time implementation.</span></div>
          <div class="cheat-pill"><strong>Risk-Based</strong><span>Controls are calibrated to actual privacy risk — higher-risk processing gets more rigorous controls.</span></div>
          <div class="cheat-pill"><strong>Leadership Integration</strong><span>Privacy becomes a board and executive accountability, not a siloed compliance function.</span></div>
          <div class="cheat-pill"><strong>Continuous Improvement</strong><span>Maintained through annual surveillance audits and three-year recertification — static programs lose certification.</span></div>
        </div>`,
        quiz:{ q:"Two organizations: one has comprehensive privacy policies, the other has ISO 27701 certification. Which has stronger evidence of actual privacy management?", opts:["The policy organization — comprehensive policies are the foundation","The ISO 27701-certified organization — certification verifies privacy management is implemented through documented processes, monitored by audits, reviewed by management, and continuously improved; policies only describe intent","Both are equally strong","The policy organization — detailed policies are more specific"], ans:1, explain:"Policies document what an organization says it will do; certification verifies what it actually does — through implemented processes, active monitoring, and documented improvement. This is the privacy accountability modern regulation demands." } },

      { title:"ISO 27701 in the ISO Standards Family", tagline:"How it builds on and extends ISO 27001 and 27002",
        body:`<p>ISO 27701 is explicitly an <span class="key-term">extension</span> to ISO 27001 and 27002 — extending the world's most widely adopted security certification to add privacy coverage rather than creating a parallel system.</p>
        <div class="highlight-box"><strong>The mandatory prerequisite:</strong> You cannot achieve ISO 27701 certification without ISO 27001 (or implementing it simultaneously). Information security is the foundation on which privacy management is built — you cannot protect personal information's privacy without first securing the systems that hold it.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Extends ISO 27001</strong><span>Adds privacy-specific obligations to every management-system clause (context, leadership, risk, operation, evaluation, improvement).</span></div>
          <div class="cheat-pill"><strong>Extends ISO 27002</strong><span>Adds privacy-specific implementation guidance to each relevant security control.</span></div>
          <div class="cheat-pill"><strong>New Privacy Controls</strong><span>Annex B (controllers) and Annex C (processors) cover consent, data subject rights, purpose limitation, and privacy notices.</span></div>
          <div class="cheat-pill"><strong>Integrated Audit Advantage</strong><span>Because it's an extension, ISMS and PIMS can be audited together — dramatically cheaper than two separate programs.</span></div>
          <div class="cheat-pill"><strong>Annex D — GDPR Mapping</strong><span>A normative mapping between ISO 27701 controls and GDPR articles, letting certification serve as evidence of GDPR control implementation.</span></div>
        </div>`,
        quiz:{ q:"An organization wants ISO 27701 certification but has no ISO 27001. What must happen?", opts:["They can pursue ISO 27701 directly","They must implement ISO 27001 (or do it simultaneously) — ISO 27701 is an extension to ISO 27001, which provides the required management-system foundation","They can replace ISO 27001 with ISO 27002","They can do ISO 27701 first and add ISO 27001 later as optional"], ans:1, explain:"ISO 27701 modifies and extends every clause of ISO 27001 and requires its infrastructure — risk process, management review, internal audit, corrective action. ISO 27001 is the explicit prerequisite." } },

      { title:"PIC vs PIP — Controllers and Processors", tagline:"How ISO 27701 addresses both sides of personal data processing",
        body:`<p>ISO 27701 explicitly separates organizations that control personal data from those that process it on others' behalf, providing distinct control sets for <span class="key-term">Privacy Information Controllers (PICs)</span> and <span class="key-term">Privacy Information Processors (PIPs)</span>.</p>
        <div class="highlight-box"><strong>Why it matters:</strong> Controllers decide why and how personal information is used and bear primary accountability. Processors handle data on the controller's behalf, following instructions but with independent obligations to protect it. Many organizations are both — controllers for their own customer/employee data, processors for their clients' data.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>PIC — Controller</strong><span>Determines purposes and means (GDPR "controller"). Must establish lawful basis, obtain consent, fulfill data subject rights, conduct PIAs, and maintain records of processing. Governed by Annex B controls.</span></div>
          <div class="cheat-pill"><strong>PIP — Processor</strong><span>Processes only on the controller's instructions (GDPR "processor"). Must implement security, support rights requests, notify breaches, and not use sub-processors without authorization. Governed by Annex C controls.</span></div>
          <div class="cheat-pill"><strong>Both Roles</strong><span>A SaaS company is a PIC for its employees' HR data and a PIP for its customers' data. The PIMS covers both with the appropriate control sets.</span></div>
          <div class="cheat-pill"><strong>Shared Controls (Clause 7)</strong><span>Universal controls apply to all: limiting collection, accuracy, minimization, disposal, de-identification, and compliance monitoring.</span></div>
        </div>`,
        quiz:{ q:"A hospital uses patient data for treatment (PIC) and provides de-identified data to a pharma company for research under an agreement (PIP). What must its PIMS address?", opts:["Only PIC controls — healthcare orgs are always controllers","Both PIC and PIP control sets — PIC controls for its own treatment data, PIP controls for the research data it processes under instruction. Many organizations operate as both","Only PIP controls — pharma is the primary controller","It can choose one role to certify"], ans:1, explain:"ISO 27701 accommodates dual-role organizations. The hospital implements Annex B (controller) controls for treatment data and Annex C (processor) controls for the research data, with scope documenting which role applies where." } },

      { title:"PIC Controls — Lawful Basis and Consent", tagline:"The legal foundation for processing personal information",
        body:`<p>For controllers, the most foundational obligation is ensuring every processing activity has a valid <span class="key-term">lawful basis</span> — established and documented before processing begins.</p>
        <div class="highlight-box">ISO 27701 aligns with the six lawful bases: consent, contractual necessity, legal obligation, vital interests, public task, and legitimate interests. Organizations must identify the basis for each activity, document it in their Records of Processing Activities, and operate consent-management mechanisms where consent is the basis.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Consent Management</strong><span>Consent must be freely given, specific, informed, and unambiguous; recorded; as easy to withdraw as to give; and refreshed when purposes change.</span></div>
          <div class="cheat-pill"><strong>Records of Processing (RoPA)</strong><span>A documented inventory of all processing: purpose, data categories, individuals affected, legal basis, retention, recipients, and transfers.</span></div>
          <div class="cheat-pill"><strong>Purpose Specification</strong><span>Purposes must be specified before collection — a design constraint that limits what is collected, how long it's kept, and what it can be used for.</span></div>
          <div class="cheat-pill"><strong>No Secondary Use</strong><span>Data cannot be repurposed beyond its original purpose without a new lawful basis — a core privacy protection.</span></div>
        </div>`,
        quiz:{ q:"An organization collects emails for order confirmations (contractual necessity), then wants to add them to a marketing list. What must happen?", opts:["The original collection is sufficient for any internal use","Marketing requires a separate lawful basis — typically explicit consent. The contractual basis only covers the original purpose; marketing is a new, secondary purpose","Legitimate interests automatically covers marketing to existing customers","No basis is needed if disclosed in the privacy policy"], ans:1, explain:"Purpose limitation and secondary-use controls require a new lawful basis for marketing — usually opt-in consent. Adding customers to marketing lists from order data without separate consent likely violates ISO 27701 and privacy law." } },

      { title:"PIC Controls — Privacy Notices and Transparency", tagline:"Ensuring individuals know how their data is used",
        body:`<p>Transparency is foundational to privacy law and central to ISO 27701. <span class="key-term">Privacy notices</span> are the primary vehicle — and the standard requires far more than vague "we value your privacy" statements.</p>
        <div class="highlight-box"><strong>What's required:</strong> notices provided at or before collection (not buried in terms), in plain language, easy to navigate, covering who collects the data, what is collected, why, on what legal basis, who it's shared with, retention period, individual rights, international transfers, and how to exercise rights.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Layered Notice</strong><span>A short prominent first layer with key facts, linking to full detail — brief yet comprehensive.</span></div>
          <div class="cheat-pill"><strong>Just-in-Time Notice</strong><span>Contextual notice at the moment data is collected (e.g., when enabling location), improving genuine informed decisions.</span></div>
          <div class="cheat-pill"><strong>Notice of Changes</strong><span>Material changes require proactive updated notice — not just quietly editing a web page.</span></div>
          <div class="cheat-pill"><strong>Children's Privacy</strong><span>Enhanced notice and parental-consent mechanisms where data is collected from children.</span></div>
        </div>`,
        quiz:{ q:"A privacy notice is a comprehensive 15-page legal document linked at the bottom of the homepage. What may still be inadequate under ISO 27701?", opts:["Nothing — comprehensive coverage satisfies transparency","Format and accessibility — ISO 27701 requires plain language, easy navigation, and notice at collection; a 15-page legal document at the page bottom isn't genuinely accessible even if technically complete","Only the length — notices must be one page","Only the link location"], ans:1, explain:"Transparency means individuals genuinely understand how their data is used — not that a document technically contains all disclosures. Plain language, layered and just-in-time notices, and navigable formats are required." } },

      { title:"PIC Controls — Data Subject Rights", tagline:"Implementing the rights individuals have over their data",
        body:`<p>ISO 27701 requires controllers to implement operationally effective processes for fulfilling <span class="key-term">data subject rights</span> — not just policy commitments, but real systems that deliver responses within required timeframes.</p>
        <div class="highlight-box"><strong>The operational challenge:</strong> fulfilling rights requires finding all of an individual's data across all systems (access), correcting it everywhere (rectification), deleting it completely including backups (erasure), restricting processing, and exporting it in portable formats. Each needs both technical capability and process — in place before requests arrive.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Access</strong><span>Produce what data is held, why, with whom shared, and retention — within regulatory timelines (one month under GDPR) across all systems.</span></div>
          <div class="cheat-pill"><strong>Rectification</strong><span>Correct inaccurate data everywhere it's held, including at processors who received it.</span></div>
          <div class="cheat-pill"><strong>Erasure</strong><span>Actual removal from all systems including backups — not just marking records inactive. Many discover they can't fully erase.</span></div>
          <div class="cheat-pill"><strong>Portability</strong><span>Provide data in structured, machine-readable formats a receiving organization can use.</span></div>
        </div>`,
        quiz:{ q:"An erasure request arrives; the person's data is in the main database, an 18-month-old backup, and a data warehouse where it was 'de-identified.' What must be addressed?", opts:["Only the main database — backups and de-identified data are exempt","All three: delete from the main database, develop a backup-deletion process, and assess whether the 'de-identified' data is truly anonymous — if re-identification is possible, it remains personal data and must be addressed","Backups are exempt if deletion is hard","De-identified data is always exempt"], ans:1, explain:"Erasure applies to all copies. 'Technically difficult' is not an exemption — backups need a deletion process. And if experts could re-identify the analytics data, it retains personal-data status. Organizations often find their de-identification is weaker than assumed." } }
    ]
  });

  F.push({ id:"iso42001", name:"ISO/IEC 42001", subtitle:"AI Management Systems",
    category:"ISO/IEC Standards", color:"#0f6e56", lessonsTotal:30, source:"ISO/ISO42001/iso42001_30day_curriculum.html",
    desc:"The world's first certifiable management system standard for responsible Artificial Intelligence.",
    days:[
      { title:"What Is ISO 42001?", tagline:"The world's first management system standard for responsible AI",
        body:`<p>ISO 42001 is the world's first international standard specifically designed for <strong>AI Management Systems</strong>. Its full name is <em>ISO/IEC 42001:2023 — Information technology — Artificial intelligence — Management system</em>, published in <strong>December 2023</strong>.</p>
        <div class="analogy-box"><strong>Real-world analogy:</strong> Think of ISO 42001 like a driver's education program for organizations using AI. It doesn't tell them which car to drive — it teaches them how to drive responsibly: identifying risks, setting policies, training staff, and making sure AI is used fairly and safely.</div>
        <p>It defines requirements for an <span class="key-term">AIMS</span> — an Artificial Intelligence Management System. The word "management system" is key: this isn't a one-time checklist but an ongoing organizational process that improves over time.</p>
        <div class="highlight-box">It applies to any organization — any size, industry, or location — that develops, provides, or uses AI. A hospital using AI for diagnosis, a bank using AI for loan decisions, a government agency processing claims, a startup building AI tools — all are in scope.</div>`,
        quiz:{ q:"What does AIMS stand for in ISO 42001?", opts:["Automated Intelligence Management Software","Artificial Intelligence Management System","AI Inspection and Monitoring Standard","Advanced IT Management Structure"], ans:1, explain:"AIMS is an Artificial Intelligence Management System — an ongoing organizational process to govern how AI is developed, deployed, and used responsibly." } },

      { title:"Why Was ISO 42001 Created?", tagline:"The AI governance gap that demanded a global solution",
        body:`<p>By the early 2020s, AI was being deployed in life-changing decisions — who gets a job, who gets a mortgage, how a diagnosis is made — yet there was no globally accepted standard for governing these systems.</p>
        <div class="highlight-box"><strong>The problem:</strong> organizations were using AI in high-stakes situations with no common baseline for safety, fairness, transparency, or accountability. Different countries had different rules, and there was no way to independently verify whether an organization was actually governing AI responsibly.</div>
        <div class="badge-row">
          <span class="badge badge-teal">High-profile AI bias in hiring, lending, criminal justice</span>
          <span class="badge badge-teal">Regulatory pressure — EU AI Act, US Executive Orders</span>
          <span class="badge badge-teal">Customers demanding proof of responsible AI</span>
          <span class="badge badge-teal">No common global vocabulary for AI governance</span>
        </div>
        <div class="analogy-box"><strong>Think of it this way:</strong> Before international food safety standards, "safe" food in one country might be dangerous in another. ISO created universal standards so "safe food" means the same everywhere. ISO 42001 does the same for AI — a globally shared understanding of what "responsibly managed AI" looks like.</div>`,
        quiz:{ q:"What core problem was ISO 42001 created to solve?", opts:["AI systems were running too slowly","There was no globally accepted standard for how organizations should govern AI responsibly","AI was too expensive for small businesses","Programmers needed better coding guidelines"], ans:1, explain:"ISO 42001 addresses the absence of a globally accepted, verifiable framework for AI governance — without it there was no universal definition of 'responsibly managed AI.'" } },

      { title:"The High-Level Structure — Familiar If You Know ISO 27001", tagline:"Why ISO 42001 fits neatly alongside your other ISO standards",
        body:`<p>ISO 42001 follows ISO's <span class="key-term">High-Level Structure (HLS)</span> — the same 10-clause skeleton used by ISO 27001 (security), ISO 9001 (quality), and ISO 14001 (environment). Only the requirements within each clause differ.</p>
        <div class="highlight-box">The 10 clauses: 1–3 Introduction (not auditable); 4 Context of the Organization; 5 Leadership; 6 Planning; 7 Support; 8 Operation; 9 Performance Evaluation; 10 Improvement. Plus Annex A: AI-specific controls.</div>
        <div class="analogy-box"><strong>Why this matters enormously:</strong> If your organization already has ISO 27001, you already have the infrastructure — policies, audit processes, management review cadence, documentation — to implement ISO 42001. The content differs, but the frame is identical, so adoption is much faster.</div>`,
        quiz:{ q:"Why is the High-Level Structure valuable for an ISO 27001-certified organization?", opts:["ISO 27001 automatically grants ISO 42001 certification","Both use the same 10-clause framework, so the organization already has the management infrastructure and adds AI-specific content to a familiar structure","The HLS removes the need for external audits","ISO 27001 already covers all AI requirements"], ans:1, explain:"The HLS means ISO 42001 reuses the same management-system framework. Organizations with ISO 27001 add AI-specific content to existing governance infrastructure." } },

      { title:"The PDCA Cycle — The Engine of Improvement", tagline:"Plan, Do, Check, Act — the loop that makes it a system, not a document",
        body:`<p>At the heart of ISO 42001 is the <span class="key-term">PDCA cycle</span>: Plan, Do, Check, Act — the loop that drives continuous improvement.</p>
        <div class="pdca-grid">
          <div class="pdca-plan"><strong style="color:#0C447C">PLAN (Clauses 4,5,6)</strong><br><span style="font-size:12px">Understand context and stakeholders. Set AI policy. Identify risks. Define objectives and controls.</span></div>
          <div class="pdca-do"><strong style="color:#085041">DO (Clauses 7,8)</strong><br><span style="font-size:12px">Provide resources, train people, execute operational controls, manage the AI lifecycle.</span></div>
          <div class="pdca-check"><strong style="color:#633806">CHECK (Clause 9)</strong><br><span style="font-size:12px">Monitor, measure, internal audit, management review — verify the system works.</span></div>
          <div class="pdca-act"><strong style="color:#501313">ACT (Clause 10)</strong><br><span style="font-size:12px">Address nonconformities, correct problems, improve — then plan the next iteration.</span></div>
        </div>
        <div class="highlight-box">PDCA is why ISO 42001 is a management <em>system</em>, not just a policy. A policy sits on a shelf; a system loops continuously — planning, executing, measuring itself, and improving. That self-correcting loop is what keeps it effective as AI evolves.</div>`,
        quiz:{ q:"An internal audit finds the AI bias-monitoring process isn't working; the team fixes it and updates controls. Which PDCA phase is the 'fixing'?", opts:["Plan — designing a solution","Do — implementing the fix","Check — verifying the problem","Act — taking corrective action based on findings"], ans:3, explain:"Act turns Check-phase findings into improvements; correcting the process and improving the system is the Act phase, which then begins the next Plan cycle." } },

      { title:"Key Roles in ISO 42001", tagline:"Provider, operator, customer — who does what with AI",
        body:`<p>ISO 42001 defines roles organizations can play in the AI ecosystem; its requirements differ depending on which role(s) you occupy.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>AI Provider</strong><span>Develops an AI system and makes it available to others — responsible for design, training, testing, and documentation. E.g., a company building a medical-diagnosis AI.</span></div>
          <div class="cheat-pill"><strong>AI Operator (Deployer)</strong><span>Deploys and uses an AI system in a product or service — responsible for appropriate use and monitoring outcomes. E.g., a hospital deploying a third-party diagnostic AI.</span></div>
          <div class="cheat-pill"><strong>AI Customer (End User)</strong><span>Ultimately uses the AI-powered service and is affected by its outputs — e.g., a patient whose diagnosis is influenced by AI.</span></div>
          <div class="cheat-pill"><strong>Dual Roles</strong><span>Many organizations are both Provider and Operator. ISO 42001 applies to all roles an organization plays.</span></div>
        </div>
        <div class="analogy-box"><strong>Car-industry analogy:</strong> A manufacturer (Provider) builds a car with self-driving features. A rental company (Operator) puts it in their fleet. The renter (Customer) uses the feature. Each has different responsibilities — build safely, maintain and train, use appropriately.</div>`,
        quiz:{ q:"A fintech startup uses a third-party AI model to power loan decisions. What role does it play?", opts:["Only AI Provider — it builds the loan product","Only AI Customer — it uses someone else's AI","AI Operator — it deploys and uses the third-party AI in its service and is accountable for how it's used","Neither — fintechs are exempt"], ans:2, explain:"The startup is an AI Operator: it deploys an AI built by a Provider and is accountable for how that AI is used in its service, even though it didn't build the model." } },

      { title:"Clause 4 — Context and AI Risk", tagline:"Knowing your environment before you govern your AI",
        body:`<p><span class="key-term">Clause 4</span> is where the AIMS begins: understanding the internal and external forces that affect AI governance, before designing controls.</p>
        <div class="clause-card"><b>Clause 4.1 — Understanding the Organization and Its Context</b> — determine the external and internal factors relevant to the AIMS's intended outcomes.</div>
        <div class="badge-row">
          <span class="badge badge-teal">Regulatory environment (EU AI Act, GDPR, national AI laws)</span>
          <span class="badge badge-teal">Industry standards and customer expectations</span>
          <span class="badge badge-teal">Public trust and social attitudes toward AI</span>
          <span class="badge badge-teal">The evolving AI technology landscape</span>
        </div>
        <div class="highlight-box"><strong>AI impact assessments:</strong> A defining feature of ISO 42001 is requiring organizations to assess how AI systems could affect individuals and society — bias, safety, privacy, and fairness — not just the organization's own risk. (ISO 42005 provides detailed guidance on performing these assessments.)</div>
        <div class="analogy-box"><strong>Context changes everything:</strong> An AIMS for a bank's credit-scoring model looks very different from one for a hospital's diagnostic tool — different regulations, affected populations, and consequences. Context analysis ensures the AIMS is built for your actual risks, not a generic template.</div>`,
        quiz:{ q:"What distinguishes ISO 42001's risk approach from a traditional security risk assessment?", opts:["It only considers financial risk","It requires assessing AI's impact on individuals and society — bias, safety, fairness — not just risk to the organization","It ignores regulation","It only applies to generative AI"], ans:1, explain:"ISO 42001 requires considering impacts on people and society (fairness, safety, privacy), a broader lens than traditional organization-centric risk — operationalized through AI impact assessments." } }
    ]
  });

  F.push({ id:"iso42005", name:"ISO/IEC 42005", subtitle:"AI System Impact Assessment",
    category:"ISO/IEC Standards", color:"#0f6e56", lessonsTotal:30, source:"ISO/ISO42005/iso42005_30day_curriculum.html",
    desc:"Guidance for conducting AI system impact assessments — a core tool for AI governance.",
    days:[
      { title:"What Is ISO 42005?", tagline:"The first international standard for AI impact assessment",
        body:`<p><span class="key-term">ISO/IEC 42005</span> provides requirements and guidance for conducting an <strong>AI System Impact Assessment (AISIA)</strong> — a structured way to evaluate how an AI system affects individuals, groups, communities, society, and the environment. Published in 2025, it is the first dedicated international standard for AI impact assessment methodology.</p>
        <div class="analogy-box"><strong>Real-world analogy:</strong> Think of ISO 42005 like the environmental impact assessment required before a major construction project. Before building a highway, developers must assess what species, communities, and water quality will be affected — the full picture of consequences, not just intended benefits. ISO 42005 does the same for AI.</div>
        <div class="highlight-box">It addresses impacts on individuals, groups, society, and the environment; works alongside ISO 42001 (AI management system) and ISO 23894 (AI risk management); and supports compliance with the EU AI Act and other regulations requiring impact assessment.</div>`,
        quiz:{ q:"What makes ISO 42005 historically distinctive compared to ISO 42001?", opts:["It is the first AI standard to address cybersecurity of AI","It is the first dedicated standard providing methodology for assessing AI's real-world impacts on individuals, groups, society, and the environment — beyond internal organizational risk","It is the first AI standard published by ISO/IEC","It provides the first definition of artificial intelligence"], ans:1, explain:"ISO 42005 focuses on external impact — what AI does to the world outside the deploying organization — whereas earlier standards addressed internal concerns like management (42001) and risk (23894)." } },

      { title:"Why Was ISO 42005 Created?", tagline:"The AI impact gap that demanded an international standard",
        body:`<p>By the early 2020s, AI was powering consequential decisions in healthcare, finance, criminal justice, and employment. High-profile harms were documented, and regulators were moving toward mandatory impact assessments — but there was no internationally recognized, rigorous methodology for conducting one.</p>
        <div class="highlight-box"><strong>The forces driving it:</strong> documented AI harms (biased facial recognition, discriminatory hiring and lending, healthcare tools underestimating Black patients' pain); regulatory momentum (EU AI Act fundamental-rights impact assessments, US AI Executive Order); a risk-management gap (existing frameworks centered the organization, not affected people); and the practitioner need for a credible, consensus methodology.</div>
        <div class="analogy-box"><strong>The clinical trial analogy:</strong> Before a drug reaches patients, it must pass trials proving benefits outweigh harms — no regulator accepts the manufacturer's self-assessment. ISO 42005 begins the same journey for AI: requiring structured assessment of potential harms before and during deployment, not just assertions of benefit.</div>`,
        quiz:{ q:"What limitation of existing AI risk frameworks (like ISO 23894) does ISO 42005 address?", opts:["They were too complex for small organizations","They primarily addressed risks to the deploying organization, not impacts on individuals and communities affected by AI decisions — ISO 42005 centers those external affected parties","They ignored technical performance metrics","They only applied to healthcare AI"], ans:1, explain:"Organizational risk asks 'what could go wrong for us?'; impact assessment asks 'what could go wrong for the people our AI affects?' A credit AI may pose little organizational risk while causing severe individual harm — exactly what 42005 is designed to surface." } },

      { title:"The AI Standards Ecosystem — Where ISO 42005 Fits", tagline:"How it works alongside ISO 42001 and the EU AI Act",
        body:`<p>ISO 42005 is part of the ISO/IEC SC 42 family of AI standards. Understanding how it relates to the others is key to implementing it and connecting it to regulation.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>ISO 22989 — Concepts & Terminology</strong><span>The vocabulary standard defining fundamental AI terms used across the family.</span></div>
          <div class="cheat-pill"><strong>ISO 23894 — AI Risk Management</strong><span>Risks from the organization's perspective. ISO 42005 complements it by focusing on external affected parties.</span></div>
          <div class="cheat-pill"><strong>ISO 42001 — AI Management System</strong><span>The certifiable governance system. The 42005 impact assessment is a key process within a 42001 AIMS.</span></div>
          <div class="cheat-pill"><strong>NIST AI RMF</strong><span>Compatible methodology; 42005 assessments can satisfy NIST AI RMF measurement requirements.</span></div>
          <div class="cheat-pill"><strong>EU AI Act</strong><span>42005 provides a recognized methodology for the fundamental-rights and conformity assessments high-risk systems require.</span></div>
        </div>
        <div class="analogy-box"><strong>Architectural drawings:</strong> ISO 22989 is the legend (vocabulary), 42001 the structural drawings (management system), 23894 the load-bearing analysis (organizational risk), and 42005 the environmental impact study (how the building affects everyone around it).</div>`,
        quiz:{ q:"An engineer says 'We already do ISO 23894 risk management — we don't need ISO 42005.' What does this miss?", opts:["ISO 42005 replaces ISO 23894","ISO 23894 manages risk from the organization's view; ISO 42005 assesses impacts on people outside the organization — a different question. An org can have great internal risk management while its AI harms communities","ISO 42005 is only for EU organizations","ISO 23894 already covers impact assessment"], ans:1, explain:"The two are complementary: risk management protects the organization; impact assessment centers affected people. A hiring algorithm may pose minimal organizational risk while screening out protected groups — a gap 42005 is built to find." } },

      { title:"Core Concepts — AI Systems and the Parties They Affect", tagline:"The vocabulary that makes meaningful impact assessment possible",
        body:`<p>Before assessing impacts, practitioners need a clear framework for what AI systems are and who they affect.</p>
        <div class="highlight-box"><strong>What counts as an AI system:</strong> a machine-based system that, for given objectives, makes predictions, recommendations, decisions, or content influencing environments — covering ML classifiers, generative AI, LLMs in workflows, and AI embedded in larger products. The breadth is deliberate.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>AI Provider</strong><span>Develops and makes the AI available; responsible for impacts inherent in its design and training data.</span></div>
          <div class="cheat-pill"><strong>AI Deployer</strong><span>Uses the AI in a specific context; determines the use case, affected population, and stakes — often closest to affected parties.</span></div>
          <div class="cheat-pill"><strong>Directly Affected Parties</strong><span>Those directly subject to AI decisions — job applicants, patients, loan applicants. The primary focus of assessment.</span></div>
          <div class="cheat-pill"><strong>Indirectly Affected Parties</strong><span>Families, communities, and society experiencing knock-on effects without direct interaction.</span></div>
        </div>`,
        quiz:{ q:"A bank's AI rejects a mortgage applicant. Who is directly vs. indirectly affected under ISO 42005?", opts:["Only the bank — applicants consent by applying","Directly: the applicant (subject to the decision). Indirectly: their family, the neighborhood's housing access, and communities if the AI systematically denies loans in certain areas (redlining-like effects). Both must be assessed","Only the applicant — the bank bears all risk","The bank and applicant equally"], ans:1, explain:"42005 distinguishes direct and indirect impacts because both matter. At scale, patterns in AI mortgage decisions can replicate discriminatory lending — impacts an assessment limited to the direct applicant would miss." } },

      { title:"The AISIA Framework — What ISO 42005 Requires", tagline:"The structure of an AI System Impact Assessment",
        body:`<p>An <span class="key-term">AI System Impact Assessment (AISIA)</span> is a structured, evidence-based process for identifying, analyzing, evaluating, and addressing an AI system's potential impacts on all affected parties — not a checklist or a form.</p>
        <div class="highlight-box">It is distinguished by comprehensiveness (all impact types), an external perspective (centering affected parties), lifecycle integration (before, during, and on change), documentation and accountability (an auditable record), and proportionality (depth matched to stakes).</div>
        <div class="step-card"><b>1 — Context Establishment</b><br>Define the AI system, its use context, assessment scope, stakeholders, and evaluation criteria.</div>
        <div class="step-card"><b>2 — Impact Identification</b><br>Systematically surface all potential impacts on all affected parties, including non-obvious and long-term effects.</div>
        <div class="step-card"><b>3 — Impact Analysis</b><br>Assess each impact's likelihood and severity, considering reversibility and the vulnerability of affected parties.</div>
        <div class="step-card"><b>4 — Impact Evaluation & Treatment</b><br>Decide which impacts require mitigation, which are acceptable, and which may require not deploying — with documented rationale.</div>
        <div class="step-card"><b>5 — Documentation & Communication</b><br>Maintain assessment records, communicate findings, and establish ongoing monitoring and reassessment.</div>`,
        quiz:{ q:"An org runs an AISIA before launching a hiring tool, mitigates some biases, and calls it done. What key element is omitted?", opts:["Nothing — a pre-deployment assessment satisfies ISO 42005","Lifecycle integration — 42005 requires ongoing assessment during operation. Mitigations may fail, bias may emerge with real applicant data, and context may change; the AISIA must continue through the system's operational life","Only documentation is missing","External auditors were required for the initial assessment"], ans:1, explain:"AI behaves differently in production than in testing. 42005's lifecycle requirement means the initial assessment is the beginning, not the end — ongoing reassessment is mandatory." } },

      { title:"Scoping an AI System Impact Assessment", tagline:"Defining what the assessment covers and how deep it goes",
        body:`<p>The <span class="key-term">scope</span> determines what's included, which parties are considered, which impact dimensions are examined, and how deeply — the most consequential design decision. Too narrow misses critical impacts; too broad never gets completed.</p>
        <div class="highlight-box"><strong>The proportionality principle:</strong> depth should match the significance of potential impacts. Deeper assessment is warranted for decisions affecting legal rights or essential services, large affected populations, irreversible decisions, vulnerable groups, novel technology, and high-stakes domains (healthcare, criminal justice, finance, public benefits).</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Deployment Context</strong><span>The same model has different impacts for creative writing vs. medical advice — scope must define intended use and foreseeable misuse.</span></div>
          <div class="cheat-pill"><strong>Affected Party Scope</strong><span>Which parties are in scope; exclusions must be justified, and vulnerable/marginalized groups explicitly considered.</span></div>
          <div class="cheat-pill"><strong>Impact Dimensions</strong><span>Individual (privacy, discrimination, dignity), group, societal (democracy, labor), and environmental impacts.</span></div>
          <div class="cheat-pill"><strong>Temporal Scope</strong><span>Short-, medium-, and long-term systemic effects across relevant time horizons.</span></div>
        </div>`,
        quiz:{ q:"An AISIA for a content-moderation AI is scoped to assess only registered users. Researchers later show it suppresses minority political speech, harming civic participation. What failed?", opts:["The scope was appropriate","The affected-party scope was too narrow — moderation affects non-users seeking information, journalists, political organizations, and democratic processes. 42005 requires considering all affected parties and flags democratic processes as a societal dimension","Scope should have been privacy-only","Content moderation is exempt"], ans:1, explain:"Limiting scope to registered users is a classic 'too narrow' failure — it misses the most significant societal impacts, which 42005 explicitly requires assessing." } },

      { title:"Identifying Stakeholders and Affected Parties", tagline:"Mapping everyone with a stake in the AI's outcomes",
        body:`<p>An assessment can only examine impacts on parties it has identified — so systematic, documented identification is foundational. Human tendency is to think first of visible, vocal stakeholders, while AI harms often fall hardest on less visible parties.</p>
        <div class="step-card"><b>1 — Functional Role Mapping</b><br>Map parties by relationship: providers, deployers, operators, direct subjects, and indirectly affected parties.</div>
        <div class="step-card"><b>2 — Domain-Specific Analysis</b><br>Identify parties typical to the domain (healthcare: patients, clinicians, payers; criminal justice: defendants, communities, courts).</div>
        <div class="step-card"><b>3 — Vulnerability Assessment</b><br>Flag parties with power or information asymmetry, economic vulnerability, marginalization, or limited recourse.</div>
        <div class="step-card"><b>4 — Temporal Analysis</b><br>Consider how the affected landscape changes as deployment scales beyond early adopters.</div>
        <div class="step-card"><b>5 — Participatory Identification</b><br>Involve affected communities, who often identify impacts outside experts' view.</div>
        <div class="analogy-box"><strong>Traffic impact analogy:</strong> A new road's assessment covers not just motorists but pedestrians, cyclists, residents on redirected roads, businesses, and emergency services. AI impact assessment requires the same comprehensive identification.</div>`,
        quiz:{ q:"An AISIA for predictive policing identifies only police leadership, officers, IT staff, and researchers. What's omitted?", opts:["Nothing — these cover all stakeholders","The most affected parties: the communities being policed, individuals subject to AI-driven enforcement, civil rights organizations, defense attorneys, and historically overpoliced communities bearing disproportionate error risk","Criminal justice is exempt from identification","External parties are identified only after deployment"], ans:1, explain:"Identifying only the deploying organization's staff omits the primary affected parties. 42005 requires centering affected parties — for predictive policing, the policed communities are the most important to assess." } }
    ]
  });

  // ---------- NIST FRAMEWORKS ----------
  F.push({ id:"nist-csf", name:"NIST CSF 2.0", subtitle:"Cybersecurity Framework 2.0",
    category:"NIST Frameworks", color:"#1f3a4d", lessonsTotal:30, source:"NIST/NIST Cybersecurity Framework (CSF) 2.0/nist_csf20_30day_curriculum.html",
    desc:"The most widely adopted voluntary cybersecurity framework — now with Govern at its core.",
    days:[
      { title:"What Is the NIST Cybersecurity Framework?", tagline:"The US government's voluntary blueprint for managing cybersecurity risk",
        body:`<p>Imagine you're the newly appointed Chief Information Security Officer at a regional hospital. You've inherited a patchwork of security tools, policies nobody reads, and an incident response plan that's four years out of date. Your CEO asks: "Are we secure? Where are we most vulnerable? What should we tackle first?" You need a structured, repeatable way to answer those questions — and that's exactly what the <span class="key-term">NIST Cybersecurity Framework</span> was built to provide.</p>
        <p>The NIST CSF — officially <strong>NIST Cybersecurity Framework 2.0</strong> — is a voluntary framework published by the <strong>National Institute of Standards and Technology (NIST)</strong>, a US federal agency. Released in <strong>February 2024</strong>, CSF 2.0 is the most significant update since the framework first appeared in 2014. It gives organizations of any size, in any sector, a common language and structured approach for managing cybersecurity risk.</p>
        <div class="analogy-box"><strong>Real-world analogy:</strong> Think of NIST CSF like a GPS for cybersecurity. It doesn't tell you which car to drive — it helps you understand where you are now (current posture), where you need to be (target state), and the best route between them (improvement roadmap). The framework is the navigation tool; the destination depends on your organization.</div>
        <div class="highlight-box">Key facts: Published February 2024. Voluntary (though referenced in many regulations and contracts). Applies to organizations of all sizes and sectors. Built around 6 core Functions: GOVERN, IDENTIFY, PROTECT, DETECT, RESPOND, RECOVER. Free at nist.gov. The most widely referenced cybersecurity framework in the US, and increasingly global.</div>
        <p>Unlike compliance-driven frameworks like HIPAA or CMMC that specify controls you <em>must</em> implement, NIST CSF is outcome-focused — it describes what security outcomes to achieve, not the specific technology or process used to achieve them.</p>`,
        quiz:{ q:"What is the primary purpose of the NIST Cybersecurity Framework 2.0?", opts:["To mandate specific security controls all US companies must implement","To provide a common language and structured approach for managing cybersecurity risk — current state, target, and improvement plan","To certify cybersecurity professionals","To replace HIPAA and other sector-specific regulations"], ans:1, explain:"NIST CSF provides a common language and structured approach for managing cybersecurity risk. It is voluntary, flexible, and outcome-focused rather than prescriptive." } },

      { title:"Why Was NIST CSF Created?", tagline:"The executive order and national security crisis that sparked a new approach",
        body:`<p>NIST CSF emerged from a genuine national security crisis. By the early 2010s, critical infrastructure across the US — power grids, water treatment, financial networks — was being probed and attacked by sophisticated adversaries, and the country had no unified approach to defending it.</p>
        <div class="highlight-box"><strong>Executive Order 13636 (February 2013):</strong> President Obama signed "Improving Critical Infrastructure Cybersecurity" in response to escalating threats. It directed NIST to collaborate with industry to develop a voluntary framework. The result, published February 2014, was NIST CSF 1.0.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Fragmented Approaches</strong><span>Every sector and company had different approaches — no common language for risk or consistent way to measure posture.</span></div>
          <div class="cheat-pill"><strong>Critical Infrastructure Vulnerability</strong><span>Attacks on power grids and financial networks showed infrastructure failures could have catastrophic, cascading national consequences.</span></div>
          <div class="cheat-pill"><strong>Small Organization Gap</strong><span>Smaller companies had no accessible, authoritative starting point for a cybersecurity program.</span></div>
          <div class="cheat-pill"><strong>Public-Private Partnership</strong><span>Most critical infrastructure is privately owned — improving it required a voluntary framework, not heavy-handed regulation.</span></div>
        </div>
        <div class="analogy-box"><strong>The building code analogy:</strong> Building codes created a common minimum standard not by limiting innovation, but by defining what all buildings must achieve for safety. NIST CSF did the same for cybersecurity — defining outcomes organizations should achieve rather than dictating technology choices.</div>`,
        quiz:{ q:"Which executive order directly led to NIST CSF 1.0 in 2014?", opts:["EO 14028 — Improving the Nation's Cybersecurity (2021)","EO 13636 — Improving Critical Infrastructure Cybersecurity (2013)","EO 12333 — Intelligence Activities","EO 13800 — Strengthening Cybersecurity of Federal Networks"], ans:1, explain:"EO 13636 (February 2013) directed NIST to develop a voluntary cybersecurity framework for critical infrastructure, leading directly to CSF 1.0 in 2014." } },

      { title:"NIST — Who Makes This Framework?", tagline:"The agency behind America's most trusted cybersecurity standards",
        body:`<p>The <span class="key-term">National Institute of Standards and Technology (NIST)</span> is a non-regulatory federal agency inside the US Department of Commerce. Founded in 1901, it promotes innovation through measurement science, standards, and technology. It cannot write laws — but its standards are among the most influential technical documents in the world.</p>
        <div class="highlight-box">Beyond the CSF, NIST publishes the Special Publications (SP) 800 series — detailed technical guides used by US government and widely adopted globally. "NIST 800-53" and "NIST 800-171" refer to this series.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>NIST CSF</strong><span>Voluntary, outcome-focused, for all organizations — the "what to achieve" document.</span></div>
          <div class="cheat-pill"><strong>NIST SP 800-53</strong><span>Security and privacy controls for federal systems — the comprehensive control catalog.</span></div>
          <div class="cheat-pill"><strong>NIST SP 800-171</strong><span>Protecting CUI in nonfederal systems — the basis for CMMC Level 2.</span></div>
          <div class="cheat-pill"><strong>NIST AI RMF</strong><span>AI Risk Management Framework (2023) — the AI companion to CSF.</span></div>
        </div>
        <div class="analogy-box"><strong>Why "non-regulatory" still means mandatory in practice:</strong> NIST cannot write laws — but its voluntary standards become effectively mandatory when incorporated by reference into regulations. HIPAA references NIST guidance; CMMC is built on SP 800-171; FISMA requires federal agencies to follow NIST standards.</div>`,
        quiz:{ q:"NIST is 'non-regulatory.' How do its voluntary standards still become mandatory in practice?", opts:["They are never actually mandatory","They are frequently incorporated by reference into laws and regulations — HIPAA, CMMC, and FISMA all rely on NIST standards","Only through presidential executive orders","Only state laws can make NIST standards mandatory"], ans:1, explain:"NIST's voluntary standards become effectively mandatory when incorporated into actual laws, regulations, and contracts. The 'voluntary' label applies to origin, not necessarily to practical use." } },

      { title:"CSF 1.0 to CSF 2.0 — What Changed and Why", tagline:"A decade of hard-won lessons packed into one landmark update",
        body:`<p>CSF 1.0 (2014) and 1.1 (2018) became the most widely used cybersecurity frameworks in the US. By the early 2020s the landscape had transformed — cloud, remote work, AI, ransomware, and supply-chain attacks. <span class="key-term">CSF 2.0</span> (February 2024) responds with the framework's most significant restructuring.</p>
        <div class="highlight-box"><strong>The single biggest change — adding GOVERN:</strong> CSF 1.1 had five functions: Identify, Protect, Detect, Respond, Recover. CSF 2.0 added a sixth — <strong>GOVERN</strong>. A decade of experience showed programs fail not mainly from technical gaps, but from governance failures: no leadership commitment, unclear accountability, weak risk strategy. GOVERN is the management layer that makes everything else coherent.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Scope Expansion</strong><span>From critical infrastructure to explicitly "all organizations" — small business to enterprise to government.</span></div>
          <div class="cheat-pill"><strong>Supply Chain Risk Elevation</strong><span>A dedicated GOVERN category for C-SCRM. SolarWinds and Colonial Pipeline proved supply-chain risk needs strategic governance.</span></div>
          <div class="cheat-pill"><strong>Improved Profiles</strong><span>Strengthened how organizations document current and target states, with new Community Profiles as sector baselines.</span></div>
          <div class="cheat-pill"><strong>Better Integration</strong><span>Explicit guidance for using CSF alongside SP 800-53, ISO 27001, and CIS Controls, with a searchable Reference Tool.</span></div>
        </div>
        <div class="analogy-box"><strong>Why adding GOVERN was transformative:</strong> Imagine a car with an excellent engine, brakes, and safety systems — but no steering wheel. CSF 1.1's five functions were the mechanical systems; GOVERN is the steering wheel that gives them direction.</div>`,
        quiz:{ q:"What was the most significant structural change in NIST CSF 2.0?", opts:["Adding 50 new subcategories","Adding the GOVERN function — addressing leadership, strategy, roles, policy, oversight, and supply-chain risk, the missing foundation","Removing the RECOVER function","Reducing from five tiers to three"], ans:1, explain:"CSF 2.0 added GOVERN — placed first — addressing the governance elements that a decade of experience showed were the most common root cause of program failures." } },

      { title:"The CSF Core — Functions, Categories, and Subcategories", tagline:"The three-level architecture that organizes every outcome",
        body:`<p>The <span class="key-term">CSF Core</span> is the heart of CSF 2.0 — a nested hierarchy of cybersecurity outcomes organizations use to understand, communicate about, and manage security activities.</p>
        <div class="highlight-box"><strong>Three levels:</strong><br><br><strong>Functions (6):</strong> The highest level — GOVERN, IDENTIFY, PROTECT, DETECT, RESPOND, RECOVER. The chapter titles of the security playbook.<br><br><strong>Categories (22):</strong> Subdivisions within each Function — e.g., "Asset Management" in IDENTIFY, "Access Control" in PROTECT.<br><br><strong>Subcategories (106):</strong> The most specific level — individual outcomes, e.g., "Identities and credentials for authorized users are managed."</div>
        <div class="analogy-box"><strong>The cookbook analogy:</strong> Functions are meal categories (Breakfast, Lunch, Dinner). Categories are dish types within each. Subcategories are the specific outcomes for each dish. Each level gets more specific, from broad outcome to concrete result.</div>
        <div class="badge-row">
          <span class="badge badge-red">6 Functions — GOVERN is new in 2.0</span>
          <span class="badge badge-red">22 Categories across the six Functions</span>
          <span class="badge badge-red">106 Subcategories — each a specific outcome</span>
          <span class="badge badge-red">The Core is universal; context comes via Profiles</span>
        </div>
        <div class="warning-box"><strong>Outcomes, not controls:</strong> "Physical access to assets is managed" is an outcome; the specific controls (badge readers, cameras) are left to the organization. This outcome-focus is what makes CSF universally applicable across sectors and sizes.</div>`,
        quiz:{ q:"How do Categories differ from Subcategories in the CSF Core?", opts:["Categories are mandatory; subcategories optional","Categories are technical controls; subcategories are policies","Categories group related outcomes within a Function; subcategories are the specific individual outcomes that fulfill each Category","There is no meaningful distinction"], ans:2, explain:"Categories cluster related outcomes within a Function; subcategories are the individual outcomes that together fulfill a category. Categories answer 'what domain?'; subcategories answer 'what specific outcome?'" } },

      { title:"GOVERN — The Function That Makes Everything Else Work", tagline:"Leadership, strategy, roles, and the foundation that drives all other functions",
        body:`<p><span class="key-term">GOVERN</span> is the most important addition to CSF 2.0. It establishes the organizational context, strategic direction, accountability, and oversight that determine whether the other five functions are coherent and effective. Without GOVERN, they are activities without strategy.</p>
        <div class="fn-govern"><b>GV — GOVERN: The cybersecurity risk management strategy, expectations, and policy are established, communicated, and monitored.</b><br><span style="font-size:12px">6 Categories. Placed first because governance is the prerequisite for effective security.</span></div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>GV.OC — Organizational Context</strong><span>Mission, stakeholder expectations, legal/regulatory requirements, and dependencies that shape decisions.</span></div>
          <div class="cheat-pill"><strong>GV.RM — Risk Management Strategy</strong><span>Risk appetite and tolerance — conscious, documented decisions about acceptable vs. unacceptable risk.</span></div>
          <div class="cheat-pill"><strong>GV.RR — Roles, Responsibilities & Authorities</strong><span>Who owns decisions, who is accountable, who has authority to act. Diffuse accountability is no accountability.</span></div>
          <div class="cheat-pill"><strong>GV.PO — Policy</strong><span>Establish, communicate, and enforce cybersecurity policies that are current and actually followed.</span></div>

          <div class="cheat-pill"><strong>GV.OV — Oversight</strong><span>Active senior leadership review and direction — not passive receipt of occasional reports.</span></div>
          <div class="cheat-pill"><strong>GV.SC — Supply Chain Risk Management</strong><span>Manage the security of vendors and partners whose compromise could affect you.</span></div>
        </div>
        <div class="analogy-box"><strong>The orchestra conductor:</strong> The five other functions are instruments. Without GOVERN — the conductor — they play independently, without coordination. GOVERN sets the tempo and ensures the whole achieves more than the sum of its parts.</div>`,
        quiz:{ q:"Why did NIST add GOVERN as a sixth function and place it first?", opts:["Because governance is new to cybersecurity","Because a decade of experience showed programs fail primarily due to governance failures — no risk strategy, unclear accountability — and these must exist before technical activities can be effective","Because government agencies required it","Because GOVERN replaces the other functions for small organizations"], ans:1, explain:"GOVERN provides the strategic and management foundation that transforms individual security activities into a coherent, improving program — addressing the governance failures that most often cause programs to fail." } },

      { title:"IDENTIFY — Know What You Have and What Risks You Face", tagline:"The intelligence foundation that makes all security decisions rational",
        body:`<p><span class="key-term">IDENTIFY</span> is where informed security management begins — understanding the organization's assets, systems, data, and the risks that threaten them. Protecting assets you don't know you have, or managing risks you haven't identified, is impossible.</p>
        <div class="fn-identify"><b>ID — IDENTIFY: The organization's current cybersecurity risks are understood.</b><br><span style="font-size:12px">2 Categories. Creates the knowledge foundation for all risk-informed decisions.</span></div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>ID.AM — Asset Management</strong><span>Identify and manage assets — hardware, software, data, people, facilities, services. Inventories and criticality enable proportionate protection.</span></div>
          <div class="cheat-pill"><strong>ID.RA — Risk Assessment</strong><span>Identify, analyze, and prioritize risks based on threats, vulnerabilities, likelihood, and impact — converting raw data into actionable risk information.</span></div>
        </div>
        <div class="analogy-box"><strong>The home security analogy:</strong> Before securing your home you need to know what you own worth protecting, your vulnerabilities (unlocked windows), likely threats, and each threat's probability and impact. Only then can you make rational investments. IDENTIFY does this systematically for organizations.</div>`,
        quiz:{ q:"Why is IDENTIFY placed before PROTECT?", opts:["Because identification is cheaper","Because you cannot make rational protection decisions without first knowing what assets exist, their value, and what risks threaten them — protection without identification is expensive guesswork","Because IDENTIFY is easiest","The order has no significance"], ans:1, explain:"Every protection decision must be informed by knowledge of assets and risks. Without an inventory you don't know what to protect; without a risk assessment you can't prioritize." } },

      { title:"PROTECT — Safeguards That Reduce Cybersecurity Risk", tagline:"The defenses that prevent or limit the impact of cybersecurity events",
        body:`<p><span class="key-term">PROTECT</span> covers the safeguards that limit or contain the impact of a potential cybersecurity event. IDENTIFY creates the risk knowledge; PROTECT implements the actual defenses.</p>
        <div class="fn-protect"><b>PR — PROTECT: Safeguards to manage the organization's cybersecurity risks are used.</b><br><span style="font-size:12px">4 Categories. Implements controls that prevent or limit events.</span></div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>PR.AA — Identity, Authentication & Access Control</strong><span>Manage identities and credentials, authenticate users and devices, enforce least privilege. MFA is a key outcome.</span></div>
          <div class="cheat-pill"><strong>PR.AT — Awareness & Training</strong><span>Ensure all personnel understand risks and responsibilities. Role-specific training and phishing simulations — the human element.</span></div>
          <div class="cheat-pill"><strong>PR.DS — Data Security</strong><span>Protect data at rest and in transit: classification, encryption, access controls, and secure disposal.</span></div>
          <div class="cheat-pill"><strong>PR.PS — Platform Security</strong><span>Secure configuration, patch management, and software integrity across all hardware, software, and services.</span></div>
        </div>
        <div class="warning-box"><strong>PROTECT alone is never enough:</strong> Sophisticated attackers will eventually find a way through even excellent defenses. PROTECT reduces likelihood and impact — but DETECT, RESPOND, and RECOVER exist precisely because PROTECT is never 100% effective. The goal is resilience, not perfect prevention.</div>`,
        quiz:{ q:"CSF 2.0 renamed 'Protective Technology' to 'Platform Security' (PR.PS). What broader concept does this reflect?", opts:["It only applies to servers now","That modern security extends beyond security tools to the full security of hardware, software, and services — configuration, patching, and integrity across all platforms","It removes network security from PROTECT","It only applies to cloud"], ans:1, explain:"The broader name captures that every platform — on-prem, cloud, endpoint, mobile, IoT — requires security management, not just the deployment of security products." } },

      { title:"DETECT — Finding Events Before They Become Disasters", tagline:"Early warning systems that catch attacks while damage is still manageable",
        body:`<p><span class="key-term">DETECT</span> addresses identifying cybersecurity events in a timely manner. Detection speed is the difference between catching an attacker in the first hours of a breach and discovering months later that data has been exfiltrated.</p>
        <div class="fn-detect"><b>DE — DETECT: Possible cybersecurity attacks and compromises are found and analyzed.</b><br><span style="font-size:12px">1 Category. CSF 2.0 consolidated detection into a single comprehensive monitoring category.</span></div>
        <div class="badge-row">
          <span class="badge badge-amber">SIEM — centralized log analysis and correlation</span>
          <span class="badge badge-amber">EDR — device-level behavioral detection</span>
          <span class="badge badge-amber">Network monitoring for anomalous traffic</span>
          <span class="badge badge-amber">UEBA — insider threat detection</span>
          <span class="badge badge-amber">Vulnerability scanning for configuration drift</span>
          <span class="badge badge-amber">Threat intelligence integrated with detection</span>
        </div>
        <div class="analogy-box"><strong>The smoke detector analogy:</strong> PROTECT is fire-resistant materials; DETECT is the smoke detector — it doesn't prevent fire, but catches it early when damage is still manageable. Without DETECT, an attacker can operate inside your network for months before discovery.</div>
        <div class="highlight-box"><strong>Dwell time:</strong> the interval between an attacker entering and being discovered. Historically measured in months. Strong DETECT reduces dwell time from months to hours — every day of reduction dramatically limits attacker impact.</div>`,
        quiz:{ q:"CSF 2.0 consolidated DETECT from two categories to one. What does this reflect?", opts:["Detection is less important now","A recognition that continuous monitoring is a unified capability — the previous categories overlapped, and one comprehensive outcome better describes effective detection","DETECT was merged with RESPOND","Only large organizations need to monitor"], ans:1, explain:"The single Continuous Monitoring category reflects that effective detection operates as integrated, continuous monitoring rather than separate siloed activities." } },

      { title:"RESPOND — Taking Effective Action When Incidents Occur", tagline:"From detection to containment — turning awareness into action",
        body:`<p><span class="key-term">RESPOND</span> covers the activities taken to act on a detected incident. Detection without effective response is like knowing your house is on fire but having no plan to evacuate.</p>
        <div class="fn-respond"><b>RS — RESPOND: Actions regarding a detected cybersecurity incident are taken.</b><br><span style="font-size:12px">4 Categories. The operational response when incidents are confirmed and active.</span></div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>RS.MA — Incident Management</strong><span>Execute the IR plan, triage by severity, activate response teams, and coordinate activities.</span></div>
          <div class="cheat-pill"><strong>RS.AN — Incident Analysis</strong><span>Investigate what happened, what was affected, and how the attacker operated — forensics and root cause.</span></div>
          <div class="cheat-pill"><strong>RS.CO — Reporting & Communication</strong><span>Coordinate with leadership, regulators (GDPR 72-hour, CMMC 72-hour, HIPAA 60-day), law enforcement, and customers.</span></div>
          <div class="cheat-pill"><strong>RS.MI — Incident Mitigation</strong><span>Contain and eradicate — isolate systems, remove malware, close access paths, restore to known-good state.</span></div>
        </div>
        <div class="highlight-box"><strong>The IR plan must exist BEFORE the incident:</strong> Organizations improvising during an active breach consistently suffer more damage and higher costs. The plan should specify who can make containment decisions, how to preserve evidence, and when to notify regulators and customers.</div>`,
        quiz:{ q:"Why does RESPOND include a dedicated category for Reporting and Communication (RS.CO)?", opts:["To satisfy press-release requirements","Because effective response requires coordinated communication with regulators (strict deadlines), customers, law enforcement, and leadership — and communication failures routinely cause secondary damage","Because communication is easier than technical work","Communication is only required for breaches over 500 people"], ans:1, explain:"Incident response is never purely technical. Regulators have strict notification deadlines, customers may need to act, and leadership needs updates — each communication has different content, timing, and audience." } },

      { title:"RECOVER — Restoring Operations and Learning for the Future", tagline:"Getting back to business — and making sure you do better next time",
        body:`<p><span class="key-term">RECOVER</span> addresses restoring systems, services, and capabilities after an incident — then extracting lessons that improve future resilience across all six functions.</p>
        <div class="fn-recover"><b>RC — RECOVER: Assets and operations affected by a cybersecurity incident are restored.</b><br><span style="font-size:12px">2 Categories. Restoring operations while incorporating lessons learned.</span></div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>RC.RP — Recovery Plan Execution</strong><span>Restore systems using pre-documented procedures; validate integrity before bringing systems back online.</span></div>
          <div class="cheat-pill"><strong>RC.CO — Recovery Communication</strong><span>Coordinate restoration with internal and external parties, including cyber insurers, with appropriate transparency.</span></div>
        </div>
        <div class="highlight-box"><strong>RTO and RPO:</strong> Recovery Time Objective is how quickly critical systems must be restored; Recovery Point Objective is how much data loss is acceptable. These targets must be set and tested BEFORE incidents occur.</div>
        <div class="analogy-box"><strong>Ransomware — the ultimate RECOVER test:</strong> Organizations with tested, isolated backups and pre-established RTO/RPO targets can restore without paying ransom, often within hours. Those without face weeks of downtime and the grim choice between paying criminals or rebuilding from nothing. The difference is entirely determined by preparation done before the attack.</div>`,
        quiz:{ q:"What distinguishes RESPOND from RECOVER?", opts:["They address identical activities in different sequences","RESPOND covers actions during an active incident — containing, analyzing, mitigating; RECOVER covers restoring normal operations afterward and extracting lessons for future improvement","RECOVER is only for large organizations","RESPOND is voluntary while RECOVER is mandatory"], ans:1, explain:"RESPOND focuses on the active incident; RECOVER begins after the immediate threat is addressed, focusing on restoration, ongoing communication, and post-incident review." } },

      { title:"How All 6 Functions Work Together as a System", tagline:"Why the framework is a continuous cycle, not a checklist",
        body:`<p>The six functions are not a sequential checklist — they are a <span class="key-term">concurrent, integrated system</span>. All six operate simultaneously and continuously, each informing and improving the others.</p>
        <div class="highlight-box"><strong>The integrated cycle:</strong> GOVERN sets strategy and risk appetite. IDENTIFY creates the asset and risk knowledge that informs PROTECT and DETECT. PROTECT reduces events reaching DETECT. DETECT finds what PROTECT didn't stop, triggering RESPOND. RESPOND contains threats, enabling RECOVER. RECOVER restores operations and generates lessons that feed back into GOVERN and IDENTIFY. The cycle is continuous and self-improving.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>GOVERN → All</strong><span>Risk appetite determines resources for PROTECT, escalation thresholds for RESPOND, and recovery speed for RECOVER.</span></div>
          <div class="cheat-pill"><strong>IDENTIFY → PROTECT</strong><span>Asset criticality determines which assets get the strongest controls.</span></div>
          <div class="cheat-pill"><strong>DETECT → RESPOND</strong><span>Faster detection means faster response means less damage.</span></div>
          <div class="cheat-pill"><strong>RECOVER → GOVERN</strong><span>Post-incident lessons feed strategy, risk reassessment, and control updates.</span></div>
        </div>
        <div class="analogy-box"><strong>The immune system analogy:</strong> Your immune system operates simultaneously across multiple layers — detection, protection, response, recovery — all coordinated by the body's regulatory systems. The CSF's six functions operate exactly this way: a coordinated, simultaneous system rather than a linear sequence.</div>`,
        quiz:{ q:"A post-incident review reveals poor phishing detection let an attacker operate for eight weeks. Which functions should be updated?", opts:["Only DETECT","GOVERN (risk strategy), IDENTIFY (threat assessment), PROTECT (email filtering and training), DETECT (tuning), and RESPOND (playbook) — improvement is holistic","Only RESPOND","Findings only affect the next assessment cycle"], ans:1, explain:"A single significant finding triggers improvements across multiple functions simultaneously. Failures in one area reveal related gaps across the entire system." } }
    ]
  });

  F.push({ id:"nist-rmf", name:"NIST RMF", subtitle:"Risk Management Framework (SP 800-37)",
    category:"NIST Frameworks", color:"#1f3a4d", lessonsTotal:30, source:"NIST/NIST Risk Management Framework/nist_rmf_30day_curriculum.html",
    desc:"The seven-step process U.S. federal systems use to authorize and continuously monitor security.",
    days:[
      { title:"What Is the NIST RMF?", tagline:"The federal government's disciplined process for authorizing system security",
        body:`<p>The <span class="key-term">NIST Risk Management Framework (RMF)</span>, defined in NIST SP 800-37, is a disciplined, repeatable process for managing security and privacy risk across a system's lifecycle — especially for U.S. federal information systems.</p>
        <div class="analogy-box"><strong>For executives:</strong> RMF is how government systems earn an <strong>Authorization to Operate (ATO)</strong>. Its lasting lesson for any leader: authorization is a risk-based decision made by an accountable official based on documented evidence — and monitoring never stops.</div>
        <div class="highlight-box">The RMF produces, for each system, an ATO — the formal decision by an Authorizing Official that the system's residual risk is acceptable given its controls and the data it handles. It's the culmination of documented evidence and an accountable risk decision, not a checkbox.</div>`,
        quiz:{ q:"What does the NIST RMF primarily produce for each information system?", opts:["A security score from 1 to 100","An Authorization to Operate (ATO) — official approval to process federal information, based on documented evidence of adequate controls","A FISMA compliance certificate","A cybersecurity maturity rating"], ans:1, explain:"The RMF's key output is an ATO — the formal decision by an Authorizing Official that a system's risks are acceptable given its controls and data. It is the culmination of the entire process." } },

      { title:"Why Was the NIST RMF Created?", tagline:"The federal security crisis that demanded a documented approach",
        body:`<p>The federal government was operating increasingly interconnected systems — holding sensitive data on hundreds of millions of Americans — with no consistent process for determining whether those systems were actually secure enough to trust.</p>
        <div class="highlight-box"><strong>The FISMA mandate:</strong> The Federal Information Security Management Act (2002, modernized 2014) made each agency head responsible for information security and required agencies to assess risk, implement controls, and report annually. The RMF became the primary process for demonstrating FISMA compliance system by system.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Inconsistent Practices</strong><span>Different agencies used wildly different approaches — no common definition of "secure enough" or how to prove it.</span></div>
          <div class="cheat-pill"><strong>Checklist-Only Compliance</strong><span>Approvals based on documentation reviews rather than evidence that controls actually worked — "paper compliance."</span></div>
          <div class="cheat-pill"><strong>Disconnected from Mission</strong><span>Security treated as separate from mission impact, making risk prioritization impossible.</span></div>
          <div class="cheat-pill"><strong>No Lifecycle Integration</strong><span>Security bolted on after development — expensive, ineffective, disruptive.</span></div>
        </div>`,
        quiz:{ q:"What does 'paper compliance' mean — the problem the RMF was designed to solve?", opts:["Using paper documents instead of digital records","Security approvals granted on documentation reviews rather than evidence that controls actually work — authorizations without genuine risk assessment or tested controls","Compliance with paper-management requirements","Using paper policy documents instead of automated tools"], ans:1, explain:"Paper compliance means approvals based on the existence of documents rather than evidence of real security. RMF replaced it with evidence-based testing, formal risk assessment, and accountable authorization." } },

      { title:"FISMA — The Law Behind the Framework", tagline:"The legislation that makes RMF mandatory for federal agencies",
        body:`<p>To understand the RMF you must understand <span class="key-term">FISMA</span> — the Federal Information Security Modernization Act. FISMA makes the RMF a legal obligation, not just guidance.</p>
        <div class="highlight-box">FISMA establishes that each agency head is responsible for security; agencies must maintain security programs; NIST develops the standards; OMB oversees implementation; and agencies report annually to OMB and Congress. The RMF is the process through which agencies fulfill FISMA obligations system by system.</div>
        <div class="info-box"><strong>The FISMA–RMF–SP 800-53 stack:</strong> FISMA is the law ("secure your systems"). NIST RMF (SP 800-37) is the process ("here's how to document and authorize security"). NIST SP 800-53 is the control catalog ("here are the specific controls"). The three work together as a stack.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Scope</strong><span>All federal agencies and contractors operating federal information systems — hundreds of thousands of systems.</span></div>
          <div class="cheat-pill"><strong>Agency Accountability</strong><span>Agency heads are personally responsible — making the RMF's authorization step a direct implementation of FISMA accountability.</span></div>
        </div>`,
        quiz:{ q:"Who is ultimately responsible for FISMA compliance at a federal agency?", opts:["The agency's CISO","The NIST team that published the RMF","The agency head (Secretary, Administrator, or equivalent), who bears personal accountability","The Office of Management and Budget"], ans:2, explain:"FISMA places ultimate responsibility on the agency head, creating personal accountability at the top. The CISO runs the program day-to-day, but the agency head is the accountable official." } },

      { title:"The 7-Step RMF Framework", tagline:"The complete lifecycle from system planning to ongoing operation",
        body:`<p>The RMF organizes its work into <span class="key-term">seven sequential steps</span>, each producing artifacts that feed the next — a traceable chain of evidence from system description through authorization and monitoring.</p>
        <div class="step-card"><b>1 — PREPARE</b><br>Establish organizational and system context, roles, and risk strategy. Added in SP 800-37 Rev 2 (2018) to ensure readiness before any system work.</div>
        <div class="step-card"><b>2 — CATEGORIZE</b><br>Classify the system and its information by impact of a breach — Low, Moderate, or High (FIPS 199).</div>
        <div class="step-card"><b>3 — SELECT</b><br>Choose the SP 800-53 control baseline for the impact level, then tailor it to the system's threats and environment.</div>
        <div class="step-card"><b>4 — IMPLEMENT</b><br>Deploy and document the selected controls — technical controls plus supporting policies and procedures.</div>
        <div class="step-card"><b>5 — ASSESS</b><br>Independently evaluate whether controls are implemented correctly and operating as intended. Produces the Security Assessment Report (SAR).</div>
        <div class="step-card"><b>6 — AUTHORIZE</b><br>The Authorizing Official reviews the package (SSP, SAR, POA&M) and makes a risk-based decision — issuing the ATO or denial.</div>
        <div class="step-card"><b>7 — MONITOR</b><br>Continuously track controls, changes, and threats; report status; update the authorization. Security is never "done."</div>`,
        quiz:{ q:"Which step was added in SP 800-37 Revision 2 (2018)?", opts:["Step 2 — Categorize","Step 1 — Prepare, establishing organizational and system context and readiness before system-specific work","Step 6 — Authorize","Step 7 — Monitor"], ans:1, explain:"Prepare was added in Rev 2 to address organizations executing RMF tasks without the governance, roles, and enterprise risk context to do so effectively. The original RMF started with Categorize." } },

      { title:"Impact Levels — Low, Moderate, and High", tagline:"How agencies decide how much protection a system needs",
        body:`<p>A foundational RMF concept is the system <span class="key-term">impact level</span>, which determines the control baseline. Too low means insufficient protection; too high means excessive cost.</p>
        <div class="highlight-box">Impact levels come from FIPS 199, based on the potential impact if confidentiality, integrity, or availability were compromised. The overall level is the <strong>highest</strong> rating across the three objectives — the "high watermark" principle.</div>
        <div class="impact-grid">
          <div class="impact-low"><strong style="color:#27500A">LOW</strong><br><span style="font-size:12px">Loss of CIA has a <strong>limited</strong> adverse effect. E.g., public websites, internal scheduling. Implements the Low baseline.</span></div>
          <div class="impact-mod"><strong style="color:#633806">MODERATE</strong> (most common)<br><span style="font-size:12px">A <strong>serious</strong> adverse effect. E.g., most systems handling PII, benefits, financial processing. ~80% of federal systems.</span></div>
          <div class="impact-high"><strong style="color:#4A1B0C">HIGH</strong><br><span style="font-size:12px">A <strong>severe or catastrophic</strong> effect. E.g., critical infrastructure control systems, systems where compromise could risk life. Implements the comprehensive High baseline.</span></div>
        </div>`,
        quiz:{ q:"An HR system has Moderate confidentiality, High integrity (payroll errors), and Low availability. What is its overall FIPS 199 impact level?", opts:["Moderate — most ratings are Moderate or lower","High — the high watermark principle uses the highest individual rating as the overall level","Low — the average is Low","It is assessed separately with no overall rating"], ans:1, explain:"The high watermark principle sets the overall level to the highest individual rating — here High — so the system implements the High control baseline regardless of the lower ratings." } },

      { title:"FIPS 199 & FIPS 200 — The Standards Behind RMF", tagline:"The publications that anchor categorization and minimum requirements",
        body:`<p>Two Federal Information Processing Standards underpin the RMF. <span class="key-term">FIPS 199</span> defines how to categorize systems; <span class="key-term">FIPS 200</span> defines the minimum security requirements categorized systems must meet.</p>
        <div class="highlight-box"><strong>FIPS 199 (2004):</strong> the methodology for security categorization, expressing a system's category as confidentiality, integrity, and availability impact ratings — e.g., Veterans Health Records = {confidentiality: High, integrity: High, availability: Moderate}.</div>
        <div class="highlight-box"><strong>FIPS 200 (2006):</strong> specifies minimum security requirements across 17 security-related areas that align with the SP 800-53 control families. FIPS 200 is the "what"; SP 800-53 is the "how."</div>
        <div class="badge-row">
          <span class="badge badge-forest">Access Control</span><span class="badge badge-forest">Awareness & Training</span><span class="badge badge-forest">Audit & Accountability</span><span class="badge badge-forest">Configuration Management</span><span class="badge badge-forest">Contingency Planning</span><span class="badge badge-forest">Identification & Authentication</span><span class="badge badge-forest">Incident Response</span><span class="badge badge-forest">Media Protection</span><span class="badge badge-forest">Physical Protection</span>
        </div>`,
        quiz:{ q:"How do FIPS 200 and NIST SP 800-53 relate?", opts:["They are the same document","FIPS 200 defines the minimum security requirement areas (the 'what'); SP 800-53 provides the specific controls that satisfy them (the 'how')","SP 800-53 replaced FIPS 200","FIPS 200 is for contractors only"], ans:1, explain:"FIPS 200 establishes 17 minimum security requirement areas; SP 800-53 provides the detailed control catalog implemented to satisfy those requirements at the system's impact baseline." } }
    ]
  });

  F.push({ id:"nist-ai-rmf", name:"NIST AI RMF", subtitle:"AI Risk Management Framework",
    category:"NIST Frameworks", color:"#1f3a4d", lessonsTotal:30, source:"NIST/NIST AI Risk Management Framework/nist_ai_rmf_30day_curriculum.html",
    desc:"A voluntary framework for managing the risks of AI systems across their lifecycle.",
    days:[
      { title:"What Is the NIST AI RMF?", tagline:"A voluntary blueprint for building and governing trustworthy AI",
        body:`<p>Imagine a hospital deploys an AI that flags potential cancers for radiologist review. It's accurate 94% of the time — but performs worse on images from older X-ray machines common in rural hospitals. Patients there get worse AI-assisted diagnoses without anyone knowing. Who is responsible? Who knew about the risk? These are the questions the <span class="key-term">NIST AI Risk Management Framework</span> was built to answer.</p>
        <p>The NIST AI RMF (NIST AI 100-1, January 2023) is a voluntary framework for identifying, assessing, and managing risks from AI across the lifecycle. Unlike cybersecurity frameworks, it addresses AI-specific risks: not just security breaches, but performance failures, bias, lack of explainability, privacy violations, and harmful societal impacts.</p>
        <div class="analogy-box"><strong>Real-world analogy:</strong> Think of it like the FDA's process for medical devices. Before a surgical robot reaches patients it must demonstrate safety and performance across diverse populations, document risks, and establish post-deployment monitoring. The AI RMF applies similar rigor to AI.</div>
        <div class="highlight-box">Four functions: <strong>GOVERN, MAP, MEASURE, MANAGE</strong>. Seven characteristics of trustworthy AI: Valid &amp; Reliable, Safe, Secure, Explainable, Privacy-Enhanced, Fair, and Accountable/Transparent. Voluntary, free, and complementary to NIST CSF and RMF.</div>`,
        quiz:{ q:"What distinguishes the NIST AI RMF from the NIST Cybersecurity Framework?", opts:["The AI RMF is legally mandatory; CSF is voluntary","The AI RMF addresses AI-specific risks — performance failures, bias, lack of explainability, societal impacts — while CSF focuses on cybersecurity. Both are voluntary and complementary","The AI RMF replaces CSF for organizations using AI","There is no meaningful distinction"], ans:1, explain:"The AI RMF covers risks unique to AI that cybersecurity frameworks don't: biased outputs, unexplainable decisions, performance disparities across groups, and unintended societal harms." } },

      { title:"Why Was the AI RMF Created?", tagline:"The AI harms and governance vacuum that demanded a response",
        body:`<p>By the early 2020s, AI was deployed at scale across healthcare, hiring, criminal justice, and government — with real consequences — yet existing technology-risk frameworks weren't designed for AI's distinctive characteristics.</p>
        <div class="highlight-box"><strong>Documented harms:</strong> facial recognition with far higher error rates for darker-skinned faces; hiring algorithms penalizing resumes containing "women's"; medical AI trained on wealthy urban hospitals performing poorly in rural settings; credit scoring with disparate impacts on minorities. Not theoretical — real deployments affecting real people.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>AI-Specific Risks</strong><span>Models can be biased, unexplainable, or brittle — risks existing frameworks had no vocabulary for.</span></div>
          <div class="cheat-pill"><strong>Executive Order 13960 (2020)</strong><span>Directed NIST to develop AI standards, initiating the AI RMF.</span></div>
          <div class="cheat-pill"><strong>Industry Need</strong><span>Organizations wanted a credible, government-backed way to demonstrate responsible AI.</span></div>
          <div class="cheat-pill"><strong>International Context</strong><span>The EU AI Act was developing in parallel; the US needed a comparable voluntary framework.</span></div>
        </div>
        <div class="analogy-box"><strong>The Amazon hiring case:</strong> A recruitment AI trained on 10 years of mostly-male resumes learned to penalize resumes containing "women's" — disadvantaging female applicants until researchers found the pattern. Amazon scrapped it. This is why AI-specific governance is necessary: harms traditional frameworks would never flag emerge from how AI learns from data.</div>`,
        quiz:{ q:"Why couldn't traditional cybersecurity frameworks adequately address AI risks?", opts:["They're too expensive for AI companies","They were designed for well-understood technology risks and lacked vocabulary for AI-specific risks like training-data bias, subgroup performance disparities, and opaque decision-making","They don't apply to software","AI systems have no cybersecurity risks"], ans:1, explain:"Cybersecurity frameworks focus on access, breaches, and availability — they have no provisions for evaluating biased outputs, explainability, or training data reflecting historical inequities." } },

      { title:"What Makes AI Risk Different?", tagline:"Why AI needs its own framework, not an extension of existing ones",
        body:`<p>AI risk is genuinely different from conventional software risk — not just more sophisticated software, but fundamental differences in how AI is built and behaves.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>AI Learns from Data</strong><span>If training data reflects historical inequities, the AI learns them — not because anyone programmed discrimination, but because the data embodied it.</span></div>
          <div class="cheat-pill"><strong>AI Is Opaque</strong><span>Many models are "black boxes" even their creators can't fully explain — "the AI decided" is not an adequate explanation for a loan denial.</span></div>
          <div class="cheat-pill"><strong>Performance Varies by Context</strong><span>An AI with 95% overall accuracy may be 70% accurate for a subgroup underrepresented in training data. Averages hide critical failures.</span></div>
          <div class="cheat-pill"><strong>Novel Failure Modes</strong><span>AI can fail on inputs slightly outside its training distribution that look normal to humans.</span></div>
          <div class="cheat-pill"><strong>Risk Scales with Deployment</strong><span>A biased AI making thousands of decisions per second causes systemic harm a single human never could.</span></div>
          <div class="cheat-pill"><strong>Risk Evolves After Deployment</strong><span>As the world shifts away from training conditions, performance degrades with no code change.</span></div>
        </div>
        <div class="highlight-box">These properties mean AI risk needs its own framework. The four functions (GOVERN, MAP, MEASURE, MANAGE) create a structured process for risks that emerge from how AI learns, decides, and changes over time.</div>`,
        quiz:{ q:"An AI hiring system is 92% accurate overall but 71% for applicants over 55. Why is overall accuracy inadequate?", opts:["Because 92% is too low for any application","Because aggregate metrics hide subgroup disparities — the 71% reveals systematic discrimination against a protected class and legal exposure, even though the overall metric looks acceptable","Because accuracy isn't the right metric for hiring","Because AI shouldn't be used for hiring"], ans:1, explain:"Aggregate accuracy masks subgroup disparities — a core AI risk insight. The AI RMF emphasizes measuring performance disaggregated by relevant subgroups, which traditional frameworks never considered." } },

      { title:"The AI RMF Core Structure", tagline:"Four functions and how the framework is organized",
        body:`<p>The AI RMF is organized around four core functions forming a continuous cycle.</p>
        <div class="fn-govern"><b>GOVERN — The foundational function</b><br><span style="font-size:12px">Establishes the culture, policies, and accountability that make all other activities coherent. Placed first because governance enables everything else.</span></div>
        <div class="fn-map"><b>MAP — Context and risk identification</b><br><span style="font-size:12px">Identifies the context an AI operates in, categorizes risks, and understands potential impacts on stakeholders.</span></div>
        <div class="fn-measure"><b>MEASURE — Risk analysis and evaluation</b><br><span style="font-size:12px">Analyzes and assesses risks through systematic methods and metrics, evaluating trustworthiness characteristics.</span></div>
        <div class="fn-manage"><b>MANAGE — Risk response and treatment</b><br><span style="font-size:12px">Allocates resources, develops response plans, and implements mitigation — proactive reduction and reactive incident response.</span></div>
        <div class="analogy-box"><strong>The cycle:</strong> GOVERN sets strategy and accountability. MAP identifies a system's context and risks. MEASURE evaluates severity and likelihood. MANAGE decides what to do. The cycle repeats as the AI is deployed and the environment changes — a continuous improvement loop, not a one-time process.</div>`,
        quiz:{ q:"In what order do the four AI RMF functions operate?", opts:["MAP → MEASURE → MANAGE → GOVERN (governance last)","GOVERN establishes the foundation; then MAP, MEASURE, and MANAGE form a continuous cycle applied to specific AI systems throughout their lifecycle","All four operate independently with no order","MANAGE → GOVERN → MAP → MEASURE"], ans:1, explain:"GOVERN is established first as the organizational foundation; MAP, MEASURE, and MANAGE then form a continuous cycle repeating throughout the AI lifecycle, with GOVERN guiding all activities." } },

      { title:"GOVERN — Building the Foundation", tagline:"Culture, policies, accountability, and capacity to manage AI risk",
        body:`<p><span class="key-term">GOVERN</span> determines whether an organization is actually capable of managing AI risk — or just going through the motions. Without it, MAP, MEASURE, and MANAGE produce paperwork rather than genuine risk reduction.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>AI Risk Management Policy</strong><span>AI-specific governance policy (not generic security policy extended to AI) specifying accountability and decision authority.</span></div>
          <div class="cheat-pill"><strong>Accountability</strong><span>Clear roles — who decides what, who is responsible when AI harms occur, who escalates risks beyond tolerance.</span></div>
          <div class="cheat-pill"><strong>Organizational Culture</strong><span>A risk-aware workforce where employees can raise concerns without fear and incentives don't reward speed over safety.</span></div>
          <div class="cheat-pill"><strong>Diverse Teams</strong><span>Technical, domain, ethics, and legal perspectives produce more comprehensive risk identification.</span></div>
          <div class="cheat-pill"><strong>Third-Party AI</strong><span>Procured or integrated external AI brings inherited risk — governance must address the AI supply chain.</span></div>
        </div>
        <div class="highlight-box"><strong>Why culture is in GOVERN:</strong> most documented AI harms happened not from lack of technical capability but from cultures that rewarded speed-to-deployment over risk management — environments where concerns were dismissed or never raised. Even perfect MAP and MEASURE processes fail if culture punishes the people who raise concerns.</div>`,
        quiz:{ q:"Why does the AI RMF include 'organizational culture' as an explicit GOVERN category?", opts:["Because culture is easier to demonstrate than technical assessments","Because documented AI harms often came from cultures rewarding deployment speed over risk management — even excellent technical processes fail when culture discourages raising concerns or overrides safety","Because NIST is legally required to address culture","Because culture substitutes for formal policies"], ans:1, explain:"The most sophisticated frameworks become theater when culture undermines them. The culture requirement ensures governance addresses the human context that determines whether formal processes are genuine or performative." } },

      { title:"GOVERN Deep Dive — Risk Tolerance", tagline:"Setting explicit boundaries for acceptable AI risk",
        body:`<p>Two of GOVERN's most strategically important concepts are <span class="key-term">risk tolerance</span> and the overall AI risk strategy. Without these, every MAP, MEASURE, and MANAGE activity lacks the context to be meaningful.</p>
        <div class="highlight-box"><strong>Risk tolerance in practice:</strong> not just "we accept low risk," but specifics like "a maximum false-positive rate of X% for this use case, a maximum performance gap of Y% between demographic subgroups, and no deployment in high-stakes contexts without human review."</div>
        <div class="analogy-box"><strong>The speed limit analogy:</strong> a speed limit doesn't say "drive safely" — it says "no faster than 65." AI risk tolerance converts "AI must be fair" into "the false-positive rate for any subgroup must be within 5 points of the overall rate." The specificity is what makes it governable rather than aspirational.</div>
        <div class="warning-box"><strong>The governance theater trap:</strong> organizations create AI committees, publish ethics principles, and establish review processes — but never define explicit risk tolerance. Without thresholds, governance becomes advisory rather than decisional: it looks active but cannot actually block a risky deployment, because "unacceptable" was never defined.</div>`,
        quiz:{ q:"A committee approves AI deployments with the standard 'AI must be fair and accurate.' Why is this inadequate?", opts:["Because fairness and accuracy aren't legitimate criteria","Because 'fair and accurate' is too vague to enforce — it can't determine whether a specific system meets the standard or at what point an AI fails review, making governance advisory rather than decisional","Because risk tolerance shouldn't mention fairness","Because only legal counsel can set risk tolerance"], ans:1, explain:"Vague standards can't be operationalized. When a medical AI is 94% accurate overall but 78% for elderly patients, does it pass 'accurate'? Effective tolerance specifies the measurement method, the threshold, and what happens when it isn't met." } },

      { title:"MAP — Identifying AI Risk Context", tagline:"Understanding the environment, stakeholders, and risk landscape",
        body:`<p><span class="key-term">MAP</span> is where abstract AI risk becomes concrete for a specific system — establishing its context, identifying who is affected and how, and categorizing the risks it presents. Without careful MAP work, measurement and management address the wrong things.</p>
        <div class="fn-map"><b>MP — MAP: AI risks and impacts are identified and categorized based on the organization's context and the system's purpose, capabilities, and potential harms.</b></div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Context Establishment</strong><span>Who uses the system, under what conditions, for what decisions, in what environment — context shapes which risks are relevant.</span></div>
          <div class="cheat-pill"><strong>Categorize Risks & Impacts</strong><span>Identify potential negative impacts on individuals, communities, and society, by type (fairness, safety, privacy) and who is affected.</span></div>
          <div class="cheat-pill"><strong>Impact on Individuals</strong><span>Identify everyone affected — not just users, but people subject to decisions: applicants scored, patients diagnosed, defendants assessed.</span></div>
          <div class="cheat-pill"><strong>Risk Identification</strong><span>Technical risks (bias, degradation) and non-technical risks (operator misuse, downstream harms) — comprehensive, not just the technical view.</span></div>
          <div class="cheat-pill"><strong>Third-Party Risk</strong><span>External datasets, pre-trained models, and cloud AI services carry inherited risk MAP must surface.</span></div>
        </div>`,
        quiz:{ q:"What is the purpose of the MAP function?", opts:["To deploy the AI as fast as possible","To establish a specific AI system's context and systematically identify and categorize its risks and affected stakeholders, creating the foundation for MEASURE and MANAGE","To write the organization's AI policy","To replace human reviewers"], ans:1, explain:"MAP makes abstract AI risk concrete for a specific system — its context, affected parties, and risk categories — so that measurement and management address the right things." } }
    ]
  });

  F.push({ id:"nist-800-30", name:"NIST SP 800-30", subtitle:"Conducting Risk Assessments",
    category:"NIST Frameworks", color:"#1f3a4d", lessonsTotal:20, source:"NIST/NIST SP 800-30 Conducting Risk Assessments/nist_sp800_30_curriculum.html",
    desc:"The definitive U.S. guide to conducting structured information security risk assessments.",
    days:[
      { title:"What Is NIST SP 800-30?", tagline:"The authoritative guide to conducting risk assessments",
        body:`<p><span class="key-term">NIST SP 800-30</span> (Revision 1, 2012) — "Guide for Conducting Risk Assessments" — is the authoritative methodology for information security risk assessment. It provides the detailed "Assess" guidance within NIST's broader risk management framework and supports the RMF (SP 800-37).</p>
        <div class="analogy-box"><strong>Real-world analogy:</strong> Think of SP 800-30 like the checklist a structural engineer uses before certifying a bridge. They don't just walk across and say "seems sturdy" — they systematically examine what forces could act on it (threats), where it's weak (vulnerabilities), how likely each failure is (likelihood), and what would happen (impact). 800-30 gives security professionals that same systematic approach.</div>
        <div class="highlight-box">It's the engine behind risk-based decisions: when a CISO says a risk is "high," 800-30 is the structured method that backs that rating — turning gut feel into defensible analysis. Freely available and widely adopted in the private sector.</div>`,
        quiz:{ q:"What does a risk assessment answer that a list of vulnerabilities cannot?", opts:["It finds more vulnerabilities","It answers which risks matter most and how much — combining vulnerabilities with threat likelihood and business impact, so limited resources target the highest actual risks","It's legally required while a list is optional","It's done by external auditors"], ans:1, explain:"A scanner might find 500 vulnerabilities — but which actually matter? 800-30 combines threats, vulnerabilities, likelihood, and impact into a prioritized risk picture that raw vulnerability data can't provide." } },

      { title:"The Three-Tier Risk Management Hierarchy", tagline:"Risk at the organizational, mission, and system levels",
        body:`<p>A key contribution of SP 800-30 is the <span class="key-term">three-tier hierarchy</span> (from SP 800-39): a single system-level assessment is not enough to govern organizational risk.</p>
        <div class="step-card"><b>Tier 1 — Organization</b><br>Strategic risks to the mission, risk appetite, and enterprise-wide policies. The risk view a CISO presents to a board.</div>
        <div class="step-card"><b>Tier 2 — Mission / Business Process</b><br>Risks to specific business functions and the dependencies between them. Connects strategy to system requirements.</div>
        <div class="step-card"><b>Tier 3 — Information System</b><br>Specific technical threats, vulnerabilities, and configuration weaknesses for individual systems. The familiar "security assessment."</div>
        <div class="highlight-box">Risk information flows both ways: technical findings flow up to inform mission and organizational decisions; risk appetite and policy flow down to constrain system decisions. Without both directions, risk management is incomplete.</div>`,
        quiz:{ q:"An agency does thorough Tier 3 (system) assessments but never Tier 1 or Tier 2. What gap does this create?", opts:["None — Tier 3 covers all technical risk","Multiple gaps: no organizational risk appetite to judge acceptable residual risk, no mission-criticality to prioritize systems, and no way to assess aggregate risk where individually-acceptable risks combine into unacceptable organizational risk","Only the compliance report is incomplete","Tiers 1 and 2 are only for large agencies"], ans:1, explain:"System-only assessment is a common gap. Without higher-tier context, assessors assume a risk appetite that may not match leadership's, can't prioritize across systems, and can't see aggregate risk." } },

      { title:"SP 800-30 in the NIST Ecosystem", tagline:"How risk assessment connects to the broader framework",
        body:`<p>SP 800-30 doesn't stand alone — it works with a family of NIST publications.</p>
        <div class="pub-card"><b>SP 800-39 — Managing Information Security Risk</b><br>The parent: the three-tier hierarchy and the Frame → <strong>Assess</strong> → Respond → Monitor process. 800-30 details the "Assess" step.</div>
        <div class="pub-card"><b>SP 800-37 — Risk Management Framework</b><br>800-30 assessments feed the RMF — especially the Authorize step, where the Authorizing Official uses the findings to make an ATO decision.</div>
        <div class="pub-card"><b>SP 800-53 — Security &amp; Privacy Controls</b><br>The control catalog. Risk assessment says "what risks must we address?"; 800-53 says "what controls address them?"</div>
        <div class="pub-card"><b>SP 800-53A — Assessing Controls</b><br>Tests whether controls are implemented and effective — distinct from risk assessment, which evaluates overall risk level.</div>
        <div class="highlight-box"><strong>The key distinction:</strong> control assessment (800-53A) tells you whether controls work; risk assessment (800-30) tells you whether the residual risk is acceptable. An Authorizing Official needs the latter to make a risk-acceptance decision.</div>`,
        quiz:{ q:"A 800-53A control assessment finds 85% of controls fully implemented. The officer says 'assessment complete' and awaits authorization. What's missing?", opts:["85% automatically qualifies for authorization","A SP 800-30 risk assessment — control assessment shows whether controls are implemented, but not whether residual risk is acceptable given the system's criticality and risk appetite. Authorization is a risk-acceptance decision","The control assessment is sufficient","Only a penetration test is needed"], ans:1, explain:"Authorization is a risk-acceptance decision, not a compliance determination. An AO can authorize with some controls incomplete if residual risk is acceptable, or deny a fully-implemented system if risk is still too high — that judgment requires the risk assessment." } },

      { title:"The Four Phases of SP 800-30", tagline:"From preparation through ongoing maintenance",
        body:`<p>SP 800-30 organizes risk assessment into four phases that make it both systematic and actionable.</p>
        <div class="step-card"><b>1 — Prepare</b><br>The most undervalued phase: define purpose, scope, assumptions, information sources, and the risk model (scales, likelihood and impact definitions). Results are only comparable if the same model is applied consistently.</div>
        <div class="step-card"><b>2 — Conduct</b><br>The five analytical tasks: identify threat sources and events, identify vulnerabilities, determine likelihood, determine impact, and determine risk — each building on the last.</div>
        <div class="step-card"><b>3 — Communicate</b><br>Share findings, tailored to the audience: detailed threat/vulnerability info for technical staff, prioritized risk scores for risk executives, strategic summaries for leadership. Uncommunicated findings are wasted effort.</div>
        <div class="step-card"><b>4 — Maintain</b><br>Keep the assessment current as threats, systems, and context change. The most neglected phase — a stale assessment provides false assurance.</div>`,
        quiz:{ q:"Eighteen months after authorization, a zero-day vulnerability affecting the system is disclosed. Which SP 800-30 phase addresses this?", opts:["Phase 1 — redo preparation from scratch","Phase 4 — Maintain: significant events like zero-days trigger assessment updates without a full reassessment, determining whether risk now exceeds the authorized level and requires re-communication to the AO","Phase 2 — restart the conduct phase","No phase — this is handled by patch management only"], ans:1, explain:"Phase 4 handles exactly this. Zero-days affecting in-scope systems are a classic update trigger: detect, assess whether risk changed, and inform the AO if residual risk now exceeds the authorized level." } },

      { title:"Core Risk Concepts", tagline:"Threats, vulnerabilities, likelihood, and impact",
        body:`<p>SP 800-30 defines risk using four building blocks that must be understood individually and together. Confusing threats and vulnerabilities is one of the most common errors in practice.</p>
        <div class="highlight-box"><strong>The risk equation:</strong> Risk = f(Threat, Vulnerability, Likelihood, Impact). Risk is a function of the threats that could exploit vulnerabilities, the likelihood a threat event occurs and succeeds, and the impact of a successful exploit. All four must be assessed.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Threat Source</strong><span>The "who or what" — adversarial (nation-states, criminals, insiders), accidental, structural (hardware/software failure), or environmental (disasters).</span></div>
          <div class="cheat-pill"><strong>Vulnerability</strong><span>A weakness that a threat could exploit — only relevant in the context of a realistic threat. A flaw with no realistic threat is low risk.</span></div>
          <div class="cheat-pill"><strong>Likelihood</strong><span>Compound: how likely a threat initiates AND how likely it succeeds given existing controls.</span></div>
          <div class="cheat-pill"><strong>Impact</strong><span>The adverse effect across confidentiality, integrity, and availability — direct and cascading (mission, reputation, legal).</span></div>
        </div>
        <div class="analogy-box"><strong>The car-theft analogy:</strong> the thief is the threat; the unlocked door is the vulnerability; risk is the combination. A thief in a neighborhood of unlocked cars is high risk; a thief who only targets sports cars is low risk for minivan owners even with unlocked doors.</div>`,
        quiz:{ q:"A web app has a Critical SQL-injection CVE. A junior analyst says 'maximum risk, emergency fix.' What context does a senior analyst need first?", opts:["None — a Critical CVE always means maximum risk","Vulnerability severity is only one component — also assess: what threat actors target this app, is it internet-facing or isolated, what data it accesses, and what compensating controls exist. A Critical CVE on an isolated test system can be lower risk than a Moderate CVE on a public system with sensitive data","Severity ratings already include all risk factors","Context only matters below Critical"], ans:1, explain:"CVSS severity is not risk. 800-30 requires combining vulnerability info with threat likelihood and business impact to produce actual risk — the senior analyst is practicing sound methodology." } },

      { title:"Identifying Threat Sources", tagline:"Who and what poses risk — beyond just 'hackers'",
        body:`<p>The first task of the Conduct phase is enumerating <span class="key-term">threat sources</span>. NIST's taxonomy (Appendix D) covers four categories — most programs overemphasize adversarial sources relative to the actual distribution of incidents.</p>
        <div class="threat-card"><b>Adversarial</b><br>Nation-states (highest capability, geopolitical motive), organized crime (financially motivated — ransomware, fraud), hacktivists, competitors (economic espionage), and <strong>insiders</strong> — the most consistently underestimated, with privileged access and trust.</div>
        <div class="threat-card"><b>Accidental</b><br>Unintentional human error — emailing sensitive data to the wrong recipient, deleting production data, misconfiguring storage to be public. Often rivals deliberate attacks in frequency.</div>
        <div class="threat-card"><b>Structural &amp; Environmental</b><br>Hardware aging and software defects (structural); natural disasters, power and HVAC failures, pandemics (environmental) — mitigated through business continuity planning.</div>`,
        quiz:{ q:"A healthcare org's threat assessment focuses only on external hackers. A 6-month review shows 3 external incidents, 11 employee errors, and 4 system failures. What does this reveal?", opts:["The assessment was correct — external adversaries are most sophisticated","It underweighted the most frequent actual sources — accidental and structural causes were 83% of incidents, while external attackers were 17%. Focusing only on hackers misdirects mitigation away from the majority of actual harm","Healthcare only needs to assess external threats","Incident frequency is irrelevant"], ans:1, explain:"Security risk assessment often overweights the dramatic (nation-states) versus the common (employee error). NIST's taxonomy requires considering all four categories so investment matches the actual threat landscape." } }
    ]
  });

  // ---------- US GOVERNMENT & DEFENSE ----------
  F.push({ id:"fedramp", name:"FedRAMP", subtitle:"Federal Risk and Authorization Management Program",
    category:"US Government & Defense", color:"#7a3e9d", lessonsTotal:30, source:"FedRAMP/fedramp_30day_curriculum.html",
    desc:"The U.S. government's standardized security authorization program for cloud services.",
    days:[
      { title:"What Is FedRAMP?", tagline:"The program that made cloud computing possible across government",
        body:`<p>The <strong>Federal Risk and Authorization Management Program (FedRAMP)</strong> provides a standardized approach to security assessment, authorization, and continuous monitoring for cloud services used by federal agencies. Instead of each agency independently assessing the same cloud provider, FedRAMP conducts one rigorous assessment that any agency can rely on — "do once, use many times." It's managed by the FedRAMP PMO within the General Services Administration (GSA).</p>
        <div class="analogy-box"><strong>Real-world analogy:</strong> Think of FedRAMP like the UL certification on electrical products. Instead of every store testing whether a toaster is safe, UL tests it once and every retailer can sell it. FedRAMP does the same for government cloud: one rigorous assessment, validated by an independent assessor, recognized by every agency.</div>
        <div class="highlight-box">Established by OMB policy in 2011, formalized by the FedRAMP Authorization Act (2022). Based on NIST SP 800-53 controls, with impact levels Low, Moderate, High (plus LI-SaaS). Over 300 authorized offerings on the FedRAMP Marketplace.</div>`,
        quiz:{ q:"What problem did FedRAMP solve?", opts:["Cloud was too expensive for agencies","Each agency independently assessed the same cloud providers at enormous cost — FedRAMP created a 'do once, use many times' model recognized by all agencies","Providers refused to work with government","Agencies couldn't afford NIST SP 800-53"], ans:1, explain:"Before FedRAMP, each agency ran its own 12–18 month, $500K+ assessment of the same providers. FedRAMP's reusable authorization made cloud adoption practical instead of prohibitively expensive." } },

      { title:"Why Was FedRAMP Created?", tagline:"The pre-cloud chaos that demanded a government-wide solution",
        body:`<p>By 2010, commercial cloud was transforming IT, but the federal government was locked out — not by cost, but by compliance. FISMA required security authorization, and there was no efficient way to achieve it for cloud.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Redundancy</strong><span>Treasury, HHS, DoD, and dozens of agencies separately assessing the same AWS or Azure with no shared benefit.</span></div>
          <div class="cheat-pill"><strong>Inconsistency</strong><span>Different agencies applied different standards and reached different conclusions about the same service.</span></div>
          <div class="cheat-pill"><strong>Cost &amp; Time</strong><span>Full RMF assessments cost $500K–$1M+ and took 12–18 months — impossible to repeat per agency.</span></div>
          <div class="cheat-pill"><strong>"Cloud First" (2010)</strong><span>OMB directed agencies to prioritize cloud — but you can't have Cloud First without Cloud Secure. FedRAMP was the security answer.</span></div>
        </div>
        <div class="highlight-box">The <strong>FedRAMP Authorization Act (December 2022)</strong> formally codified FedRAMP in statute, requiring agencies to use FedRAMP-authorized cloud services and cementing the program's permanence.</div>`,
        quiz:{ q:"Before FedRAMP, what happened when 50 agencies wanted the same cloud email service?", opts:["They shared one assessment informally","Each of the 50 independently conducted its own full security assessment — 50 redundant assessments at enormous collective cost and time","The provider was auto-approved after 3 agencies assessed it","OMB ran one centralized assessment for all"], ans:1, explain:"There was no mechanism to share assessments. 50 agencies could run 50 separate, largely redundant assessments of the same infrastructure. FedRAMP eliminated this with a shareable authorization." } },

      { title:"The FedRAMP Ecosystem — Who Does What", tagline:"Every player in the authorization universe",
        body:`<p>FedRAMP spans government, the private sector, and an independent assessment community.</p>
        <div class="auth-card"><b>FedRAMP PMO (in GSA)</b><br>Owns and operates FedRAMP — maintains the Marketplace, reviews authorization packages, accredits 3PAOs, and issues templates and guidance.</div>
        <div class="auth-card"><b>JAB — Joint Authorization Board</b><br>The CIOs of DoD, DHS, and GSA. Issues Provisional ATOs (P-ATOs) for the highest-demand services — the most prestigious FedRAMP designation.</div>
        <div class="auth-card"><b>Cloud Service Providers (CSPs)</b><br>AWS, Azure, Google Cloud, Salesforce, and thousands more — they fund assessment, implement controls, and maintain authorization through continuous monitoring.</div>
        <div class="auth-card"><b>3PAOs — Third Party Assessment Organizations</b><br>Accredited independent assessors (the QSAs of FedRAMP) who must be independent of the CSP and follow FedRAMP procedures precisely.</div>
        <div class="auth-card"><b>Federal Agencies</b><br>Use authorized services, sponsor authorizations (Agency path), and contribute ATOs to the Marketplace for reuse.</div>`,
        quiz:{ q:"The Joint Authorization Board consists of CIOs from which three agencies?", opts:["Treasury, State, Justice","DoD, DHS, and GSA — large, diverse cloud consumers with strong security expertise, who issue Provisional ATOs","OMB, NSA, FBI","HHS, VA, DoD"], ans:1, explain:"The JAB comprises the CIOs of DoD (national security), DHS (civilian cybersecurity), and GSA (civilian technology/procurement). JAB P-ATOs represent their collective security judgment." } },

      { title:"FedRAMP Baselines — Low, Moderate, High, LI-SaaS", tagline:"How risk determines the level of security required",
        body:`<p>FedRAMP uses the same FIPS 199 impact levels as the RMF, plus a tailored <span class="key-term">LI-SaaS</span> baseline for very low-risk SaaS.</p>
        <div class="baseline-grid">
          <div class="bl-low"><strong style="color:#27500A">Low</strong><br><span style="font-size:12px">~125 controls. Publicly available info, no personal data. Few federal systems qualify.</span></div>
          <div class="bl-mod"><strong style="color:#633806">Moderate (most common)</strong><br><span style="font-size:12px">~325 controls. Most federal business operations — email, productivity, non-sensitive PII. ~80% of use cases.</span></div>
          <div class="bl-high"><strong style="color:#4A1B0C">High</strong><br><span style="font-size:12px">~420 controls. Law enforcement, health records, financial systems where compromise could be catastrophic.</span></div>
          <div class="bl-lisaas"><strong style="color:#0D3A4D">LI-SaaS (tailored)</strong><br><span style="font-size:12px">~37 controls. Very low-risk SaaS — no PII beyond login, publicly releasable data. Fastest path.</span></div>
        </div>
        <div class="highlight-box"><strong>The agency categorizes, not the provider:</strong> the agency determines what data it will process and therefore the impact level. A provider with Moderate authorization can't be used for High-impact data — the agency needs a High service.</div>`,
        quiz:{ q:"An agency wants a collaboration tool for internal draft policy documents — no PII, no classified data. What baseline likely applies?", opts:["High — all federal documents need maximum protection","Low or Moderate — draft, pre-decisional documents carry Low-to-Moderate sensitivity; most internal working documents start at Moderate","LI-SaaS — because there's no PII","None — collaboration tools are exempt"], ans:1, explain:"Draft pre-decisional documents aren't publicly releasable (so not LI-SaaS) but aren't classified or PII either — typically Low-to-Moderate, with Moderate the common starting point for internal working documents." } },

      { title:"The Authorization Boundary", tagline:"Defining exactly what's covered — and what isn't",
        body:`<p>The <span class="key-term">authorization boundary</span> explicitly defines which systems and components are included in the assessment versus which fall outside it — directly affecting what agencies can rely on.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Inside the Boundary</strong><span>Everything the CSP controls that stores, processes, or transmits federal information — its servers, managed services, and networks.</span></div>
          <div class="cheat-pill"><strong>Outside the Boundary</strong><span>Third-party sub-services the CSP uses but doesn't control — external auth, email, or analytics. Documented as dependencies but not assessed.</span></div>
          <div class="cheat-pill"><strong>Interconnections</strong><span>Agency systems that connect to the service are documented but assessed separately under their own authorization.</span></div>
          <div class="cheat-pill"><strong>Leveraged Authorizations</strong><span>A SaaS on FedRAMP-authorized AWS can inherit controls from the underlying platform — documented in the SSP.</span></div>
        </div>
        <div class="auth-card"><b>The Boundary Diagram</b><br>Every System Security Plan includes a diagram showing what's inside and outside, how data flows, and where federal information resides. It's the first thing assessors review — an inaccurate boundary makes the whole assessment suspect.</div>`,
        quiz:{ q:"A CSP's Moderate authorization covers its platform, but it sends alerts via a third-party email service NOT in the boundary. Is that email service covered by the authorization?", opts:["Yes — any service the CSP uses is covered","No — it's outside the boundary, so not assessed or validated. The CSP must document the dependency, and the agency must understand it operates outside the validated posture","Yes — email is always core","Only if alerts contain federal data"], ans:1, explain:"Components outside the boundary are not assessed or covered, regardless of integration. The CSP documents external services; the agency must evaluate the residual risk of relying on an un-assessed component." } },

      { title:"The FedRAMP Marketplace", tagline:"The catalog of every authorized cloud service",
        body:`<p>The <span class="key-term">FedRAMP Marketplace</span> (marketplace.fedramp.gov) is the public, searchable catalog of all cloud services authorized or pursuing authorization — the essential first stop for agency cloud procurement.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>FedRAMP Authorized</strong><span>Completed the full process (JAB P-ATO or Agency ATO). The only status that lets agencies immediately use the service under FedRAMP.</span></div>
          <div class="cheat-pill"><strong>In Process</strong><span>Actively working toward authorization but not yet there. Agencies may plan around it but can't fully rely on it.</span></div>
          <div class="cheat-pill"><strong>FedRAMP Ready</strong><span>Passed a 3PAO readiness check — signals capability, but is not an authorization.</span></div>
          <div class="cheat-pill"><strong>Agency Reuse</strong><span>An agency's ATO is contributed to the Marketplace for other agencies to leverage — directly implementing "do once, use many."</span></div>
        </div>
        <div class="analogy-box"><strong>The federal cloud menu:</strong> "Authorized" items are ready to order; "In Process" is coming soon; "FedRAMP Ready" passed the freshness check but isn't fully prepared. To comply with FedRAMP, agencies order from the "Authorized" section — otherwise they must do their own cooking (a full agency assessment).</div>`,
        quiz:{ q:"Which Marketplace status lets an agency immediately use a cloud service under FedRAMP?", opts:["In Process","FedRAMP Ready","FedRAMP Authorized (JAB P-ATO or Agency ATO)","Any status with a 3PAO assessment"], ans:2, explain:"Only 'FedRAMP Authorized' permits immediate use under FedRAMP. 'In Process' and 'FedRAMP Ready' indicate progress or capability but are not authorizations." } }
    ]
  });

  F.push({ id:"fisma", name:"FISMA", subtitle:"Federal Information Security Modernization Act",
    category:"US Government & Defense", color:"#7a3e9d", lessonsTotal:30, source:"FISMA/fisma_30day_curriculum.html",
    desc:"The U.S. law requiring federal agencies to secure their information systems.",
    days:[
      { title:"What Is FISMA?", tagline:"The law that makes federal cybersecurity mandatory",
        body:`<p><span class="key-term">FISMA</span> — the Federal Information Security Modernization Act (2014, updating the original 2002 law) — is the U.S. federal law requiring agencies to develop, document, and implement agency-wide information security programs.</p>
        <div class="analogy-box"><strong>For executives:</strong> FISMA is the legal mandate; the NIST RMF (SP 800-37) and the SP 800-53 control catalog are how agencies actually comply. For contractors, FISMA obligations flow down through contracts — so it shapes how anyone does business with the government.</div>
        <div class="highlight-box">FISMA makes each agency head responsible for security, requires risk-based security programs, mandates annual reporting to Congress, and is operationalized through NIST standards (RMF, SP 800-53, FIPS 199/200) with oversight by OMB and CISA.</div>`,
        quiz:{ q:"What is FISMA?", opts:["A voluntary cloud standard","A U.S. federal law requiring agencies to secure their information systems, implemented through NIST guidance","An encryption algorithm","An ISO standard"], ans:1, explain:"FISMA is the Federal Information Security Modernization Act — the law mandating information security programs for federal agencies, operationalized via NIST's RMF and control catalog." } },

      { title:"Why Was FISMA Created?", tagline:"The federal cybersecurity crisis that demanded a law",
        body:`<p>By the late 1990s, federal information security was dangerously inadequate — each agency did whatever it chose, or nothing. A 2001 GAO report found agencies lacked basic controls, couldn't identify all their systems, and had no consistent way to measure security.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Solar Sunrise (1998)</strong><span>Two California teenagers penetrated unclassified DoD systems undetected for days during a Gulf buildup — triggering congressional alarm.</span></div>
          <div class="cheat-pill"><strong>Moonlight Maze (1998–99)</strong><span>A sustained intrusion (believed Russian) exfiltrated Pentagon, NASA, and DoE data for nearly two years — early nation-state espionage.</span></div>
          <div class="cheat-pill"><strong>GAO High-Risk List</strong><span>Federal information security has been on GAO's High-Risk List since 1997, creating permanent pressure for reform.</span></div>
          <div class="cheat-pill"><strong>2002 → 2014</strong><span>FISMA 2002 devolved into a paperwork checkbox; the 2014 update shifted to continuous monitoring and genuine risk management.</span></div>
        </div>
        <div class="analogy-box"><strong>Annual physical vs. continuous monitor:</strong> FISMA 2002 was like an annual checkup — a snapshot. FISMA 2014 is a continuous health monitor — real-time visibility with alerts. In a dynamic threat environment, continuous visibility beats annual snapshots.</div>`,
        quiz:{ q:"What flaw in FISMA 2002 did FISMA 2014 correct?", opts:["Too many technical requirements","FISMA 2002 devolved into a compliance checkbox — agencies produced documentation while remaining vulnerable; 2014 shifted to continuous monitoring and genuine risk-based management","It only applied to DoD","It required too much spending on tools"], ans:1, explain:"FISMA 2002 created a documentation industry where agencies could show green compliance while being breached. FISMA 2014 refocused the law on actual security posture through continuous monitoring." } },

      { title:"FISMA's Scope — Who Must Comply?", tagline:"Security obligations follow the data, including to contractors",
        body:`<p><span class="key-term">FISMA's scope</span> extends well beyond government employees — security requirements follow federal data wherever it goes.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Civilian Agencies</strong><span>All executive-branch departments and independent agencies (HHS, VA, Treasury, EPA, SEC...), overseen by OMB.</span></div>
          <div class="cheat-pill"><strong>DoD &amp; Intelligence Community</strong><span>Subject to FISMA but through their own, typically more stringent frameworks given national-security data.</span></div>
          <div class="cheat-pill"><strong>Federal Contractors</strong><span>Companies operating federal systems or handling federal data — cloud providers, IT firms, defense contractors — have FISMA-derived obligations through their contracts.</span></div>
          <div class="cheat-pill"><strong>NOT Congress or Judiciary</strong><span>FISMA applies to the executive branch only — a common misconception.</span></div>
        </div>
        <div class="highlight-box"><strong>Why contractor inclusion matters:</strong> the government outsources huge portions of IT. If FISMA only covered employees, vast amounts of federal data held by vendors would sit outside the framework. Contractor inclusion ensures security follows the data.</div>`,
        quiz:{ q:"A cloud company wins a contract to host a federal agency's financial system. Is it subject to FISMA?", opts:["No — FISMA only applies to federal employees","Yes — contractors operating federal systems or handling federal data are subject to applicable FISMA requirements through their contracts; obligations follow the data","Only with 500+ federal customers","Only for contracts over $10 million"], ans:1, explain:"FISMA extends to systems operated by contractors on behalf of agencies. The cloud company is operating a federal system — it must implement controls, support the agency's program, and often obtain an ATO." } },

      { title:"The FISMA Ecosystem", tagline:"Who does what in federal cybersecurity governance",
        body:`<p>FISMA creates an ecosystem of agencies with distinct roles.</p>
        <div class="agency-card"><b>OMB</b> — Central policy and oversight; issues government-wide cyber policy (Zero Trust, logging), sets reporting requirements, and submits the annual FISMA report to Congress. Its budget authority makes its directives effectively mandatory.</div>
        <div class="agency-card"><b>NIST</b> — Develops the technical standards agencies implement (RMF, SP 800-53/53A, FIPS 199/200, CSF). No enforcement authority — it provides the blueprint.</div>
        <div class="agency-card"><b>CISA</b> — The operational cyber agency: runs the CDM monitoring program, issues mandatory Binding Operational Directives, and maintains the Known Exploited Vulnerabilities catalog. The "fire department" of federal cyber.</div>
        <div class="agency-card"><b>Inspectors General</b> — Independent annual evaluators of each agency's FISMA program; report to Congress, and negative findings drive scrutiny. FISMA's primary auditors.</div>
        <div class="agency-card"><b>GAO</b> — The congressional watchdog; maintains the High-Risk List and reviews governmentwide weaknesses.</div>`,
        quiz:{ q:"A CISA Binding Operational Directive requires patching a critical vulnerability within 14 days. Must the agency comply?", opts:["No — BODs are advisory","Yes — BODs are mandatory for federal civilian executive-branch agencies; missing deadlines results in IG findings and OMB scrutiny","Only if OMB issues a separate memo","Only for agencies with 10,000+ employees"], ans:1, explain:"'Binding' is deliberate — CISA has statutory authority to issue BODs, they're mandatory for civilian agencies, and IG FISMA evaluations check compliance with their deadlines." } },

      { title:"FISMA's Eight Core Requirements", tagline:"What the law actually mandates",
        body:`<p>FISMA establishes specific statutory obligations, with implementation detail delegated to OMB policy and NIST standards.</p>
        <div class="req-card"><b>1 — Periodic Risk Assessments</b> — assess risk to operations, assets, and individuals (feeds the RMF).</div>
        <div class="req-card"><b>2 — Policies &amp; Procedures</b> — agency-wide security policies covering risk, planning, training, testing, and incident response.</div>
        <div class="req-card"><b>3 — System Security Plans (SSPs)</b> — document the controls and rules of behavior for each system; the foundation of every authorization.</div>
        <div class="req-card"><b>4 — Security Awareness Training</b> — ongoing training for all personnel and contractors, with role-based training for key staff.</div>
        <div class="req-card"><b>5 — Periodic Testing &amp; Evaluation</b> — test control effectiveness at least annually, feeding remediation.</div>
        <div class="req-card"><b>6 — Plans of Action &amp; Milestones (POA&amp;Ms)</b> — track and remediate deficiencies, reported quarterly to OMB.</div>
        <div class="req-card"><b>7 — Incident Response</b> — detect, report, and respond; report major incidents to Congress within 7 days (FISMA 2014).</div>
        <div class="req-card"><b>8 — Continuity of Operations</b> — business continuity and disaster recovery to protect availability.</div>`,

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="GRC Academy — executive-friendly training on IT and cybersecurity governance, risk, and compliance frameworks.">
<title>GRC Academy — Framework Training for Executives</title>
<style>
  /* ============ DESIGN SYSTEM ============ */
  :root{
    --bg:#f6f5f2; --surface:#ffffff; --surface-2:#f1efe8;
    --ink:#1a1a18; --ink-soft:#3a3a36; --muted:#6b6b68; --faint:#9a9a94;
    --line:#e2e0d8; --line-soft:#ece9e1;
    --primary:#0f6e56; --primary-deep:#0a5141; --primary-ink:#e1f5ee; --primary-tint:#e7f3ef;
    --navy:#1f3a4d; --navy-ink:#e7eef3;
    --amber:#9a6213; --amber-tint:#faeeda;
    --radius:14px; --radius-sm:9px;
    --shadow:0 1px 2px rgba(20,20,18,.04),0 8px 24px -12px rgba(20,20,18,.12);
    --shadow-lg:0 1px 2px rgba(20,20,18,.05),0 24px 60px -20px rgba(20,20,18,.22);
    --maxw:1180px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased;}
  img{max-width:100%;}
  button{font-family:inherit;cursor:pointer;}
  a{color:var(--primary);}
  .hidden{display:none !important;}

  /* ============ BUTTONS ============ */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:600;
    padding:11px 20px;border-radius:var(--radius-sm);border:1px solid transparent;transition:.15s;white-space:nowrap;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:var(--primary-deep);}
  .btn-ghost{background:transparent;color:var(--ink);border-color:var(--line);}
  .btn-ghost:hover{background:var(--surface-2);}
  .btn-light{background:rgba(255,255,255,.16);color:#fff;border-color:rgba(255,255,255,.28);}
  .btn-light:hover{background:rgba(255,255,255,.26);}
  .btn:disabled{opacity:.4;cursor:default;}
  .btn-sm{padding:7px 14px;font-size:13px;}
  .btn-block{width:100%;}

  /* ============ TOP NAV ============ */
  .appbar{position:sticky;top:0;z-index:40;background:rgba(246,245,242,.85);backdrop-filter:saturate(160%) blur(12px);
    border-bottom:1px solid var(--line);}
  .appbar-inner{max-width:var(--maxw);margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:16px;}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;letter-spacing:-.2px;cursor:pointer;}
  .brand-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--navy));
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:800;flex-shrink:0;}
  .brand small{display:block;font-size:10px;font-weight:600;letter-spacing:1.4px;color:var(--muted);text-transform:uppercase;}
  .spacer{flex:1;}
  .user-chip{display:flex;align-items:center;gap:9px;padding:5px 6px 5px 12px;border:1px solid var(--line);border-radius:99px;background:var(--surface);}
  .user-chip .uname{font-size:13px;font-weight:600;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .avatar{width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}

  /* ============ LAYOUT ============ */
  .view{max-width:var(--maxw);margin:0 auto;padding:26px 20px 70px;}
  .view-narrow{max-width:780px;}

  /* ============ LANDING ============ */
  .hero{text-align:center;padding:46px 20px 34px;}
  .eyebrow{display:inline-block;font-size:12px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--primary);
    background:var(--primary-tint);padding:6px 14px;border-radius:99px;margin-bottom:18px;}
  .hero h1{font-size:clamp(28px,5vw,46px);line-height:1.1;letter-spacing:-1px;font-weight:800;max-width:760px;margin:0 auto 16px;}
  .hero h1 .grad{background:linear-gradient(120deg,var(--primary),var(--navy));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .hero p.lead{font-size:clamp(15px,2.4vw,18px);color:var(--ink-soft);max-width:600px;margin:0 auto 26px;}
  .hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .trust-row{display:flex;gap:26px;justify-content:center;flex-wrap:wrap;margin-top:34px;color:var(--muted);font-size:13px;}
  .trust-row b{color:var(--ink);font-size:20px;display:block;font-weight:800;}
  .feature-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;margin-top:48px;}
  .feature{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);}
  .feature .ficon{width:40px;height:40px;border-radius:10px;background:var(--primary-tint);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px;}
  .feature h3{font-size:16px;margin-bottom:6px;}
  .feature p{font-size:13.5px;color:var(--muted);}

  /* ============ AUTH ============ */
  .auth-wrap{max-width:420px;margin:40px auto;}
  .auth-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:30px 28px;box-shadow:var(--shadow-lg);}
  .auth-card h2{font-size:22px;margin-bottom:4px;letter-spacing:-.4px;}
  .auth-card .sub{font-size:13.5px;color:var(--muted);margin-bottom:22px;}
  .tabs{display:flex;background:var(--surface-2);border-radius:10px;padding:4px;margin-bottom:22px;}
  .tabs button{flex:1;border:0;background:transparent;padding:9px;border-radius:7px;font-size:13.5px;font-weight:600;color:var(--muted);}
  .tabs button.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow);}
  .field{margin-bottom:15px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
  .field input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit;background:var(--surface);transition:.15s;}
  .field input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-tint);}
  .auth-note{font-size:12px;color:var(--faint);text-align:center;margin-top:16px;line-height:1.5;}
  .form-error{background:#fcebeb;color:#7a1c1c;border:1px solid #f3c9c9;border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:14px;}

  /* ============ DASHBOARD ============ */
  .dash-head{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;flex-wrap:wrap;margin-bottom:8px;}
  .dash-head h1{font-size:26px;letter-spacing:-.6px;}
  .dash-head p{color:var(--muted);font-size:14px;margin-top:2px;}
  .stat-band{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:22px 0 30px;}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);}
  .stat .k{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);}
  .stat .v{font-size:28px;font-weight:800;letter-spacing:-1px;margin-top:3px;}
  .stat .v small{font-size:14px;color:var(--muted);font-weight:600;}

  .cat-block{margin-bottom:30px;}
  .cat-head{display:flex;align-items:center;gap:10px;margin:0 2px 13px;}
  .cat-head h2{font-size:15px;font-weight:700;letter-spacing:-.2px;}
  .cat-head .count{font-size:12px;color:var(--muted);background:var(--surface-2);padding:2px 9px;border-radius:99px;font-weight:600;}
  .cat-head .rule{flex:1;height:1px;background:var(--line);}

  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:15px;}
  .fw-card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;
    box-shadow:var(--shadow);transition:.18s;cursor:pointer;display:flex;flex-direction:column;min-height:172px;}
  .fw-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--line-soft);}
  .fw-top{display:flex;align-items:center;gap:11px;margin-bottom:11px;}
  .fw-badge{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0;letter-spacing:-.5px;}
  .fw-card h3{font-size:15.5px;line-height:1.25;letter-spacing:-.2px;}
  .fw-card .fw-cat{font-size:11.5px;color:var(--muted);font-weight:600;}
  .fw-desc{font-size:13px;color:var(--ink-soft);line-height:1.5;flex:1;}
  .fw-foot{margin-top:13px;}
  .fw-meta{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--muted);margin-bottom:7px;font-weight:600;}
  .pbar{height:6px;border-radius:99px;background:var(--surface-2);overflow:hidden;}
  .pbar > i{display:block;height:100%;border-radius:99px;background:var(--primary);transition:width .4s;}
  .ribbon{position:absolute;top:13px;right:13px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
    padding:3px 8px;border-radius:99px;}
  .ribbon.full{background:var(--primary-tint);color:var(--primary-deep);}
  .ribbon.done{background:var(--navy);color:#fff;}

  /* ============ MODULE VIEWER ============ */
  .mod-bar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
  .mod-bar .mod-title h1{font-size:21px;letter-spacing:-.5px;}
  .mod-bar .mod-title p{font-size:13px;color:var(--muted);}
  .mod-prog{display:flex;align-items:center;gap:10px;}
  .mod-prog .pbar{width:160px;}
  .mod-prog span{font-size:12px;color:var(--muted);font-weight:600;}
  .day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:5px;margin-bottom:18px;}
  .day-pip{height:34px;border-radius:9px;border:1px solid var(--line);background:var(--surface);font-size:12px;font-weight:600;
    color:var(--muted);display:flex;align-items:center;justify-content:center;position:relative;transition:.12s;}
  .day-pip:hover{background:var(--surface-2);border-color:var(--faint);}
  .day-pip.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .day-pip.complete{background:var(--primary);color:#fff;border-color:var(--primary);}
  .day-pip.complete.active{background:var(--primary-deep);}
  .day-pip.locked{opacity:.45;}

  .lesson-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:26px 28px;box-shadow:var(--shadow);}
  .lesson-head{display:flex;align-items:flex-start;gap:15px;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--line-soft);}
  .day-badge{min-width:56px;height:56px;border-radius:12px;background:var(--surface-2);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
  .day-badge b{font-size:22px;font-weight:800;line-height:1;}
  .day-badge span{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin-top:2px;}
  .lesson-head h2{font-size:20px;letter-spacing:-.4px;line-height:1.2;}
  .lesson-head .tagline{font-size:14px;color:var(--muted);margin-top:3px;}

  /* lesson body content classes (mirrors source curricula) */
  .lesson-body{font-size:14.5px;line-height:1.75;color:var(--ink);}
  .lesson-body p{margin-bottom:.85rem;}
  .lesson-body strong{font-weight:700;}
  .key-term{background:var(--surface-2);color:var(--ink);border-radius:5px;padding:1px 7px;font-weight:600;}
  .highlight-box{background:var(--surface-2);border-left:3px solid var(--navy);border-radius:0 9px 9px 0;padding:.8rem 1.05rem;margin:.85rem 0;font-size:13.8px;}
  .analogy-box{background:#eaf3de;border-left:3px solid #3b6d11;border-radius:0 9px 9px 0;padding:.8rem 1.05rem;margin:.85rem 0;font-size:13.8px;}
  .warning-box{background:var(--amber-tint);border-left:3px solid var(--amber);border-radius:0 9px 9px 0;padding:.8rem 1.05rem;margin:.85rem 0;font-size:13.8px;}
  .info-box{background:#e6f1fb;border-left:3px solid #185fa5;border-radius:0 9px 9px 0;padding:.8rem 1.05rem;margin:.85rem 0;font-size:13.8px;}
  .cheat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:.85rem 0;}
  .cheat-pill{background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:.65rem .85rem;font-size:13px;}
  .cheat-pill strong{display:block;font-weight:700;margin-bottom:2px;}
  .cheat-pill span{color:var(--muted);font-size:12.5px;}
  .clause-card{background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:.7rem .9rem;font-size:13.3px;margin-bottom:7px;}
  .clause-card b{font-weight:700;}
  .annex-card{background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:.7rem .9rem;font-size:13.3px;margin-bottom:7px;}
  .badge-row{display:flex;flex-wrap:wrap;gap:6px;margin:.6rem 0;}
  .badge{font-size:11.5px;padding:4px 10px;border-radius:99px;font-weight:600;}
  .badge-gray{background:var(--surface-2);color:var(--ink-soft);}
  .badge-blue{background:#e6f1fb;color:#0c447c;}
  .badge-green{background:#eaf3de;color:#27500a;}
  .badge-amber{background:var(--amber-tint);color:#633806;}
  .pdca-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:.85rem 0;}
  .pdca-plan{background:#e6f1fb;border:1px solid #85b7eb;border-radius:9px;padding:.7rem .9rem;font-size:13px;}
  .pdca-do{background:#e1f5ee;border:1px solid #9fe1cb;border-radius:9px;padding:.7rem .9rem;font-size:13px;}
  .pdca-check{background:var(--amber-tint);border:1px solid #fac775;border-radius:9px;padding:.7rem .9rem;font-size:13px;}
  .pdca-act{background:#fcebeb;border:1px solid #f09595;border-radius:9px;padding:.7rem .9rem;font-size:13px;}
  .badge-red{background:#fcebeb;color:#7a1c1c;}
  .badge-teal{background:#e1f5ee;color:#085041;}
  .badge-coral{background:#faece7;color:#7a2c12;}
  .badge-purple{background:#eeedfe;color:#3c3489;}
  .tag-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:.7rem 0 .3rem;}
  /* NIST CSF function header blocks */
  .fn-govern,.fn-identify,.fn-protect,.fn-detect,.fn-respond,.fn-recover{display:block;border-radius:9px;padding:.7rem .9rem;margin:.6rem 0;font-size:13.3px;border:1px solid var(--line);}
  .fn-govern{background:#eeedfe;border-color:#afa9ec;}
  .fn-identify{background:#e6f1fb;border-color:#85b7eb;}
  .fn-protect{background:#eaf3de;border-color:#97c459;}
  .fn-detect{background:#faeeda;border-color:#fac775;}
  .fn-respond{background:#faece7;border-color:#f0a58f;}
  .fn-recover{background:#e1f5ee;border-color:#9fe1cb;}
  .fn-map,.fn-measure,.fn-manage{display:block;border-radius:9px;padding:.7rem .9rem;margin:.6rem 0;font-size:13.3px;border:1px solid var(--line);}
  .fn-map{background:#e6f1fb;border-color:#85b7eb;}
  .fn-measure{background:#faeeda;border-color:#fac775;}
  .fn-manage{background:#eaf3de;border-color:#97c459;}
  /* control / theme cards (ISO 27002 etc.) */
  .theme-org,.theme-ppl,.theme-phy,.theme-tec,.ctrl-em,.ctrl-card{display:block;border-radius:9px;padding:.65rem .85rem;margin-bottom:7px;font-size:13.2px;border:1px solid var(--line);background:var(--surface-2);}
  .theme-org b,.theme-ppl b,.theme-phy b,.theme-tec b,.ctrl-em b{font-weight:700;color:var(--ink);}
  .theme-ppl{background:#e6f1fb;border-color:#85b7eb;}
  .theme-phy{background:#eaf3de;border-color:#97c459;}
  .theme-tec{background:#eeedfe;border-color:#afa9ec;}
  .ctrl-em{background:#f1efe8;}
  .ctrl-new{display:block;border-radius:9px;padding:.65rem .85rem;margin-bottom:7px;font-size:13.2px;border:1px solid var(--line);border-left:3px solid var(--primary);background:var(--primary-tint);}
  .ctrl-new b{font-weight:700;color:var(--ink);}
  .principle-card{display:block;border-radius:9px;padding:.65rem .85rem;margin-bottom:7px;font-size:13.2px;border:1px solid var(--line);border-left:3px solid var(--navy);background:var(--surface-2);}
  .principle-card b{font-weight:700;color:var(--ink);}
  .pub-card,.threat-card{display:block;border-radius:9px;padding:.65rem .85rem;margin-bottom:7px;font-size:13.2px;border:1px solid var(--line);background:var(--surface-2);}
  .pub-card{border-left:3px solid var(--navy);}
  .threat-card{border-left:3px solid #854f0b;}
  .pub-card b,.threat-card b{font-weight:700;color:var(--ink);}
  .auth-card{display:block;border-radius:9px;padding:.65rem .85rem;margin-bottom:7px;font-size:13.2px;border:1px solid var(--line);border-left:3px solid var(--primary);background:var(--surface-2);}
  .auth-card b{font-weight:700;color:var(--ink);}
  .agency-card{display:block;border-radius:9px;padding:.65rem .85rem;margin-bottom:7px;font-size:13.2px;border:1px solid var(--line);border-left:3px solid var(--navy);background:var(--surface-2);}
  .agency-card b{font-weight:700;color:var(--ink);}
  .domain-card{display:block;border-radius:9px;padding:.6rem .85rem;margin-bottom:6px;font-size:13.2px;border:1px solid var(--line);border-left:3px solid var(--primary);background:var(--surface-2);}
  .domain-card b{font-weight:700;color:var(--ink);}
  .vuln-card,.attack-card{display:block;border-radius:9px;padding:.6rem .85rem;margin-bottom:6px;font-size:13.2px;border:1px solid var(--line);background:var(--surface-2);}
  .vuln-card{border-left:3px solid #854f0b;}
  .attack-card{border-left:3px solid #7a1c1c;background:#fcebeb;}
  .vuln-card b,.attack-card b{font-weight:700;color:var(--ink);}
  .area-card{display:block;border-radius:9px;padding:.65rem .85rem;margin-bottom:7px;font-size:13.2px;border:1px solid var(--line);border-left:3px solid #0c6b80;background:#e6f1fb;}
  .area-card b{font-weight:700;color:var(--ink);}
  .ig-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin:.75rem 0;}
  .ig1,.ig2,.ig3{border-radius:9px;padding:.7rem .9rem;font-size:13px;border:1px solid var(--line);}
  .ig1{background:#eaf3de;border-color:#97c459;}
  .ig2{background:var(--amber-tint);border-color:#fac775;}
  .ig3{background:#fcebeb;border-color:#f0a58f;}
  .baseline-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin:.75rem 0;}
  .bl-low,.bl-mod,.bl-high,.bl-lisaas{border-radius:9px;padding:.7rem .9rem;font-size:13px;border:1px solid var(--line);}
  .bl-low{background:#eaf3de;border-color:#97c459;}
  .bl-mod{background:var(--amber-tint);border-color:#fac775;}
  .bl-high{background:#fcebeb;border-color:#f0a58f;}
  .bl-lisaas{background:#e6f1fb;border-color:#85b7eb;}
  .step-card{display:block;border-radius:9px;padding:.65rem .85rem;margin-bottom:7px;font-size:13.2px;border:1px solid var(--line);border-left:3px solid var(--primary);background:var(--surface-2);}
  .step-card b{font-weight:700;color:var(--ink);}
  .impact-grid{display:grid;grid-template-columns:1fr;gap:8px;margin:.75rem 0;}
  .impact-low,.impact-mod,.impact-high{border-radius:9px;padding:.7rem .9rem;font-size:13px;border:1px solid var(--line);}
  .impact-low{background:#eaf3de;border-color:#97c459;}
  .impact-mod{background:var(--amber-tint);border-color:#fac775;}
  .impact-high{background:#fcebeb;border-color:#f0a58f;}
  .badge-forest{background:#eaf3de;color:#27500a;}
  .badge-pink{background:#fbeaf0;color:#4b1528;}
  .goal-card,.req-card{display:block;border-radius:9px;padding:.65rem .85rem;margin-bottom:7px;font-size:13.2px;border:1px solid var(--line);background:var(--surface-2);}
  .goal-card{border-left:3px solid var(--navy);}
  .req-card{border-left:3px solid var(--primary);}
  .goal-card b,.req-card b{font-weight:700;color:var(--ink);}
  .level-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;margin:.75rem 0;}
  .level-1,.level-2,.level-3{border-radius:9px;padding:.7rem .9rem;font-size:13px;border:1px solid var(--line);}
  .level-1{background:#eaf3de;border-color:#97c459;}
  .level-2{background:var(--amber-tint);border-color:#fac775;}
  .level-3{background:#fcebeb;border-color:#f0a58f;}
  .risk-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin:.75rem 0;}

  .tsc-availability{background:#e6f1fb;border-color:#85b7eb;}

  .tsc-confidential{background:#eeedfe;border-color:#afa9ec;}

  .annex-card{display:block;border-radius:9px;padding:.65rem .85rem;margin-bottom:7px;font-size:13.2px;border:1px solid var(--line);background:var(--surface-2);}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--navy);color:#fff;
    padding:12px 20px;border-radius:99px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);z-index:90;transition:.3s;opacity:0;}

<script id="fw-data">
if(!window.FRAMEWORKS || !window.FRAMEWORKS.length){
window.FRAMEWORKS = [];
(function(){
  // helper to build a single-lesson overview for frameworks awaiting full import
  function overview(intro, learn, quiz){
    return [{ title:"Executive Overview", tagline:"What this framework is and why it matters to leadership",
      body:intro + '<div class="highlight-box"><strong>What you will learn in the full curriculum:</strong> ' + learn + '</div>',
      quiz:quiz, _partial:true }];
  }

  const F = window.FRAMEWORKS;

  // ---------- FLAGSHIP: ISO 27001 (full content) ----------
  F.push({ id:"iso27001", name:"ISO/IEC 27001", subtitle:"Information Security Management Systems",
    category:"ISO/IEC Standards", color:"#0f6e56", lessonsTotal:30,
    source:"ISO/ISO27001/iso27001_30day_curriculum.html",
    desc:"The global gold standard for building a certifiable Information Security Management System (ISMS).",
    days:[
      { title:"What Is ISO 27001?", tagline:"The international gold standard for information security management",
        body:`<p>Imagine you run a company that handles thousands of customers' personal and financial data. A major bank wants to do business with you — but first they ask: "How do we know your information security is good enough to trust with our customers' data?" You could hand them a 200-page policy document and hope they read it. Or you could show them one internationally recognized certificate that says an independent auditor has already verified your security program meets the world's highest standard. That certificate is <span class="key-term">ISO 27001</span>.</p>
        <p>ISO 27001 is the world's most widely recognized international standard for <strong>Information Security Management Systems (ISMS)</strong>. Its full official name is <em>ISO/IEC 27001:2022 — Information security, cybersecurity and privacy protection — Information security management systems — Requirements</em>. It was first published in 2005, significantly updated in 2013, and most recently revised in <strong>October 2022</strong>.</p>
        <div class="analogy-box"><strong>Real-world analogy:</strong> Think of ISO 27001 like a Michelin star rating for restaurants — but for information security. A Michelin star doesn't just mean the food is good today; it means the restaurant has been independently evaluated and consistently meets rigorous standards across cooking, ingredients, service, and consistency. ISO 27001 certification means an independent auditor has verified that an organization systematically manages information security risks — not just that they have some security tools in place.</div>
        <div class="highlight-box">ISO 27001 is certifiable — organizations can obtain an internationally recognized certificate from an accredited certification body proving they meet the standard. This certificate is accepted by customers, partners, regulators, and governments worldwide. It is not a law or regulation — it's a voluntary standard that has become a de facto market requirement in technology, finance, healthcare, and government contracting.</div>
        <p>Over 70,000 certificates have been issued worldwide across 150+ countries. ISO 27001 certification has become the primary way organizations prove information security competence to customers and partners globally.</p>`,
        quiz:{ q:"What does ISO 27001 certify about an organization?", opts:["That their software products have no bugs","That they have independently verified they systematically manage information security risks through an Information Security Management System (ISMS)","That they comply with GDPR","That their network is unhackable"], ans:1, explain:"ISO 27001 certifies that an organization has implemented a systematic, documented, and independently audited Information Security Management System (ISMS) for managing information security risks. It does not guarantee specific outcomes like 'no breaches' — it certifies the management system for identifying and treating risks." } },

      { title:"Why Was ISO 27001 Created?", tagline:"The global information security crisis that demanded a universal answer",
        body:`<p>By the late 1990s and early 2000s, the internet had transformed business — and with it, the attack surface for information security. Organizations were struggling with a familiar problem: every customer, partner, regulator, and auditor was asking different security questions, requiring different documentation, and accepting different evidence of security competence.</p>
        <div class="highlight-box"><strong>The origin story:</strong> ISO 27001's roots trace back to a 1995 UK government standard called BS 7799, developed by the British Standards Institution. This standard recognized that organizations needed a structured way to manage information security — not just buy security products and hope for the best. The standard was adopted by ISO in 2000 (as ISO 17799) and then restructured into the current certifiable management system standard (ISO 27001) in 2005.</div>
        <p>Several persistent problems drove the need for a global information security standard:</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>No Common Language</strong><span>Organizations couldn't compare security approaches because there was no common framework. "We take security seriously" meant something different to everyone.</span></div>
          <div class="cheat-pill"><strong>Questionnaire Overload</strong><span>Organizations were buried under incompatible security questionnaires from customers, partners, and regulators.</span></div>
          <div class="cheat-pill"><strong>Point-in-Time Compliance</strong><span>Security audits were snapshots that told you about the past, not the present. No way to demonstrate ongoing, systematic management.</span></div>
          <div class="cheat-pill"><strong>Technology Over Management</strong><span>Organizations bought firewalls and antivirus but had no systematic approach to identifying what needed protecting and which risks to treat.</span></div>
        </div>
        <div class="analogy-box"><strong>The management system insight:</strong> ISO 27001's most important contribution isn't a list of security controls — it's the insight that information security requires a <em>management system</em>, not just security products. Just as quality management systems (ISO 9001) ensure consistent quality in manufacturing, an ISMS ensures consistent, systematic, improving information security management.</div>`,
        quiz:{ q:"What was the key management insight that made ISO 27001 different from simply listing security controls?", opts:["It listed more controls than any other standard","It recognized that information security requires a management system — a systematic, documented, continuously improving approach — not just the purchase of security products","It made security legally mandatory for the first time","It was the first standard to mention cybersecurity"], ans:1, explain:"ISO 27001's foundational insight is that effective information security is achieved through a management system — systematic processes for identifying risks, deciding how to treat them, implementing controls, monitoring effectiveness, and continuously improving." } },

      { title:"ISO/IEC — The Standards Bodies Behind ISO 27001", tagline:"Understanding the organizations that give ISO 27001 its global credibility",
        body:`<p>ISO 27001 is published jointly by two international organizations — <span class="key-term">ISO</span> (International Organization for Standardization) and <span class="key-term">IEC</span> (International Electrotechnical Commission). Understanding these bodies explains why ISO 27001 carries unique international authority.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>ISO — International Organization for Standardization</strong><span>Founded 1947. Non-governmental. 170+ member countries, each the national standards body for their country. Publishes standards across virtually every industry.</span></div>
          <div class="cheat-pill"><strong>IEC — International Electrotechnical Commission</strong><span>Founded 1906. Standards for electrical, electronic, and related technologies. Partners with ISO for technology standards — hence the "ISO/IEC" prefix.</span></div>
        </div>
        <div class="highlight-box">ISO 27001 belongs to a family of related standards called the <strong>ISO/IEC 27000 series</strong>. Each standard in the series addresses a specific aspect of information security management.</div>
        <div class="badge-row">
          <span class="badge badge-gray">27000 — Overview & vocabulary</span>
          <span class="badge badge-gray">27001 — Requirements (certifiable)</span>
          <span class="badge badge-gray">27002 — Code of practice (control guidance)</span>
          <span class="badge badge-gray">27005 — Risk management</span>
          <span class="badge badge-gray">27017 — Cloud security</span>
          <span class="badge badge-gray">27018 — Cloud privacy</span>
          <span class="badge badge-gray">27701 — Privacy (PIMS)</span>
        </div>
        <div class="analogy-box"><strong>27001 vs 27002 — the most important distinction:</strong> ISO 27001 is the <em>requirements</em> standard — what an ISMS must do, and what organizations certify against. ISO 27002 is the <em>guidance</em> standard — detailed implementation guidance for the Annex A controls. Think of 27001 as the exam questions and 27002 as the textbook.</div>`,
        quiz:{ q:"What is the key difference between ISO 27001 and ISO 27002?", opts:["They are identical standards with different names","ISO 27001 contains the requirements for certification (what must be done); ISO 27002 provides detailed implementation guidance (how to do it) for the Annex A controls","ISO 27002 is for cloud environments only","ISO 27001 is for large organizations; ISO 27002 is for small ones"], ans:1, explain:"Organizations certify against ISO 27001 (the requirements). ISO 27002 provides implementation guidance and best practice for the controls referenced in ISO 27001's Annex A — the 'how to' companion document." } },

      { title:"The Information Security Management System (ISMS)", tagline:"The core concept that makes ISO 27001 different from every other security standard",
        body:`<p>The most important concept in all of ISO 27001 is the <span class="key-term">Information Security Management System (ISMS)</span>. Every clause, control, and requirement is either part of the ISMS or serves to build and maintain it.</p>
        <div class="highlight-box">ISO 27001 defines an ISMS as a set of policies, procedures, processes, and systems that manage information security risks across the organization. The ISMS is not software. It's not a checklist. It's a <em>management system</em> — a systematic, documented, continuously improving approach.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Systematic</strong><span>Every security decision follows a documented process — not ad hoc judgment.</span></div>
          <div class="cheat-pill"><strong>Documented</strong><span>Policies, risk assessments, and evidence are written down. If it isn't documented, for audit purposes it didn't happen.</span></div>
          <div class="cheat-pill"><strong>Risk-Based</strong><span>Calibrated to the organization's specific risk profile — not a generic list of controls.</span></div>
          <div class="cheat-pill"><strong>Continuously Improving</strong><span>Internal audits, management reviews, and the PDCA cycle ensure it improves over time.</span></div>
        </div>
        <div class="analogy-box"><strong>ISMS vs "doing security":</strong> A person who eats vegetables occasionally is "doing health." A person with a documented nutrition plan, scheduled checkups, and tracked metrics has a health management system. ISO 27001 is the difference between ad hoc, reactive security and a systematic, proactive, continuously improving ISMS.</div>
        <div class="info-box"><strong>Scope matters enormously:</strong> An ISMS has a defined scope — specific parts of the organization, systems, or locations. This flexibility makes ISO 27001 achievable for organizations of any size — but the scope must be honest. A scope designed to exclude all high-risk activities is not a credible ISMS.</div>`,
        quiz:{ q:"What distinguishes an ISMS from simply having good security tools and practices?", opts:["An ISMS requires more expensive security products","An ISMS is systematic, documented, risk-based, and continuously improving — a structured management approach rather than ad hoc security decisions","An ISMS only applies to cloud environments","An ISMS means you have passed a security audit"], ans:1, explain:"An ISMS provides systematic, documented, risk-based, continuously improving management of information security — a consistent process for identifying risks, rationally selecting controls, monitoring effectiveness, and improving over time." } },

      { title:"The High-Level Structure and PDCA Cycle", tagline:"ISO 27001's architecture — and why it looks familiar",
        body:`<p>ISO 27001 follows ISO's <span class="key-term">High-Level Structure (HLS)</span> — the same 10-clause framework used by ISO 42001 (AI), ISO 9001 (quality), and ISO 14001 (environment). This shared structure means the frameworks integrate easily, and learning one prepares you for all the others.</p>
        <div class="highlight-box">The 10-clause structure:<br><br>Clauses 1–3: Introduction (scope, references, terms) — informational only<br>Clause 4: Context of the Organization<br>Clause 5: Leadership<br>Clause 6: Planning<br>Clause 7: Support<br>Clause 8: Operation<br>Clause 9: Performance Evaluation<br>Clause 10: Improvement<br><br>Plus Annex A: Information Security Controls (93 controls in the 2022 version)</div>
        <p>These map directly to the <span class="key-term">PDCA Cycle</span> — the engine of continuous improvement:</p>
        <div class="pdca-grid">
          <div class="pdca-plan"><strong style="color:#0c447c">PLAN (Clauses 4,5,6)</strong><br><span style="font-size:12px">Understand context. Get leadership commitment. Identify risks. Select controls. Set objectives.</span></div>
          <div class="pdca-do"><strong style="color:#085041">DO (Clauses 7,8)</strong><br><span style="font-size:12px">Provide resources. Train people. Implement controls. Run operations.</span></div>
          <div class="pdca-check"><strong style="color:#633806">CHECK (Clause 9)</strong><br><span style="font-size:12px">Monitor performance. Measure effectiveness. Internal audit. Management review.</span></div>
          <div class="pdca-act"><strong style="color:#501313">ACT (Clause 10)</strong><br><span style="font-size:12px">Fix nonconformities. Take corrective action. Continually improve. Then Plan again.</span></div>
        </div>
        <div class="analogy-box"><strong>Why the cycle never stops:</strong> After you Act and improve, you Plan again — with better information. The threat landscape changes, your organization changes, technology changes. An ISO 27001 certification isn't a destination — it's a commitment to continuous improvement.</div>`,
        quiz:{ q:"Which PDCA phase does Clause 9 (Performance Evaluation) correspond to?", opts:["Plan — because you're planning how to measure","Do — because you're doing the measurement","Check — because you're verifying the ISMS is working as intended","Act — because you're acting on information"], ans:2, explain:"Clause 9 corresponds to the Check phase. It covers monitoring, measurement, analysis, internal audit, and management review — all verifying whether the ISMS is working and identifying what needs to improve." } },

      { title:"Clause 4 — Context of the Organization (Part 1)", tagline:"Knowing your environment before you can design your security",
        body:`<p><span class="key-term">Clause 4</span> begins the ISMS by requiring organizations to deeply understand their context — both the environment they operate in and the people who have a stake in their information security. This drives everything that follows: scope, risk assessment, control selection, and objectives.</p>
        <div class="clause-card"><b>Clause 4.1 — Understanding the Organization and Its Context</b><br>Determine external and internal factors relevant to the organization's purpose that affect the ISMS's ability to achieve its intended outcomes. This is the foundation for a risk assessment that reflects reality rather than generic assumptions.</div>
        <p>External factors to consider:</p>
        <div class="badge-row">
          <span class="badge badge-gray">Regulatory environment — GDPR, HIPAA, sector laws</span>
          <span class="badge badge-gray">Customer security requirements</span>
          <span class="badge badge-gray">Threat landscape for your sector</span>
          <span class="badge badge-gray">Technology & supply-chain dependencies</span>
          <span class="badge badge-gray">Data sovereignty / geopolitical factors</span>
        </div>
        <p>Internal factors to consider:</p>
        <div class="badge-row">
          <span class="badge badge-blue">Business strategy the ISMS must support</span>
          <span class="badge badge-blue">Organizational structure and culture</span>
          <span class="badge badge-blue">Existing systems and interdependencies</span>
          <span class="badge badge-blue">Current security capabilities and resources</span>
          <span class="badge badge-blue">Historical incidents and near-misses</span>
        </div>
        <div class="analogy-box"><strong>Context changes everything:</strong> A payment processor's ISMS looks completely different from a research university's — even if both are certified. Context analysis ensures the ISMS is built for the actual organization, not a generic template.</div>`,
        quiz:{ q:"Why does ISO 27001 require understanding context (Clause 4.1) before building the ISMS?", opts:["Because it is the easiest clause to demonstrate","Because context determines what risks are relevant, what controls are appropriate, and how the ISMS should be designed — a generic ISMS addresses the wrong risks","Because regulators require a context document","Because ISO 27002 mandates it"], ans:1, explain:"Context analysis drives the entire ISMS design. Without understanding external threats, regulations, and internal factors, the risk assessment will be generic rather than targeted — and controls poorly matched to actual risks." } },

      { title:"Clause 4 — Interested Parties and Scope", tagline:"Who cares about your security — and what does your ISMS actually cover?",
        body:`<p>The second half of Clause 4 addresses two critical questions: who has a stake in the organization's information security, and what exactly does the ISMS cover?</p>
        <div class="clause-card"><b>Clause 4.2 — Needs and Expectations of Interested Parties</b><br>Identify parties with a stake in the ISMS and their specific requirements. Their requirements become inputs to the ISMS design — some may become compliance obligations.</div>
        <div class="badge-row">
          <span class="badge badge-gray">Customers requiring security assurance</span>
          <span class="badge badge-gray">Regulators setting mandatory standards</span>
          <span class="badge badge-gray">Shareholders expecting risk management</span>
          <span class="badge badge-gray">Employees protecting their own data</span>
          <span class="badge badge-gray">Partners with contractual expectations</span>
          <span class="badge badge-gray">Cyber insurers requiring minimum standards</span>
        </div>
        <div class="clause-card"><b>Clause 4.3 — Determining the Scope of the ISMS</b><br>Define the boundaries and applicability — which parts of the organization, locations, systems, and processes are included. The scope must be documented and available to interested parties.</div>
        <div class="analogy-box"><strong>Scope is a strategic decision:</strong> A narrow scope reduces certification effort — but also reduces assurance value. A customer asking "is your customer-data system in scope?" needs to hear yes. Scoping out the most critical systems undermines the certification's credibility.</div>
        <div class="clause-card"><b>Clause 4.4 — Information Security Management System</b><br>Establish, implement, maintain, and continually improve the ISMS in accordance with ISO 27001. The commitment clause — "now that you understand your context, actually build the system."</div>`,
        quiz:{ q:"An organization scopes its ISMS to exclude its customer database because it is the most complex to secure. Why is this problematic?", opts:["Because it makes certification more expensive","Because scoping out the most sensitive systems creates a certification that provides no assurance for the areas customers care about most — making it misleading","Because ISO 27001 requires all systems to be in scope","Because excluding systems is not permitted"], ans:1, explain:"ISO 27001 doesn't prohibit narrow scopes, but scoping out the most sensitive systems creates a certification that misleads interested parties who rely on it to assess security. Discovering the most critical system is excluded would undermine confidence in the entire certification." } },

      { title:"Clause 5 — Leadership and Commitment", tagline:"Why security must be owned at the top of the organization",
        body:`<p><span class="key-term">Clause 5</span> — Leadership — makes ISO 27001's most important cultural demand: information security must be owned, championed, and actively supported by top management. This is about genuine accountability at the board and CEO level.</p>
        <div class="clause-card"><b>Clause 5.1 — Leadership and Commitment</b><br>Top management must demonstrate commitment by: taking accountability for ISMS effectiveness, ensuring the policy aligns with strategy, integrating ISMS requirements into business processes, making resources available, communicating the importance of security, and promoting continual improvement.</div>
        <div class="highlight-box"><strong>The "demonstrate" requirement:</strong> ISO 27001 requires leadership to <em>demonstrate</em> commitment through visible, documentable actions — signed policies, management review records, board-level security discussions, resource decisions. A CEO who delegates security entirely to IT has not demonstrated leadership commitment.</div>
        <div class="clause-card"><b>Clause 5.2 — Information Security Policy</b><br>Establish a policy appropriate to the organization's purpose, including objectives (or a framework for setting them), commitment to satisfying requirements and to continual improvement, communicated internally and available to interested parties.</div>
        <div class="analogy-box"><strong>The tone-at-the-top effect:</strong> The single most powerful predictor of security program effectiveness is senior leadership's visible commitment. When the CEO attends security briefings and the board asks security questions, the whole organization gets the message: security matters.</div>
        <div class="clause-card"><b>Clause 5.3 — Roles, Responsibilities, and Authorities</b><br>Assign and communicate responsibilities for information security roles — the ISMS owner (often the CISO), asset owners, internal auditors. Every significant security activity must have a named accountable person.</div>`,
        quiz:{ q:"Clause 5.1 requires top management to 'demonstrate' leadership commitment. What distinguishes demonstrating from simply approving?", opts:["There is no difference — approval is sufficient","Demonstrating requires visible, documentable actions — attending reviews, allocating resources, communicating importance, holding people accountable — not just signing a policy","Demonstration only requires annual awareness training","Only the CEO can demonstrate commitment"], ans:1, explain:"Demonstrating commitment requires visible, auditable evidence of active engagement — signed policies, management review participation, resource decisions, board-level discussions. Simply approving a policy without ongoing involvement does not satisfy the requirement." } },

      { title:"Clause 6 — Planning: Risks and Opportunities", tagline:"Before you can secure anything, you must understand what you're securing it against",
        body:`<p><span class="key-term">Clause 6</span> moves the ISMS from context and commitment to concrete planning — what risks exist and what the organization will do about them. The risk assessment is the intellectual heart of ISO 27001.</p>
        <div class="clause-card"><b>Clause 6.1.2 — Information Security Risk Assessment</b><br>Define and apply a process that establishes risk acceptance criteria, produces consistent and comparable results, and identifies risks to the confidentiality, integrity, and availability of information. The process must be documented.</div>
        <p>The three core properties of information security risk — the CIA Triad:</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Confidentiality</strong><span>Information is only accessible to those authorized. Breached by unauthorized disclosure, data theft, or exposure.</span></div>
          <div class="cheat-pill"><strong>Integrity</strong><span>Information is accurate and complete, not modified by unauthorized parties without detection. Breached by tampering or corruption.</span></div>
          <div class="cheat-pill"><strong>Availability</strong><span>Authorized users can access information when needed. Breached by denial-of-service, ransomware, outages, or disasters.</span></div>
        </div>
        <div class="analogy-box"><strong>The CIA Triad in everyday terms:</strong> Your bank account has confidentiality (only you and authorized staff see your balance), integrity (the balance can't be changed without authorization), and availability (you can access it when needed). ISO 27001 requires assessing risks to all three across all in-scope assets.</div>
        <div class="highlight-box">ISO 27001 does NOT prescribe a specific risk methodology — organizations can use ISO 27005, NIST SP 800-30, OCTAVE, or another structured approach. It requires the methodology be documented, repeatable, and applied systematically — and reviewed periodically.</div>`,
        quiz:{ q:"A customer portal can be accessed by guessing user IDs without authentication. In CIA Triad terms, which properties are primarily affected?", opts:["Only Availability — the system is still running","Confidentiality (unauthorized access to customer data) and Integrity (potential unauthorized modification of records)","Only Integrity — data accuracy is affected","The CIA Triad doesn't apply to authentication systems"], ans:1, explain:"Authentication bypass primarily threatens Confidentiality (attackers access other customers' data) and Integrity (attackers could modify records). Availability is not directly threatened — the system is accessible, just to the wrong people." } },

      { title:"Clause 6 — Risk Treatment and Statement of Applicability", tagline:"Deciding what to do about identified risks — and proving your decisions",
        body:`<p>Identifying risks is only half of Clause 6. Once assessed, the organization must decide what to do about each one — <span class="key-term">risk treatment</span> — and then produce one of ISO 27001's most important documents: the <span class="key-term">Statement of Applicability (SoA)</span>.</p>
        <div class="clause-card"><b>Clause 6.1.3 — Information Security Risk Treatment</b><br>Select appropriate treatment options, determine the controls necessary to implement them, produce a risk treatment plan, and obtain risk-owner sign-off on residual risk.</div>
        <p>The four risk treatment options:</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Modify (Mitigate)</strong><span>Implement controls to reduce likelihood or impact to an acceptable level. The most common treatment.</span></div>
          <div class="cheat-pill"><strong>Retain (Accept)</strong><span>Consciously accept the risk when it falls within acceptance criteria — documented and signed off by the risk owner.</span></div>
          <div class="cheat-pill"><strong>Avoid</strong><span>Eliminate the risk by not undertaking the activity that creates it.</span></div>
          <div class="cheat-pill"><strong>Share (Transfer)</strong><span>Shift risk to a third party — e.g., cyber insurance or outsourcing — though accountability often remains.</span></div>
        </div>
        <div class="highlight-box"><strong>The Statement of Applicability (SoA)</strong> is the centerpiece deliverable. It lists all Annex A controls, states whether each is applicable, justifies inclusions and exclusions, and records implementation status. Auditors live in the SoA — it is the map between your risks and your controls.</div>
        <div class="analogy-box"><strong>Why justify exclusions?</strong> If you exclude a control, you must explain why it doesn't apply to your context. "We have no physical offices, so physical-entry controls don't apply" is valid. "It was too much work" is not. The SoA forces deliberate, defensible decisions.</div>`,
        quiz:{ q:"What is the primary purpose of the Statement of Applicability (SoA) in ISO 27001?", opts:["To list every employee's security responsibilities","To document which Annex A controls apply, justify inclusions and exclusions, and record implementation status — linking risks to controls","To replace the risk assessment","To certify the organization automatically"], ans:1, explain:"The SoA documents all Annex A controls, whether each applies, the justification for inclusion/exclusion, and implementation status. It is the central audit artifact connecting identified risks to the controls chosen to treat them." } }
    ]
  });

  // ---------- REMAINING ISO/IEC STANDARDS ----------
  F.push({ id:"iso27002", name:"ISO/IEC 27002", subtitle:"Information Security Controls — Code of Practice",
    category:"ISO/IEC Standards", color:"#0f6e56", lessonsTotal:30, source:"ISO/ISO27002/iso27002_30day_curriculum.html",
    desc:"The implementation companion to ISO 27001 — detailed guidance for the 93 Annex A security controls.",
    days:[
      { title:"What Is ISO 27002?", tagline:"The world's most widely used catalog of information security controls",
        body:`<p>Imagine you are the CISO of a large organization and someone asks: "How do you know your security program is complete?" You have firewalls, antivirus, and password policies — but how do you know you haven't forgotten something critical, and that your controls match what the rest of the world considers best practice? The answer most of the world has converged on is <span class="key-term">ISO/IEC 27002</span>.</p>
        <p>ISO/IEC 27002 is an international standard titled <strong>"Information Security, Cybersecurity and Privacy Protection — Information Security Controls."</strong> It is a comprehensive catalog of security controls and implementation guidance. The current version, <strong>ISO/IEC 27002:2022</strong>, reorganized 93 controls into four clean themes: Organizational, People, Physical, and Technological.</p>
        <div class="analogy-box"><strong>Real-world analogy:</strong> Think of ISO 27002 like a comprehensive building code for information security. A building code doesn't tell you how to build your specific house — it tells you what safety requirements every house must address (electrical, structural, fire, plumbing). ISO 27002 tells you what security domains every organization must address and how to implement controls in each.</div>
        <div class="highlight-box">Key facts: a "code of practice" — guidance, not a certifiable standard. 93 controls in 4 themes. The companion to ISO 27001 (the certifiable ISMS standard) — it is the reference catalog for ISO 27001's Annex A. You cannot be "ISO 27002 certified"; you certify to ISO 27001, which implements ISO 27002 controls.</div>`,
        quiz:{ q:"ISO 27002 is a 'code of practice.' What does that mean for organizations wanting to demonstrate compliance?", opts:["They can receive direct ISO 27002 certification","ISO 27002 is guidance, not a certifiable standard — organizations use its controls to build their program and certify through ISO 27001, whose Annex A references ISO 27002's controls","Certification is available but only for large enterprises","Organizations self-certify without third-party assessment"], ans:1, explain:"ISO 27002 provides guidance and best practice rather than a certifiable management system. You cannot be 'ISO 27002 certified' — it is the control reference catalog for ISO 27001, the management system standard you do certify to." } },

      { title:"A Brief History of ISO 27002", tagline:"How the world's most important control catalog evolved over three decades",
        body:`<p>ISO 27002 traces its origins to a British commercial standard from the early 1990s that became the global reference for information security controls.</p>
        <div class="highlight-box"><strong>The lineage:</strong><br><br><strong>1992 — DTI Code of Practice:</strong> The UK Department of Trade and Industry published the first systematic documentation of security best practices.<br><strong>1995 — BS 7799 Part 1:</strong> The British Standards Institution formalized it into a British Standard.<br><strong>2000 — ISO/IEC 17799:</strong> Adopted internationally, giving it global authority.<br><strong>2005 — Renamed ISO/IEC 27002</strong> to fit the new 27000 family, alongside the new ISO 27001.<br><strong>2013 — ISO 27002:2013:</strong> Expanded to 114 controls across 14 domains; the global standard for a decade.<br><strong>2022 — ISO 27002:2022:</strong> Reduced to 93 controls across 4 themes, added 11 new controls for modern threats, and introduced a five-attribute tagging system.</div>
        <div class="analogy-box"><strong>Why the 2022 restructuring mattered:</strong> The 2013 version's 14 domains made sense in 2013. By 2022, cloud, AI-driven threats, and remote work had changed the landscape. The 2022 version reorganized around four fundamental questions: what governance do we need (Organizational), what do we need from people (People), what do we protect physically (Physical), and what technical measures do we need (Technological)?</div>`,
        quiz:{ q:"Why is ISO 27002's history important for a GRC professional?", opts:["It is not important — only the 2022 version matters","Many existing programs were built against ISO 27002:2013 (114 controls, 14 domains). Understanding the 2013-to-2022 transition is essential to update programs, close gaps from new controls, and avoid duplicating completed work","History only matters for academic research","Only organizations planning certification need it"], ans:1, explain:"The 2013-to-2022 transition (mandatory by October 2025 for certified organizations) requires mapping old controls to new, implementing the 11 new controls, and updating the Statement of Applicability — a common, real GRC challenge today." } },

      { title:"ISO 27002 in the ISO 27000 Family", tagline:"How the control catalog fits the broader standards ecosystem",
        body:`<p>ISO 27002 is the foundational security control reference for an entire family of standards. Understanding how it relates to 27001, 27017, 27018, and 27701 is essential for building integrated security and privacy programs efficiently.</p>
        <div class="highlight-box">ISO 27002 is the "control catalog parent." Almost every other family standard references its controls directly, extends them with domain-specific guidance, or adds new controls that complement the baseline.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>ISO 27001 — Certifiable ISMS</strong><span>The management system you certify to. Its Annex A lists all 93 ISO 27002 controls. 27001 is "how you manage security"; 27002 is "what controls you implement."</span></div>
          <div class="cheat-pill"><strong>ISO 27017 — Cloud Security</strong><span>Extends 27002 with cloud-specific guidance and adds 7 cloud controls.</span></div>
          <div class="cheat-pill"><strong>ISO 27018 — Cloud Privacy</strong><span>Extends 27002 with PII-specific guidance for cloud processors.</span></div>
          <div class="cheat-pill"><strong>ISO 27701 — Privacy Management</strong><span>Extends 27001/27002 into a Privacy Information Management System (PIMS).</span></div>
          <div class="cheat-pill"><strong>ISO 27005 — Risk Management</strong><span>Guides the risk process that determines which 27002 controls you need.</span></div>
        </div>
        <div class="analogy-box"><strong>The master pantry:</strong> If the ISO 27000 family is a restaurant, 27002 is the comprehensive pantry of all security ingredients. 27001 is the quality system ensuring the kitchen runs properly; 27017/27018/27701 are specialized cookbooks; 27005 is the recipe-planning process.</div>`,
        quiz:{ q:"An ISO 27001-certified organization adopts cloud services and processes EU customer data. Which family standards guide the expansion?", opts:["ISO 27001 alone is sufficient","ISO 27017 (cloud security), ISO 27018 (cloud privacy/processor obligations), and ISO 27701 (PIMS) — all building on the ISO 27002 foundation already established through 27001","They must replace ISO 27001 with GDPR","They need unrelated certifications"], ans:1, explain:"The family's layered design lets each new context (cloud, cloud PII, privacy management) add domain-specific depth on top of the existing 27002 control foundation rather than starting from scratch." } },

      { title:"The 2022 Restructuring — From 14 Domains to 4 Themes", tagline:"The most significant reorganization in ISO 27002's history",
        body:`<p>The jump from ISO 27002:2013 to 2022 was the most significant structural change in the standard's history — and every organization transitioning must understand what changed and what new gaps the new controls address.</p>
        <div class="highlight-box"><strong>At a glance:</strong> 2013 had <strong>114 controls, 14 domains</strong>. 2022 has <strong>93 controls, 4 themes, 11 new controls</strong>. 57 controls remained essentially unchanged; 24 were merged into 11; 23 were renamed with scope changes; and 11 are entirely new.</div>
        <p>The four 2022 themes:</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Organizational (37)</strong><span>Policies, roles, threat intelligence, asset and access management, supplier relationships, incident management, continuity, compliance — the governance layer.</span></div>
          <div class="cheat-pill"><strong>People (8)</strong><span>Screening, employment terms, awareness training, remote working, and event reporting — the human dimension.</span></div>
          <div class="cheat-pill"><strong>Physical (14)</strong><span>Perimeters, entry controls, clear desk/screen, equipment siting, cabling, secure disposal — the physical layer.</span></div>
          <div class="cheat-pill"><strong>Technological (34)</strong><span>Endpoints, privileged access, authentication, secure configuration, malware protection, logging, cryptography, network security — the largest theme.</span></div>
        </div>`,
        quiz:{ q:"An ISO 27001 certificate was issued in 2021 under the 2013 standard. What does the transition to 2022 involve?", opts:["No transition — 2013 certificates are permanent","Transition by October 2025: map the 114 controls to the 93 new ones, implement applicable new controls, update the Statement of Applicability, and pass a transition audit","A completely new certification from scratch","Transition is voluntary with no deadline"], ans:1, explain:"The International Accreditation Forum required all ISO 27001 certifications to transition to the 2022 version by October 31, 2025, involving SoA updates, implementation of the 11 new controls where applicable, and a certification-body transition assessment." } },

      { title:"The Five-Attribute Tagging System", tagline:"A powerful new tool for filtering, selecting, and communicating controls",
        body:`<p>One of the most innovative features of ISO 27002:2022 is a <span class="key-term">five-attribute tagging system</span> that categorizes each control along five independent dimensions — turning the catalog from a simple list into a multidimensional taxonomy.</p>
        <div class="highlight-box"><strong>Why it matters:</strong> Different stakeholders care about different attributes. A CISO cares about control type; a compliance team cares about NIST CSF alignment; a risk committee cares about CIA-triad properties. The same controls can be filtered and presented differently for each audience without maintaining separate catalogs.</div>
        <div class="ctrl-em"><b>1 — Control Type</b><br>How it acts on risk: <strong>Preventive</strong>, <strong>Detective</strong>, or <strong>Corrective</strong>.</div>
        <div class="ctrl-em"><b>2 — Information Security Properties</b><br>Which CIA-triad property it supports: <strong>Confidentiality</strong>, <strong>Integrity</strong>, or <strong>Availability</strong>.</div>
        <div class="ctrl-em"><b>3 — Cybersecurity Concepts</b><br>Alignment with NIST CSF functions: <strong>Identify, Protect, Detect, Respond, Recover</strong> — enabling direct mapping to NIST CSF.</div>
        <div class="ctrl-em"><b>4 — Operational Capabilities</b><br>The operational domain (Governance, Asset Management, Identity & Access, Threat & Vulnerability Management, Continuity, and more).</div>
        <div class="ctrl-em"><b>5 — Security Domains</b><br>One of four strategy domains: <strong>Governance and Ecosystem, Protection, Defence,</strong> or <strong>Resilience</strong>.</div>
        <div class="analogy-box"><strong>A control filter:</strong> Like a store tagging every item by fabric, weather, formality, color, and size, the attribute system lets a security architect filter to "Preventive, Confidentiality, Protect, Identity & Access Management" and instantly see all relevant controls.</div>`,
        quiz:{ q:"A team wants all controls that are Detective in type and map to the NIST CSF Detect function. How does the attribute system help?", opts:["It doesn't — controls must be reviewed individually","Filter by Control Type = Detective AND Cybersecurity Concept = Detect to instantly surface relevant controls (audit logging, monitoring, web filtering, vulnerability management) — minutes instead of hours","Only the Technological theme has detective controls","NIST mapping requires a separate document"], ans:1, explain:"Multi-dimensional filtering is the attribute system's core value — it directly addresses 2013-era feedback that the catalog was hard to navigate for purpose-specific control selection." } },

      { title:"Organizational Controls — Policies and Governance (5.1–5.8)", tagline:"The governance framework that makes everything else work",
        body:`<p>The <span class="key-term">Organizational controls</span> are the largest theme (37 controls), covering the governance structures, policies, roles, and processes that frame all security activity. Technology controls without governance fail just as surely as governance without technology.</p>
        <div class="highlight-box"><strong>Why governance controls matter most:</strong> Technical controls are only as effective as the decisions that deploy and maintain them. If no one has defined what information must be protected, who is responsible, or what the risk appetite is, technical controls become disconnected tools solving undefined problems.</div>
        <div class="theme-org"><b>5.1 — Policies for Information Security</b><br>Define, approve, publish, and communicate security policies at both strategic and topic-specific levels; review them regularly. The foundation all other controls rest on.</div>
        <div class="theme-org"><b>5.2 — Roles and Responsibilities</b><br>Define, allocate, and communicate all security responsibilities. Unassigned responsibilities reliably become no one's responsibility.</div>
        <div class="theme-org"><b>5.3 — Segregation of Duties</b><br>Separate conflicting duties so no single person controls an entire high-risk process — e.g., whoever approves payments should not also execute them.</div>
        <div class="theme-org"><b>5.4 — Management Responsibilities</b><br>Management must require all personnel to apply security per policy. Compliance is a management expectation with accountability, not optional.</div>
        <div class="theme-org"><b>5.5 / 5.6 — Contact with Authorities & Special Interest Groups</b><br>Maintain contacts with regulators, law enforcement, cyber centers, ISACs, and industry forums to know who to call and keep current on threats.</div>
        <div class="theme-org"><b>5.7 — Threat Intelligence (New in 2022)</b><br>Collect, analyze, and use threat information to update risk assessments and controls proactively.</div>
        <div class="theme-org"><b>5.8 — Information Security in Project Management</b><br>Integrate security throughout the project lifecycle — not bolted on after systems are built.</div>`,
        quiz:{ q:"A company launches a customer app without involving security until after deployment; it then fails its security review and needs six months of remediation. Which control was not followed?", opts:["5.1 Policies for Information Security","5.8 Information Security in Project Management — security must be incorporated throughout the lifecycle, not assessed after deployment when remediation is most expensive","5.2 Roles and Responsibilities","5.3 Segregation of Duties"], ans:1, explain:"5.8 prevents the 'security bolt-on' anti-pattern. Security-by-design finds issues when they cost $1 to fix during design rather than $100 after deployment." } },

      { title:"Organizational Controls — Asset Management & Classification (5.9–5.14)", tagline:"You cannot protect what you do not know you have",
        body:`<p>Organizations trying to protect their information often do not know exactly what they have, where it is, who owns it, or how sensitive it is. These controls address that fundamental problem.</p>
        <div class="theme-org"><b>5.9 — Inventory of Information and Associated Assets</b><br>Maintain an inventory of information assets and their processing assets, with owners, classification, and locations. The foundational control — you cannot protect what you cannot see.</div>
        <div class="theme-org"><b>5.10 — Acceptable Use</b><br>Document and implement rules for acceptable use of information and assets, covering personal use, removable media, and handling of sensitive information.</div>
        <div class="theme-org"><b>5.11 — Return of Assets</b><br>Ensure assets are returned at termination or role change. Uncollected laptops, tokens, and data at offboarding are a common gap.</div>
        <div class="theme-org"><b>5.12 — Classification of Information</b><br>Classify information by confidentiality, integrity, and availability needs (e.g., Confidential, Internal, Public) to enable proportionate protection.</div>
        <div class="theme-org"><b>5.13 — Labeling of Information</b><br>Apply visible classification labels so handling rules are actionable. Classification without labeling exists in theory only.</div>
        <div class="theme-org"><b>5.14 — Information Transfer</b><br>Govern transfers within and outside the organization across all channels (email, file transfer, media, voice).</div>
        <div class="analogy-box"><strong>The safe deposit box analogy:</strong> A bank doesn't put all items in one undifferentiated vault — cash in a secured vault, documents in safe deposit boxes, literature in the lobby. Classification applies proportionate protection rather than treating all information identically.</div>`,
        quiz:{ q:"An organization has a classification scheme but applies no labels; users judge sensitivity themselves. What gap is this?", opts:["Only 5.12 is missing","Both 5.12 (Classification) and 5.13 (Labeling) are poorly implemented — without visible labels the same document is handled inconsistently, making consistent protection impossible","5.13 is optional — only the scheme matters","Classification only applies to electronic documents"], ans:1, explain:"5.12 and 5.13 are a pair: classification defines the scheme, labeling makes it actionable. A scheme without labels is like an unposted speed limit — the rule exists but cannot be followed consistently." } },

      { title:"Organizational Controls — Supplier & Supply Chain Security (5.19–5.22)", tagline:"Extending security governance beyond organizational boundaries",
        body:`<p>Modern organizations depend on dozens to hundreds of suppliers with varying access to information and systems. The <span class="key-term">supplier relationship controls</span> ensure your security posture isn't undermined by the organizations you depend on.</p>
        <div class="highlight-box"><strong>The imperative:</strong> Breaches like SolarWinds (2020) and MOVEit (2023) proved attackers will target the suppliers of well-defended organizations. ISO 27002 requires extending security governance outward through the supply chain rather than treating the organizational boundary as the security perimeter.</div>
        <div class="theme-org"><b>5.19 — Information Security in Supplier Relationships</b><br>Identify which suppliers have access, assess the risk each relationship creates, and set appropriate security requirements per category.</div>
        <div class="theme-org"><b>5.20 — Addressing Security within Supplier Agreements</b><br>Agree specific, measurable security requirements — certifications, incident-notification obligations, data restrictions, access controls — not generic "reasonable measures" clauses.</div>
        <div class="theme-org"><b>5.21 — Managing Security in the ICT Supply Chain (New in 2022)</b><br>Address the security of the hardware, software, and services in your technology stack — Software Bill of Materials, component verification, sub-supplier management. SolarWinds made this unmistakable.</div>
        <div class="theme-org"><b>5.22 — Monitoring & Review of Supplier Services</b><br>Supplier security isn't assessed once and forgotten — monitor delivery, review performance against requirements, and manage changes (including the supplier's own sub-suppliers).</div>`,
        quiz:{ q:"Why did ISO 27002:2022 add control 5.21 (ICT supply chain) as a distinct control?", opts:["To reduce the number of suppliers organizations use","Because attacks like SolarWinds proved the technology supply chain itself (hardware, software, sub-suppliers) is a major attack vector requiring dedicated governance beyond general supplier management","Because cloud computing eliminated supply chain risk","It only applies to government contractors"], ans:1, explain:"5.21 specifically targets the security of the ICT supply chain — software provenance, SBOMs, and sub-supplier risk — a gap the 2013 version did not address distinctly and that high-profile attacks made critical." } }
    ]
  });

  F.push({ id:"iso27017", name:"ISO/IEC 27017", subtitle:"Cloud Security Controls",
    category:"ISO/IEC Standards", color:"#0f6e56", lessonsTotal:30, source:"ISO/ISO27017/iso27017_30day_curriculum.html",
    desc:"Cloud-specific security guidance extending ISO 27002 for both cloud customers and providers.",
    days:[
      { title:"What Is ISO 27017?", tagline:"The specialized security code for cloud computing",
        body:`<p><span class="key-term">ISO/IEC 27017</span> extends ISO 27002 with security guidance specific to cloud computing. A "code of practice" (not a standalone certification), it adds <strong>7 cloud-specific controls</strong> and extended cloud guidance for existing controls, addressing both Cloud Service Providers (CSPs) and Cloud Service Customers (CSCs).</p>
        <div class="analogy-box"><strong>Real-world analogy:</strong> ISO 27001/27002 is the general building safety code for all buildings. ISO 27017 is the specialized fire-safety code for high-rise skyscrapers — the general code still applies, but tall buildings have unique risks (elevator shafts as smoke conduits) needing additional rules. Cloud is the "skyscraper" of modern IT.</div>
        <div class="highlight-box">First published 2015, revised 2024. It works alongside ISO 27001 (management system) and ISO 27002 (general controls) — you don't get "27017 certified" directly; you implement its controls within your ISO 27001 program.</div>`,
        quiz:{ q:"What type of document is ISO 27017?", opts:["A certifiable management system standard like ISO 27001","A code of practice providing cloud-security guidance and controls, implemented within a broader ISO 27001 program rather than certified directly","A standard defining specific encryption algorithms","An EU regulation for cloud providers"], ans:1, explain:"ISO 27017 is a code of practice — guidance and controls for cloud security. Organizations implement it within their ISO 27001 ISMS rather than certifying to 27017 directly." } },

      { title:"Why Was ISO 27017 Created?", tagline:"The cloud security gap general standards couldn't fill",
        body:`<p>By the early 2010s cloud had become the dominant IT model, but standards like ISO 27002 were written for a world where organizations controlled their own physical infrastructure.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Shared Responsibility Ambiguity</strong><span>Security split between provider and customer in ways that vary by model — general standards assumed one organization controlled everything.</span></div>
          <div class="cheat-pill"><strong>Multi-Tenancy Risks</strong><span>Multiple customers' data on shared infrastructure — a risk that doesn't exist on dedicated hardware.</span></div>
          <div class="cheat-pill"><strong>Virtualization Security</strong><span>Virtual machines and networks have different security characteristics than physical equivalents.</span></div>
          <div class="cheat-pill"><strong>Data Location &amp; Jurisdiction</strong><span>Global providers may store data in multiple countries without the customer's direct awareness.</span></div>
        </div>
        <div class="analogy-box"><strong>The apartment-building analogy:</strong> ISO 27002 is safety rules for a private home (one family controls everything). Cloud is an apartment building — a landlord (CSP) controls the structure and common areas; tenants (customers) control their units. Each needs different rules. ISO 27017 writes the apartment-building rules.</div>`,
        quiz:{ q:"Which cloud characteristic created risks ISO 27002 couldn't address alone?", opts:["Cloud being more expensive than on-premise","Multi-tenancy — multiple customers' data on shared infrastructure created cross-customer exposure risks that standards for dedicated infrastructure never anticipated","Cloud being faster","Providers being in foreign countries"], ans:1, explain:"Multi-tenancy is fundamental to cloud and creates unique risks (data leakage between tenants via shared memory, storage, or hypervisor flaws). ISO 27017 adds controls for isolation and tenant security." } },

      { title:"Cloud Service Models and Security", tagline:"How IaaS, PaaS, and SaaS shift responsibility",
        body:`<p>ISO 27017's controls apply differently across <span class="key-term">cloud service models</span>, because each shifts the balance of responsibility between provider and customer.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>IaaS — Infrastructure</strong><span>CSP provides hardware, networking, virtualization. Customer controls OS, middleware, apps, data — the most customer responsibility. E.g., AWS EC2, Azure VMs.</span></div>
          <div class="cheat-pill"><strong>PaaS — Platform</strong><span>CSP adds OS, middleware, runtime. Customer controls apps and data. E.g., Azure App Service, Heroku.</span></div>
          <div class="cheat-pill"><strong>SaaS — Software</strong><span>CSP provides the whole application. Customer controls user management, configuration, and the data they enter — the least customer responsibility. E.g., Salesforce, Microsoft 365.</span></div>
          <div class="cheat-pill"><strong>Deployment Models</strong><span>Public, private, hybrid, and community clouds — controls also vary by deployment model.</span></div>
        </div>
        <div class="analogy-box"><strong>Restaurant analogy:</strong> IaaS is renting a commercial kitchen (you buy ingredients and cook). PaaS is a catering commissary (facility handles prep; you focus on recipes). SaaS is ordering from a restaurant (it's all done; you choose from the menu). The more the provider does, the less you do — but you're always responsible for what you choose and consume.</div>`,
        quiz:{ q:"A company runs its banking app on IaaS. Who is responsible for securing the operating system?", opts:["The cloud provider — they manage all infrastructure in IaaS","The customer — in IaaS the customer controls and secures the OS, middleware, and applications; the CSP provides only the hardware/virtualization layer","Shared equally in all IaaS scenarios","The provider, with customer approval"], ans:1, explain:"In IaaS the customer carries the most responsibility — OS hardening, patching, app security, and identity management are the customer's, while the CSP secures the physical and virtualization layers." } },

      { title:"Shared Responsibility — The Core Concept", tagline:"Who is responsible for what — and why clarity matters",
        body:`<p>At the heart of ISO 27017 is <span class="key-term">shared responsibility</span> — security as a joint obligation between provider and customer, with the division flowing from who controls which components.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>CSP Always</strong><span>Physical data-center security, hypervisor security, core network and storage security, and any managed services they provide.</span></div>
          <div class="cheat-pill"><strong>Customer Always</strong><span>User account management and access controls, classification and protection of their data, and regulatory compliance for their industry.</span></div>
          <div class="cheat-pill"><strong>Variable</strong><span>OS security, network configuration, and identity management shift by model — mostly customer in IaaS, increasingly provider toward SaaS.</span></div>
          <div class="cheat-pill"><strong>Documentation</strong><span>Responsibilities must be explicitly documented — a shared-responsibility matrix. Undocumented responsibilities create security gaps.</span></div>
        </div>

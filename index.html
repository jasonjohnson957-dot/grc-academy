        quiz:{ q:"An agency discovers a breach of 3 million veterans' health records on Monday. What must happen within 7 days?", opts:["30 days to notify veterans before reporting","Notify Congress within 7 days — a 'major incident' given its significant impact; the agency also reports to CISA and begins breach response simultaneously","Only OMB notification is required","The 7-day rule only applies to national-security incidents"], ans:1, explain:"FISMA 2014 requires reporting 'major incidents' to Congress within 7 days of discovery. A 3-million-record breach clearly qualifies, while CISA reporting and incident response run concurrently." } },

      { title:"FISMA 2014 — From Checkbox to Continuous Monitoring", tagline:"The shift that defines modern federal security",
        body:`<p>FISMA 2014's signature contribution was moving the law from periodic documentation to <span class="key-term">continuous monitoring</span> and real risk management.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Continuous Monitoring (ConMon)</strong><span>Ongoing assessment of controls and risk (per SP 800-137) rather than annual snapshots — supported by CISA's CDM program.</span></div>
          <div class="cheat-pill"><strong>Automated Metrics</strong><span>Security data reported through automated feeds so OMB and leadership see real posture, not just paperwork status.</span></div>
          <div class="cheat-pill"><strong>Major-Incident Reporting</strong><span>The 7-day congressional notification rule for incidents with significant impact on national security, public health, or public confidence.</span></div>
          <div class="cheat-pill"><strong>Privacy Integration</strong><span>Added the Senior Agency Official for Privacy (SAOP) role, integrating privacy into the security framework.</span></div>
        </div>
        <div class="highlight-box"><strong>For executives:</strong> the lesson generalizes beyond government — compliance documentation is not security. Continuous monitoring of whether controls actually work, with real metrics and fast escalation, is what modern security governance requires.</div>`,
        quiz:{ q:"What was FISMA 2014's most important change?", opts:["Adding more documentation templates","Shifting from periodic compliance paperwork to continuous monitoring and genuine risk-based security management","Exempting contractors","Replacing NIST with a new standards body"], ans:1, explain:"FISMA 2014 refocused federal security on continuous monitoring, automated metrics, and outcomes — addressing the 'paper compliance while being breached' problem of the 2002 era." } }
    ]
  });

  F.push({ id:"cmmc", name:"CMMC", subtitle:"Cybersecurity Maturity Model Certification",
    category:"US Government & Defense", color:"#7a3e9d", lessonsTotal:30, source:"CMMC/cmmc_30day_curriculum.html",
    desc:"The Department of Defense's tiered certification for protecting controlled unclassified information.",
    days:[
      { title:"What Is CMMC?", tagline:"The DoD's certification that turns 'trust us' into 'prove it'",
        body:`<p><span class="key-term">CMMC</span> (Cybersecurity Maturity Model Certification) is the U.S. Department of Defense program requiring defense contractors to be certified at one of three levels to protect sensitive defense information. It covers three certification levels based on data sensitivity and maps directly to <strong>NIST SP 800-171</strong> — making it the enforcement mechanism for requirements that already existed but were widely ignored.</p>
        <div class="analogy-box"><strong>For executives:</strong> CMMC turns "trust us, we're secure" into "prove it with a certification." For any company in the defense supply chain, the required CMMC level is now a precondition to winning DoD contracts — regardless of how qualified you are technically.</div>`,
        quiz:{ q:"What makes CMMC unique compared to frameworks like ISO 27001 or CIS Controls?", opts:["It has more controls than any other framework","It is contractually required by the DoD — organizations that don't meet the required level cannot win DoD contracts","It only applies to large defense companies","It is a regulation applying to all US companies"], ans:1, explain:"Unlike voluntary frameworks adopted for market credibility, CMMC compliance is a contract-eligibility requirement: handle sensitive DoD information without the right level and you cannot be awarded the contract." } },

      { title:"Why Was CMMC Created?", tagline:"The cyber espionage crisis that forced the Pentagon to act",
        body:`<p>For over two decades, foreign adversaries systematically stole sensitive defense technology from US contractors — gaining military capabilities worth billions without investing in their own R&D.</p>
        <div class="highlight-box"><strong>The scale of the problem:</strong> The F-35 program suffered a massive cyber theft — engineering specifications for the exhaust and radar systems were stolen from contractor networks, after which a remarkably similar foreign stealth fighter appeared. The theft came not from classified DoD networks but from contractor systems lacking adequate security.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Self-Attestation Failure</strong><span>Contractors self-certified NIST SP 800-171 compliance with no independent verification — routinely checking boxes while implementing few controls.</span></div>
          <div class="cheat-pill"><strong>Supply Chain Blindness</strong><span>Primes subcontracted to thousands of smaller firms the DoD had no visibility into — exactly where attackers focused.</span></div>
          <div class="cheat-pill"><strong>Missing Enforcement</strong><span>Existing DFARS requirements were largely unenforced, with minimal consequences for non-compliance.</span></div>
          <div class="cheat-pill"><strong>Asymmetric Risk</strong><span>Small subcontractors handled highly sensitive data with security budgets far below what it warranted — the path of least resistance.</span></div>
        </div>
        <div class="analogy-box"><strong>The weakest-link problem:</strong> A chain is only as strong as its weakest link. DoD classified networks are well-defended, but sensitive data flows to hundreds of contractors — and attackers go where defenses are weakest. CMMC raises the security floor across the whole supply chain.</div>`,
        quiz:{ q:"Why did self-attestation of NIST SP 800-171 fail before CMMC?", opts:["Because 800-171 is too difficult to implement","Because without independent verification, contractors could claim compliance with no enforcement — creating widespread false attestations and no actual security improvement","Because contractors aren't subject to cybersecurity laws","Because the DoD didn't require controls before CMMC"], ans:1, explain:"Self-attestation relied on the honor system with no verification or consequences. Many attesting contractors had implemented few or none of the required controls — making attestation a paperwork exercise." } },

      { title:"The Defense Industrial Base (DIB)", tagline:"Who CMMC applies to — and why it's ~300,000 organizations",
        body:`<p>CMMC applies to the <span class="key-term">Defense Industrial Base (DIB)</span> — the entire ecosystem of companies that work with the DoD. The DoD estimates roughly <strong>300,000 companies</strong> will be subject to CMMC, from primes like Boeing to small machine shops, software developers, and IT providers.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Prime Contractors</strong><span>Hold a direct DoD contract; directly subject to CMMC and responsible for flowing requirements down.</span></div>
          <div class="cheat-pill"><strong>Subcontractors</strong><span>May have no direct DoD relationship, but if they handle FCI or CUI they must meet the appropriate level.</span></div>
          <div class="cheat-pill"><strong>Flow-Down</strong><span>The security obligation flows all the way down the supply chain — DoD to primes to subs and beyond.</span></div>
          <div class="cheat-pill"><strong>Cloud Providers</strong><span>Cloud services storing or processing DoD sensitive data must also meet CMMC requirements.</span></div>
        </div>
        <div class="analogy-box"><strong>The franchise analogy:</strong> The DoD is like a franchise that sets food-safety standards. Primes are franchise owners who signed the agreement; subcontractors are ingredient suppliers — they may not deal with headquarters directly, but if their products go into the restaurants, they must meet the same standards.</div>`,
        quiz:{ q:"A small software firm provides accounting software to a defense prime, and the software stores defense information. Is it subject to CMMC?", opts:["No — only direct DoD contractors are subject","Yes — if it handles FCI or CUI, the prime must flow down CMMC requirements to all subcontractors handling that data","Only if it has 50+ employees","Only if the prime specifically requests certification"], ans:1, explain:"CMMC flows down the entire supply chain. The firm's relationship is with the prime, not the DoD — but handling covered data means it must meet the required level." } },

      { title:"FCI and CUI — The Data CMMC Protects", tagline:"What makes defense information sensitive, and which level you need",
        body:`<p>CMMC protects two categories of sensitive government information, and which you handle determines which level you need.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>FCI — Federal Contract Information</strong><span>Information provided for or generated under a government contract, not intended for public release. Contract-performance information that isn't classified or public.</span></div>
          <div class="cheat-pill"><strong>CUI — Controlled Unclassified Information</strong><span>Government information requiring safeguarding under law or policy, but not classified. More sensitive than FCI, below the classified threshold.</span></div>
        </div>
        <div class="analogy-box"><strong>The middle ground:</strong> A nuclear weapon design is classified; the fact it's classified is public. CUI is the middle ground — "officially sensitive but not secret": engineering drawings for military components, procurement-sensitive pricing, military personnel PII, export-controlled technical data. The F-35 data stolen from contractors was CUI, not classified.</div>
        <div class="badge-row">
          <span class="badge badge-green">FCI only → Level 1 (17 practices)</span>
          <span class="badge badge-amber">CUI present → Level 2 (110 practices)</span>
          <span class="badge badge-coral">CUI critical to national security → Level 3 (110 + 24)</span>
        </div>
        <div class="warning-box"><strong>"Unclassified doesn't mean unimportant":</strong> CUI is the category most targeted by adversaries — accessible outside classified networks yet containing details that reveal military capabilities.</div>`,
        quiz:{ q:"A contractor receives unclassified but controlled technical specs for a missile guidance component. What data type is this?", opts:["FCI — because it's from a government contract","CUI — specifically export-controlled or Critical Technology Information, requiring CMMC Level 2 minimum","It doesn't require CMMC because it's unclassified","Classified data that doesn't apply to CMMC"], ans:1, explain:"Detailed defense technical specs are CUI (likely export-controlled / CTI). Though unclassified, CUI requires Level 2 minimum because of its sensitivity and the harm from disclosure to adversaries." } },

      { title:"The Three CMMC Levels", tagline:"Foundational, Advanced, and Expert — matching security to risk",
        body:`<p>CMMC 2.0 organizes requirements into <span class="key-term">three levels</span>, each building on the last. The level required depends on the sensitivity of the information involved.</p>
        <div class="level-grid">
          <div class="level-1"><strong style="color:#27500A">Level 1 — Foundational</strong> · FCI only<br><span style="font-size:12px"><strong>17 practices</strong>. Annual self-assessment and affirmation. Basic cyber hygiene.</span></div>
          <div class="level-2"><strong style="color:#633806">Level 2 — Advanced</strong> · CUI<br><span style="font-size:12px"><strong>110 practices</strong> (NIST SP 800-171). Third-party C3PAO assessment every 3 years for critical programs, or annual self-assessment for non-critical.</span></div>
          <div class="level-3"><strong style="color:#4A1B0C">Level 3 — Expert</strong> · Critical CUI<br><span style="font-size:12px"><strong>110 + 24 practices</strong> (NIST SP 800-172). Government-led DIBCAC assessment. Highest-risk programs only.</span></div>
        </div>
        <div class="highlight-box"><strong>The key Level 2 split:</strong> for most programs, organizations self-assess with annual affirmation. For programs the DoD designates "critical," a third-party assessment by a Certified Third-Party Assessment Organization (C3PAO) is required every three years.</div>
        <div class="analogy-box"><strong>Driver-license analogy:</strong> Level 1 is a standard license (self-reported). Level 2 is a commercial license (independent verification because stakes are higher). Level 3 is a military-pilot certification (assessed by government experts because failure is catastrophic).</div>`,
        quiz:{ q:"A contractor handles CUI on a program NOT designated critical by the DoD. What assessment does CMMC 2.0 require?", opts:["Level 3 government-led assessment","Level 2 C3PAO assessment because all CUI requires third-party verification","Level 2 annual self-assessment with affirmation — C3PAO assessment is only required for DoD-designated critical programs","Level 1 self-assessment"], ans:2, explain:"For non-critical Level 2 programs, contractors can self-assess annually with senior-official affirmation. C3PAO third-party assessment is required only for programs the DoD designates as critical." } },

      { title:"NIST SP 800-171 — The Foundation of Level 2", tagline:"The federal standard that CMMC enforces",
        body:`<p>CMMC Level 2 is built almost entirely on <span class="key-term">NIST SP 800-171</span> — "Protecting Controlled Unclassified Information in Nonfederal Systems." Level 2's 110 practices <em>are</em> the 110 requirements of NIST SP 800-171.</p>
        <div class="highlight-box">800-171 was published in 2015 and contractually required since 2017 via DFARS 252.204-7012 — but it was required, not verified. Contractors self-reported a score in the Supplier Performance Risk System (SPRS) with no way for the DoD to verify it. <strong>CMMC 2.0 is essentially the enforcement mechanism</strong> for a requirement that already existed — adding independent verification to an honor system.</div>
        <p>NIST SP 800-171 is organized into <strong>14 families</strong> (adapted from NIST SP 800-53 for non-federal organizations):</p>
        <div class="badge-row">
          <span class="badge badge-blue">Access Control</span><span class="badge badge-blue">Awareness & Training</span><span class="badge badge-blue">Audit & Accountability</span><span class="badge badge-blue">Configuration Management</span><span class="badge badge-blue">Identification & Authentication</span><span class="badge badge-blue">Incident Response</span><span class="badge badge-blue">Media Protection</span><span class="badge badge-blue">Personnel Security</span><span class="badge badge-blue">Physical Protection</span><span class="badge badge-blue">Risk Assessment</span><span class="badge badge-blue">System & Communications Protection</span>
        </div>`,
        quiz:{ q:"How does CMMC 2.0 Level 2 relate to NIST SP 800-171?", opts:["They are unrelated","Level 2's 110 practices are the 110 requirements of NIST SP 800-171 — CMMC adds independent verification to a standard already required since 2017","CMMC replaced 800-171","800-171 only applies to classified systems"], ans:1, explain:"CMMC Level 2 is built on NIST SP 800-171. The requirement existed via DFARS since 2017 but was self-attested; CMMC adds the verification that was missing." } }
    ]
  });

  // ---------- PRIVACY & INDUSTRY REGULATIONS ----------
  F.push({ id:"gdpr", name:"GDPR", subtitle:"General Data Protection Regulation",
    category:"Privacy & Industry Regulations", color:"#b0512a", lessonsTotal:30, source:"GDPR/gdpr_30day_curriculum.html",
    desc:"The EU's landmark privacy law governing personal data — with global reach and serious penalties.",
    days:[
      { title:"What Is GDPR?", tagline:"The EU's landmark privacy law — and why it reaches the whole world",
        body:`<p>The <span class="key-term">General Data Protection Regulation (GDPR)</span> is the European Union's comprehensive privacy law, in force since May 2018. It governs how the personal data of people in the EU is collected, used, stored, and protected — and it gives individuals real control over their own information.</p>
        <p>Before GDPR, privacy rules across Europe were a patchwork, companies often weren't protecting data properly, and breach victims had little recourse. The EU decided to create one unified, strong law that put power back in the hands of the individual.</p>
        <div class="analogy-box"><strong>Think about it this way:</strong> If someone was going through your diary without permission, you'd want a law to stop that. Your digital information — what you search, what you buy, where you go — is essentially your digital diary. GDPR is the law that protects it.</div>
        <div class="highlight-box"><strong>The global twist:</strong> Even US and Asian companies must follow GDPR if they serve EU residents. That's why you see cookie-consent pop-ups on almost every website — that's GDPR in action. Penalties reach up to <strong>4% of global annual revenue</strong> or €20 million, whichever is higher.</div>`,
        quiz:{ q:"Why does GDPR matter to companies outside the EU?", opts:["It does not apply outside the EU","It has extraterritorial reach — any organization handling EU residents' personal data must comply, regardless of where it is based","It only applies to social media","It is voluntary"], ans:1, explain:"GDPR applies to any organization that offers goods or services to, or monitors, people in the EU — regardless of where the organization is located. That global reach is why it reset the worldwide baseline for privacy." } },

      { title:"What Is 'Personal Data'?", tagline:"If it can identify you, it's probably personal data",
        body:`<p>Before understanding GDPR's rules, you need to know what it protects. GDPR uses a very broad definition of <span class="key-term">personal data</span>:</p>
        <div class="highlight-box"><em>Any information relating to an identified or identifiable natural person.</em></div>
        <p>In plain terms: if a piece of information can be used to figure out who you are, it's personal data.</p>
        <div class="tag-header">Examples of personal data</div>
        <div class="badge-row">
          <span class="badge badge-blue">Your name</span><span class="badge badge-blue">Your address</span><span class="badge badge-blue">Email address</span><span class="badge badge-blue">Phone number</span><span class="badge badge-blue">Date of birth</span><span class="badge badge-blue">IP address</span><span class="badge badge-blue">Location data</span><span class="badge badge-blue">Photos of you</span><span class="badge badge-blue">Browsing history</span>
        </div>
        <p>Even things that don't seem personal can become personal data when combined. Your ZIP code alone isn't personal — but ZIP code + age + gender can often identify you specifically.</p>
        <div class="analogy-box"><strong>The puzzle piece rule:</strong> One piece of a puzzle means nothing. But put enough pieces together and you see the whole picture. GDPR considers combinations of data, not just individual pieces.</div>`,
        quiz:{ q:"Which of these is personal data under GDPR?", opts:["The color blue","A stock photo of a mountain","Your home address","The temperature in Paris"], ans:2, explain:"Your home address identifies or helps locate you — that makes it personal data under GDPR's broad definition." } },

      { title:"Special Category Data", tagline:"Some data is so sensitive it gets extra protection",
        body:`<p>Not all personal data is equal. Some information is so sensitive that if it leaked, it could seriously harm a person. GDPR calls this <span class="key-term">special category data</span>, and processing it is generally <strong>prohibited</strong> unless a specific legal exception applies.</p>
        <div class="tag-header">The 9 special categories</div>
        <div class="badge-row">
          <span class="badge badge-coral">Health data</span><span class="badge badge-coral">Racial or ethnic origin</span><span class="badge badge-coral">Political opinions</span><span class="badge badge-coral">Religious beliefs</span><span class="badge badge-coral">Trade union membership</span><span class="badge badge-coral">Genetic data</span><span class="badge badge-coral">Biometric data</span><span class="badge badge-coral">Sexual orientation</span><span class="badge badge-coral">Sex life</span>
        </div>
        <div class="analogy-box"><strong>Why extra protection?</strong> Imagine your medical records were leaked online, or your political views were shared with your employer. This kind of data can lead to discrimination, harassment, or worse.</div>
        <div class="highlight-box">Children also receive special protection: under GDPR, children under 16 (or younger in some member states) need a parent or guardian's consent before companies can process their data for online services.</div>`,
        quiz:{ q:"Which of the following is a 'special category' under GDPR?", opts:["Your favorite TV show","Your health data","Your email address","Your shopping cart history"], ans:1, explain:"Health data is explicitly listed as a special category under GDPR Article 9 because of the serious harm that could result from its misuse." } },

      { title:"Who Does GDPR Apply To?", tagline:"It's not just a European thing",
        body:`<p>You might ask: "This is a European law — why should a company in Chicago or Tokyo care?" The answer is GDPR's <span class="key-term">territorial scope</span>. GDPR applies if <strong>any</strong> of these are true:</p>
        <div class="highlight-box">1. The company is based in the EU.<br>2. The company <em>offers goods or services</em> to people in the EU.<br>3. The company <em>monitors the behavior</em> of people in the EU.</div>
        <div class="analogy-box"><strong>Think of it like this:</strong> If a US restaurant opens a branch in France, it must follow French food-safety laws — not just US ones. GDPR works the same way: if you serve EU residents, you follow EU rules.</div>
        <p>GDPR also defines two key roles every executive should know:</p>
        <div class="badge-row">
          <span class="badge badge-blue">Data Controller — decides WHY and HOW data is used</span>
          <span class="badge badge-teal">Data Processor — processes data on the Controller's behalf</span>
        </div>`,
        quiz:{ q:"A company in New York sells products to customers in Germany. Does GDPR apply?", opts:["No — GDPR only applies in Europe","Yes — because they serve EU residents","Only if the company is very large","Only if they collect health data"], ans:1, explain:"GDPR's territorial scope means any company offering goods or services to EU residents must comply — regardless of where it is based." } },

      { title:"The 7 Principles of GDPR", tagline:"The foundation everything else is built on",
        body:`<p>Every rule in GDPR flows from <span class="key-term">7 core principles</span> in Article 5. These are the most important thing to understand about the regulation.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>1. Lawfulness, Fairness & Transparency</strong><span>Process data legally, fairly, and openly</span></div>
          <div class="cheat-pill"><strong>2. Purpose Limitation</strong><span>Only use data for its stated purpose</span></div>
          <div class="cheat-pill"><strong>3. Data Minimisation</strong><span>Collect only what you actually need</span></div>
          <div class="cheat-pill"><strong>4. Accuracy</strong><span>Keep data correct and up to date</span></div>
          <div class="cheat-pill"><strong>5. Storage Limitation</strong><span>Don't keep data longer than needed</span></div>
          <div class="cheat-pill"><strong>6. Integrity & Confidentiality</strong><span>Keep data safe and secure</span></div>
          <div class="cheat-pill"><strong>7. Accountability</strong><span>Be able to prove you follow the rules</span></div>
        </div>
        <div class="analogy-box"><strong>The 7 principles are like the rules of borrowing something.</strong> If a friend lends you their car: you have a good reason (lawful), you only use it to get groceries (purpose), you don't let strangers drive it (minimisation), you return it in good condition (accuracy), and you give it back when you said you would (storage limitation).</div>`,
        quiz:{ q:"How many core principles does GDPR have?", opts:["3","5","7","10"], ans:2, explain:"GDPR has exactly 7 principles laid out in Article 5. They form the backbone of the entire regulation." } },

      { title:"Principle 1 — Lawfulness, Fairness & Transparency", tagline:"You must have a legal reason, be fair, and be honest",
        body:`<p>The first principle packs three ideas into one, all about the basic honesty of how you handle data.</p>
        <p><strong>Lawfulness</strong> means there must be a valid legal reason to process someone's data. <strong>Fairness</strong> means not using data in ways that would harm or surprise people. <strong>Transparency</strong> means people must know what's happening with their data.</p>
        <div class="highlight-box">Transparency in practice: that long privacy notice you see when signing up for an app is GDPR's transparency requirement in action. Companies must tell you what data they collect, why they need it, and what they'll do with it — in plain language.</div>
        <div class="analogy-box"><strong>Analogy:</strong> You ask a classmate to borrow their notes. Lawful = you have a reason (studying). Fair = you won't copy and sell them. Transparent = you told them exactly what you need them for.</div>`,
        quiz:{ q:"What does 'transparency' require under GDPR Principle 1?", opts:["Companies can collect data secretly if needed","People must be clearly told how their data is used","Data can only be used by EU-based companies","Transparency only applies to health data"], ans:1, explain:"Transparency means individuals must be clearly informed about what data is collected, why, and how it's used — in plain, understandable language." } },

      { title:"Principle 3 — Data Minimisation", tagline:"Take only what you actually need",
        body:`<p><span class="key-term">Data minimisation</span> is refreshingly simple: collect only the <em>minimum amount of personal data</em> actually necessary to achieve your stated purpose.</p>
        <div class="highlight-box">The key test: "Do we <em>need</em> this piece of data to do the thing we said we'd do?" If the answer is no — don't collect it.</div>
        <div class="analogy-box"><strong>Real-world example:</strong> You order a pizza for delivery. The pizza place needs your address. Do they need your date of birth? Your relationship status? Your job title? No. Data minimisation says collect the address — leave everything else alone.</div>
        <p>Think about apps that ask for permissions they clearly don't need. A flashlight app that wants access to your contacts, location, microphone, and camera? That's a data minimisation violation waiting to happen.</p>`,
        quiz:{ q:"A fitness app asks for your social security number to track your steps. Is this a violation?", opts:["No — they can collect anything they want","Yes — an SSN is not necessary for step tracking","Only if the app is European","No — step tracking is a health issue"], ans:1, explain:"Collecting a social security number for step tracking clearly violates Data Minimisation — the SSN has no bearing on the stated purpose." } },

      { title:"Principle 7 — Accountability", tagline:"It's not enough to follow the rules — you must prove it",
        body:`<p>The final principle ties everything together: <span class="key-term">Accountability</span>. Under GDPR it is not enough to say "we follow the rules." You must be able to <em>demonstrate</em> that you do.</p>
        <div class="highlight-box">Accountability obligations include: maintaining records of processing activities, training staff, writing and enforcing data protection policies, conducting Data Protection Impact Assessments, and appointing a Data Protection Officer where required.</div>
        <div class="analogy-box"><strong>Analogy:</strong> A school says "we're fair to all students." But if a student complains, the school must produce attendance records, grade reports, and disciplinary logs proving it. Just saying it isn't enough. GDPR works the same way.</div>
        <p>This is the principle that makes GDPR a true <em>governance</em> framework — directly relevant to directors and boards — not just a checkbox exercise.</p>`,
        quiz:{ q:"Under Accountability, if a regulator asks a company to prove GDPR compliance, what should it provide?", opts:["A verbal promise from the CEO","Their company website","Documentation, records, policies, and evidence of compliance programs","A letter from a lawyer"], ans:2, explain:"Accountability requires documented proof of compliance — records of processing, privacy policies, training records, DPIAs, and more." } },

      { title:"The 6 Lawful Bases for Processing", tagline:"You must have a legal reason to use someone's data",
        body:`<p>GDPR provides exactly <strong>6 lawful bases</strong> — and you need at least one every time you process personal data.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>1. Consent</strong><span>The person freely agreed to it</span></div>
          <div class="cheat-pill"><strong>2. Contract</strong><span>Needed to fulfil a contract with them</span></div>
          <div class="cheat-pill"><strong>3. Legal Obligation</strong><span>Required by law</span></div>
          <div class="cheat-pill"><strong>4. Vital Interests</strong><span>To protect someone's life</span></div>
          <div class="cheat-pill"><strong>5. Public Task</strong><span>Carried out by official authority</span></div>
          <div class="cheat-pill"><strong>6. Legitimate Interests</strong><span>Genuine business need, balanced vs. your rights</span></div>
        </div>
        <div class="highlight-box"><strong>Quick examples:</strong> Your bank processes your data under <em>Contract</em>. Your hospital uses <em>Vital Interests</em> and <em>Legal Obligation</em>. A marketing email company uses <em>Consent</em>. The government collects tax data under <em>Legal Obligation</em>.</div>`,
        quiz:{ q:"A company wants to send you marketing emails. Which lawful basis is most commonly used?", opts:["Vital Interests","Legal Obligation","Consent","Public Task"], ans:2, explain:"Marketing emails typically rely on Consent — because you chose to receive them." } },

      { title:"Consent — What It Really Means", tagline:"A real yes, freely given, fully informed",
        body:`<p>Under GDPR, consent is not just any "yes." It must be:</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Freely given</strong><span>No pressure — refusing can't cause harm</span></div>
          <div class="cheat-pill"><strong>Specific</strong><span>For a defined purpose — not a blanket yes</span></div>
          <div class="cheat-pill"><strong>Informed</strong><span>You know exactly what you're agreeing to</span></div>
          <div class="cheat-pill"><strong>Unambiguous</strong><span>A clear positive action — no pre-ticked boxes</span></div>
        </div>
        <div class="highlight-box"><strong>Pre-ticked boxes are not valid consent.</strong> If a company signs you up for marketing by default and you must untick a box to opt out — that's not GDPR-compliant. You must actively opt <em>in</em>.</div>
        <div class="analogy-box"><strong>Analogy:</strong> "Sign this form or you can't use our app" is NOT freely given consent. Real consent means you can say no without losing access to something you're entitled to. You also have the right to withdraw consent at any time — and it must be as easy to withdraw as to give.</div>`,
        quiz:{ q:"A website has a pre-ticked box subscribing you to marketing emails. Is this valid GDPR consent?", opts:["Yes — you could have unticked it","No — consent must be an active opt-in","Yes — if it's in the privacy policy","Only if you're over 18"], ans:1, explain:"Pre-ticked boxes are explicitly invalid under GDPR. Consent must be an affirmative, active choice." } },

      { title:"Right of Access (Subject Access Request)", tagline:"You can ask any company: 'What data do you have on me?'",
        body:`<p>The <span class="key-term">Right of Access</span>, also called a <span class="key-term">Subject Access Request (SAR)</span>, lets anyone ask an organization for a complete copy of the personal data it holds about them — plus information on how it's used.</p>
        <div class="highlight-box">A company must respond to a Subject Access Request within <strong>one month</strong>, and in most cases <em>free of charge</em>.</div>
        <div class="badge-row">
          <span class="badge badge-blue">What data they hold about you</span><span class="badge badge-blue">Why they have it</span><span class="badge badge-blue">Who they share it with</span><span class="badge badge-blue">How long they keep it</span><span class="badge badge-blue">Your rights to correct or delete it</span>
        </div>
        <div class="analogy-box"><strong>Real-life use:</strong> In 2018 a journalist submitted SARs to Google and Facebook. Google returned 5.5 GB of data; Facebook returned 600 MB — including every search, every ad clicked, location history, and call logs. SARs reveal how much companies store about us.</div>
        <p>You don't have to give a reason, and you don't need a lawyer — you just need to ask.</p>`,
        quiz:{ q:"How long does a company have to respond to a Subject Access Request?", opts:["1 week","1 month","3 months","1 year"], ans:1, explain:"GDPR Article 12 requires companies to respond to Subject Access Requests within one calendar month of receiving the request." } }
    ]
  });

  F.push({ id:"hipaa", name:"HIPAA", subtitle:"Health Insurance Portability and Accountability Act",
    category:"Privacy & Industry Regulations", color:"#b0512a", lessonsTotal:30, source:"HIPAA/hipaa_30day_curriculum.html",
    desc:"The U.S. law protecting the privacy and security of health information.",
    days:[
      { title:"What Is HIPAA?", tagline:"The U.S. law that protects your medical information",
        body:`<p><span class="key-term">HIPAA</span> — the Health Insurance Portability and Accountability Act, signed in 1996 — protects the privacy and security of individuals' medical information in the United States.</p>
        <div class="analogy-box"><strong>Real-world analogy:</strong> Think of HIPAA like a secure vault for your medical history. Your doctors, hospitals, and insurers hold a key. HIPAA sets the rules for who can look inside, when, and why — and ensures the vault is strong enough that unauthorized people can't break in.</div>
        <p>HIPAA has four main components, called "Rules":</p>
        <div class="badge-row">
          <span class="badge badge-pink">Privacy Rule — who can see your information and when</span>
          <span class="badge badge-pink">Security Rule — how electronic health information must be protected</span>
          <span class="badge badge-pink">Breach Notification Rule — what happens when data is exposed</span>
          <span class="badge badge-pink">Enforcement Rule — how violations are investigated and punished</span>
        </div>`,
        quiz:{ q:"What does HIPAA stand for?", opts:["Health Information Privacy and Access Act","Health Insurance Portability and Accountability Act","Healthcare Information Protection and Authorization Act","Hospital Insurance Privacy and Accountability Act"], ans:1, explain:"HIPAA is the Health Insurance Portability and Accountability Act, signed in 1996, protecting the privacy and security of medical information in the US." } },

      { title:"Why Was HIPAA Created?", tagline:"The problems it was built to solve",
        body:`<p>HIPAA responded to real problems in 1990s American healthcare as it became more computerized and fragmented.</p>
        <div class="highlight-box"><strong>The "Portability" problem:</strong> Millions of Americans lost health coverage when they changed or lost jobs, because insurers could refuse "pre-existing conditions." HIPAA's original primary purpose was protecting workers' ability to keep insurance when changing jobs — that's the "portability."</div>
        <div class="analogy-box"><strong>The pre-HIPAA world:</strong> Before HIPAA, a hospital could legally share your records with your employer, an insurer could share your diagnosis with a credit bureau, and a pharmacy could sell your prescription history. Medical information had essentially no federal privacy protection.</div>
        <p>The Privacy Rule and Security Rule — what most people mean by "HIPAA" — weren't implemented until 2003 and 2005, and were strengthened by the HITECH Act (2009) and Omnibus Rule (2013).</p>`,
        quiz:{ q:"What was HIPAA's original primary purpose?", opts:["Preventing hospital data breaches","Protecting workers' ability to keep health insurance when changing jobs","Standardizing electronic health records","Regulating pharmaceutical companies"], ans:1, explain:"HIPAA's original purpose was health insurance 'portability' — protecting coverage when changing or losing jobs. Privacy and security protections grew out of the broader reform effort." } },

      { title:"Who Must Follow HIPAA — Covered Entities", tagline:"The organizations directly bound by HIPAA",
        body:`<p>HIPAA applies to specific organizations called <span class="key-term">Covered Entities</span>. If an organization isn't a Covered Entity (or Business Associate), HIPAA simply doesn't apply.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Healthcare Providers</strong><span>Providers that transmit health information electronically — hospitals, clinics, doctors, dentists, pharmacies, nursing homes, mental health counselors.</span></div>
          <div class="cheat-pill"><strong>Health Plans</strong><span>Organizations that provide or pay for care — insurers, HMOs, Medicare and Medicaid, employer-sponsored plans with 50+ participants.</span></div>
          <div class="cheat-pill"><strong>Healthcare Clearinghouses</strong><span>Intermediaries that translate nonstandard health information into standard billing/claims formats.</span></div>
        </div>
        <div class="warning-box"><strong>Notably NOT covered:</strong> employers (even seeing benefits data), life insurers, schools, and most consumer health-app developers. A fitness app collecting sensitive health data generally isn't covered by HIPAA — a major gap in US health privacy law.</div>`,
        quiz:{ q:"Your employer accesses some health information through the company health plan. Is your employer a HIPAA Covered Entity?", opts:["Yes — employers always qualify","No — employers are generally not Covered Entities, even though they handle some health-related information","Only if 50+ employees","Only if the employer is a hospital"], ans:1, explain:"Employers are generally NOT Covered Entities. HIPAA applies to Healthcare Providers, Health Plans, and Clearinghouses. Employer health data is governed by other laws (ADA, GINA)." } },

      { title:"Business Associates", tagline:"The vendors who handle health data for covered entities",
        body:`<p>Covered Entities rely on third parties — billing companies, cloud providers, analytics firms — that handle Protected Health Information on their behalf. These are <span class="key-term">Business Associates</span>, and they are <strong>directly subject to HIPAA</strong>, facing the same penalties.</p>
        <div class="badge-row">
          <span class="badge badge-pink">Medical billing companies</span><span class="badge badge-pink">EHR software vendors</span><span class="badge badge-pink">Cloud storage hosting records</span><span class="badge badge-pink">Data analytics firms</span><span class="badge badge-pink">Healthcare legal &amp; accounting firms</span><span class="badge badge-pink">Document shredding services</span>
        </div>
        <div class="analogy-box"><strong>The Business Associate Agreement (BAA):</strong> HIPAA requires a written contract — the BAA — establishing permitted uses of PHI, requiring safeguards, requiring breach notification back to the Covered Entity, and making the Business Associate directly accountable.</div>
        <div class="warning-box"><strong>It flows down the chain:</strong> A Business Associate's subcontractor that also handles PHI is itself a Business Associate and also needs a BAA. The obligation flows down the entire supply chain.</div>`,
        quiz:{ q:"A hospital uses a cloud company to store patient records. What is the cloud company's relationship to HIPAA?", opts:["No HIPAA obligations — only the hospital has them","It is a Business Associate and is directly subject to HIPAA, requiring a BAA with the hospital","Only if it is also a healthcare provider","HIPAA doesn't apply to technology companies"], ans:1, explain:"The cloud company handles PHI on the hospital's behalf, making it a Business Associate — directly subject to HIPAA, with the same penalties, requiring a BAA." } },

      { title:"Protected Health Information (PHI)", tagline:"If it identifies you and relates to your health, it's probably PHI",
        body:`<p>Everything HIPAA regulates is about protecting <span class="key-term">Protected Health Information (PHI)</span>.</p>
        <div class="highlight-box">PHI is individually identifiable health information created, received, maintained, or transmitted by a Covered Entity or Business Associate, in any form (electronic, paper, or oral). Three elements must all be present: (1) health information, (2) that identifies or could identify an individual, (3) held by a Covered Entity or Business Associate. HIPAA lists <strong>18 specific identifiers</strong> (names, dates, SSNs, medical record numbers, biometrics, full-face photos, and more).</div>
        <div class="analogy-box"><strong>A key test:</strong> "Patient has Type 2 diabetes" alone is NOT PHI — it identifies no one. Combined with a name, date of birth, or record number, it IS PHI. The health information must be linked to an identifiable person.</div>
        <div class="info-box"><strong>De-identified data is NOT PHI:</strong> remove all 18 identifiers (Safe Harbor) or have an expert certify minimal re-identification risk, and HIPAA no longer applies — which is why healthcare firms invest heavily in de-identification.</div>`,
        quiz:{ q:"A dataset has diagnoses with all names and IDs removed, but each patient's full zip code remains. Is it PHI?", opts:["No — once names are removed it's de-identified","Possibly — zip codes are geographic identifiers that could re-identify individuals in small areas, so it may still be PHI","Yes — any health information is always PHI","No — zip codes aren't among the 18 identifiers"], ans:1, explain:"Zip codes are on the 18-identifier list. Safe Harbor allows only the first 3 digits, and only if the area exceeds 20,000 people — smaller areas must be masked. Otherwise the data may still be PHI." } },

      { title:"The Security Rule — Three Safeguards", tagline:"How electronic health information (ePHI) must be protected",
        body:`<p>The Privacy Rule covers PHI in any form; the <span class="key-term">Security Rule</span> applies specifically to <strong>electronic PHI (ePHI)</strong> — because an improperly secured electronic file can be stolen by thousands of attackers worldwide at once. The Security Rule requires three categories of safeguards.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Administrative Safeguards</strong><span>The largest category — policies and processes: risk analysis, workforce training, access management, a designated Security Official, and incident response procedures.</span></div>
          <div class="cheat-pill"><strong>Physical Safeguards</strong><span>Protecting facilities and devices: facility access controls, workstation security, and device/media disposal and reuse controls.</span></div>
          <div class="cheat-pill"><strong>Technical Safeguards</strong><span>Technology controls: access control, audit logging, integrity controls, transmission security, and encryption of ePHI.</span></div>
        </div>
        <div class="highlight-box"><strong>Required vs. addressable:</strong> Some specifications are "required"; others are "addressable" — meaning you must implement them if reasonable, or document why an equivalent alternative is used. "Addressable" does <em>not</em> mean optional. Everything begins with a documented <strong>risk analysis</strong>.</div>`,
        quiz:{ q:"What does HIPAA's Security Rule require organizations to implement?", opts:["Only firewalls","Administrative, physical, and technical safeguards to protect electronic PHI","Marketing disclosures","A specific cloud vendor"], ans:1, explain:"The Security Rule requires Covered Entities and Business Associates to implement administrative, physical, and technical safeguards for ePHI, anchored by a documented risk analysis." } },

      { title:"The Breach Notification Rule", tagline:"What must happen when health data is exposed",
        body:`<p>When unsecured PHI is exposed, the <span class="key-term">Breach Notification Rule</span> requires specific, time-bound notifications — turning breaches from a private problem into a public, accountable process.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Notify Individuals</strong><span>Affected individuals must be notified without unreasonable delay and no later than <strong>60 days</strong> after discovery.</span></div>
          <div class="cheat-pill"><strong>Notify HHS (OCR)</strong><span>The Office for Civil Rights is notified — immediately for breaches affecting 500+ individuals, annually for smaller ones.</span></div>
          <div class="cheat-pill"><strong>Notify the Media</strong><span>For breaches affecting 500+ residents of a state, prominent local media must be notified.</span></div>
          <div class="cheat-pill"><strong>Business Associates Notify</strong><span>A Business Associate that suffers a breach must notify the Covered Entity, which then handles the downstream notifications.</span></div>
        </div>
        <div class="highlight-box">Enforcement is handled by HHS's <strong>Office for Civil Rights (OCR)</strong>, with civil penalties scaling by culpability and criminal penalties for willful misuse. Large breaches are posted publicly on OCR's "Wall of Shame."</div>`,
        quiz:{ q:"Within what timeframe must individuals be notified of a HIPAA breach of their unsecured PHI?", opts:["Within 24 hours","Without unreasonable delay and no later than 60 days after discovery","Within one year","Only if more than 500 are affected"], ans:1, explain:"Individuals must be notified without unreasonable delay and within 60 days of discovery. Breaches affecting 500+ also require immediate notice to HHS/OCR and to prominent local media." } }
    ]
  });

  F.push({ id:"pci-dss", name:"PCI DSS", subtitle:"Payment Card Industry Data Security Standard",
    category:"Privacy & Industry Regulations", color:"#b0512a", lessonsTotal:30, source:"PCI DSS/pci_dss_30day_curriculum.html",
    desc:"The mandatory security standard for any organization that handles payment card data.",
    days:[
      { title:"What Is PCI DSS?", tagline:"The security standard for everyone who handles payment cards",
        body:`<p><span class="key-term">PCI DSS</span> (Payment Card Industry Data Security Standard) is a set of security requirements that any organization storing, processing, or transmitting payment card data must meet. The current version is <strong>v4.0.1</strong> (June 2024), governed by the <strong>PCI Security Standards Council</strong>, founded in 2006 by the five major card brands.</p>
        <div class="analogy-box"><strong>Real-world analogy:</strong> Think of PCI DSS like the safety code for electrical wiring. The people who design, sell, and use electrical systems agreed everyone follows the same rules — or the whole system fails dangerously. PCI DSS is the "electrical code" for payment security, enforced through contracts with every business that accepts cards.</div>
        <div class="highlight-box">It is <strong>not a law</strong> — it's enforced through contracts with card brands and acquiring banks. Non-compliance can bring fines, higher transaction fees, and ultimately the loss of the ability to accept cards. It applies globally to any business accepting the five major brands.</div>`,
        quiz:{ q:"PCI DSS is enforced through law in the United States. True or false?", opts:["True — the US government mandates it","False — it is a contractual requirement enforced by card brands and acquiring banks, though some states reference it in breach laws","True — the FTC enforces it","False — it has no enforcement mechanism"], ans:1, explain:"PCI DSS is contractual, not statutory. By agreeing to accept cards, a business agrees to comply; the card brands enforce it through acquiring banks, with fines and loss of card-acceptance privileges rather than criminal prosecution." } },

      { title:"Why Was PCI DSS Created?", tagline:"The wave of card breaches that forced the industry to act",
        body:`<p>By the early 2000s, card fraud was a growing crisis, and each card brand had its own separate security program — a merchant accepting all five had to comply with five different, sometimes contradictory standards.</p>
        <div class="highlight-box"><strong>The TJX breach:</strong> In 2005–2006, TJX (TJ Maxx, Marshalls) suffered the largest retail breach to that point — attackers exploited weak wireless encryption and stole an estimated 45–94 million card numbers over 18 months. It cost over $256 million and gave urgency to a unified, enforceable standard.</div>
        <div class="analogy-box"><strong>The formation of PCI SSC:</strong> In 2006, Visa, Mastercard, American Express, Discover, and JCB — fierce competitors — jointly formed the PCI Security Standards Council, because fraud threatened the entire shared payment ecosystem. The standard they published became the foundation of payment security worldwide.</div>`,
        quiz:{ q:"Why did five competing card brands agree to one shared standard?", opts:["Government regulators forced them to","Because card fraud threatened the entire shared ecosystem — a breach at one point affects all brands, and fragmented standards left merchants less secure","Because it reduced their costs","Because Visa forced the others to adopt its standard"], ans:1, explain:"The payment ecosystem is interdependent — a breach at one merchant affects all brands whose cards were stored there. The shared threat overrode competitive instincts." } },

      { title:"The PCI Security Standards Council", tagline:"Who owns the standard — and who enforces it",
        body:`<p>The <span class="key-term">PCI Security Standards Council (PCI SSC)</span> develops and maintains PCI DSS — but a crucial distinction: it does <strong>not</strong> enforce it. Enforcement is done by each card brand through acquiring banks.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Standards Development</strong><span>PCI SSC maintains PCI DSS and related standards (secure software, point-to-point encryption, token service providers).</span></div>
          <div class="cheat-pill"><strong>Qualified Security Assessors (QSAs)</strong><span>Independent firms PCI SSC certifies to conduct formal assessments for large merchants and service providers.</span></div>
          <div class="cheat-pill"><strong>Approved Scanning Vendors (ASVs)</strong><span>Companies authorized to run the required quarterly external vulnerability scans.</span></div>
          <div class="cheat-pill"><strong>Participating Organizations</strong><span>Thousands of merchants and vendors provide feedback that shapes how the standard evolves.</span></div>
        </div>
        <div class="warning-box"><strong>The split that matters:</strong> when a merchant is fined or terminated, that comes from their acquiring bank acting for the card brands — NOT from PCI SSC. PCI SSC sets the rules; the card brands enforce them through the banks.</div>`,
        quiz:{ q:"A merchant receives a PCI non-compliance fine. Who issued it?", opts:["The PCI Security Standards Council directly","Their acquiring bank, acting on behalf of the card brand(s) — PCI SSC sets standards but enforcement flows through the brands and banks","The Federal Trade Commission","A Qualified Security Assessor"], ans:1, explain:"PCI SSC has no enforcement authority. Fines and the ability to accept cards are controlled by the card brands through the acquiring banks — the merchant's direct enforcement relationship." } },

      { title:"Cardholder Data — What PCI DSS Protects", tagline:"The specific data elements that define what's in scope",
        body:`<p>PCI DSS has a very specific scope: <span class="key-term">cardholder data (CHD)</span> and <span class="key-term">sensitive authentication data (SAD)</span>.</p>
        <div class="highlight-box"><strong>Cardholder Data (can be stored with protection):</strong> Primary Account Number (PAN — the 16-digit number, the anchor), cardholder name, expiration date, service code.<br><br><strong>Sensitive Authentication Data (can NEVER be stored after authorization, even encrypted):</strong> full magnetic-stripe/track data, the CVV/CVC security code, and PINs.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>The PAN is the anchor</strong><span>Without a PAN, name and expiration date are not "cardholder data" for PCI purposes. The PAN makes data in-scope.</span></div>
          <div class="cheat-pill"><strong>SAD can never be stored</strong><span>CVV and stripe data must be gone after authorization — one of PCI's most absolute prohibitions.</span></div>
          <div class="cheat-pill"><strong>Truncation</strong><span>Storing only the last four digits ("xxxx-1234") means you don't hold a full PAN — reducing scope.</span></div>
          <div class="cheat-pill"><strong>Tokenization</strong><span>Replacing the PAN with a random token with no link to the real number can remove systems from scope entirely — tokens are worthless if stolen.</span></div>
        </div>`,
        quiz:{ q:"A database has cardholder names and expiration dates but no PAN. Is it subject to PCI DSS as cardholder data?", opts:["Yes — any payment data is covered","No — name and expiration date without a PAN are not cardholder data for PCI purposes; the PAN is the defining element that brings data into scope","Yes — expiration dates always trigger PCI","It depends on the number of cards"], ans:1, explain:"PCI DSS defines cardholder data as data including or associated with a PAN. Without a PAN, name and expiration date aren't in-scope cardholder data — which is why eliminating PAN storage reduces scope." } },

      { title:"The Cardholder Data Environment (CDE) and Scope", tagline:"The most important compliance decision you'll make",
        body:`<p>The <span class="key-term">Cardholder Data Environment (CDE)</span> is the people, processes, and technology that store, process, or transmit cardholder data — plus anything connected that could affect its security. Defining the CDE is the single most strategic PCI decision, because scope determines the entire program's cost and complexity.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Scope reduction is strategic</strong><span>Every system removed from scope is one that doesn't need the full set of PCI controls — dramatically cutting cost and effort.</span></div>
          <div class="cheat-pill"><strong>Network segmentation</strong><span>Isolating the CDE with firewalls keeps out-of-CDE systems out of scope. Without segmentation, every system on the network could be in scope.</span></div>
          <div class="cheat-pill"><strong>Connected systems</strong><span>Any system with connectivity to the CDE that could be a pivot point can be in scope — even an HR system on a flat network.</span></div>
          <div class="cheat-pill"><strong>Scope creep</strong><span>Card data appearing where it shouldn't — in log files, emails, or dev environments — is a common, dangerous failure.</span></div>
        </div>
        <div class="analogy-box"><strong>The quarantine analogy:</strong> The CDE is a hospital quarantine zone holding dangerous material (card data). Segmentation is the barrier. Systems inside meet the strictest standards; systems serving it have obligations; systems with no connection are exempt. The goal is to make the zone as small as possible.</div>`,
        quiz:{ q:"With proper segmentation, an HR system on a separate network with no CDE connectivity — is it in PCI scope?", opts:["Yes — all systems in a card-accepting org are in scope","No — with effective segmentation, a system with no CDE connectivity that can't affect card data security is out of scope","Only if it processes expense reimbursements","Yes — HR and cardholder data are related"], ans:1, explain:"Effective network segmentation removes systems with no CDE connectivity from scope — a primary benefit of segmentation. The segmentation itself must be tested periodically to confirm it isolates the CDE." } },

      { title:"The 12 PCI DSS Requirements", tagline:"The complete framework, organized into six goals",
        body:`<p>PCI DSS organizes <strong>12 Requirements</strong> under <strong>6 Goals</strong> — a layered, defense-in-depth approach.</p>
        <div class="goal-card"><b>Goal 1 — Build &amp; Maintain a Secure Network</b><br>1. Network security controls · 2. Secure configurations</div>
        <div class="goal-card"><b>Goal 2 — Protect Account Data</b><br>3. Protect stored account data · 4. Strong cryptography in transit over public networks</div>
        <div class="goal-card"><b>Goal 3 — Vulnerability Management</b><br>5. Protect against malware · 6. Develop and maintain secure systems and software</div>
        <div class="goal-card"><b>Goal 4 — Strong Access Control</b><br>7. Restrict access by business need-to-know · 8. Identify and authenticate users · 9. Restrict physical access</div>
        <div class="goal-card"><b>Goal 5 — Monitor &amp; Test Networks</b><br>10. Log and monitor all access · 11. Test security regularly</div>
        <div class="goal-card"><b>Goal 6 — Information Security Policy</b><br>12. Support security with organizational policies and programs</div>`,
        quiz:{ q:"Which PCI DSS goal addresses the human and organizational side — policies, programs, and responsibilities?", opts:["Goal 1 — Secure Network","Goal 4 — Access Control","Goal 6 — Maintain an Information Security Policy (Requirement 12)","Goal 3 — Vulnerability Management"], ans:2, explain:"Goal 6 (Requirement 12) addresses the policies, roles, and awareness programs that make technical controls effective — without which even perfect technical controls are undermined by human error." } },

      { title:"Validating Compliance — Levels, SAQ &amp; ROC", tagline:"How an organization proves it actually complies",
        body:`<p>How you validate PCI compliance depends on how many transactions you process. Merchants are sorted into <span class="key-term">four levels</span>, with Level 1 (the largest, ~6M+ transactions/year) facing the most rigorous validation.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Self-Assessment Questionnaire (SAQ)</strong><span>Smaller merchants self-assess using the SAQ type matching how they handle cards (e.g., SAQ A for fully outsourced e-commerce). Less burdensome.</span></div>
          <div class="cheat-pill"><strong>Report on Compliance (ROC)</strong><span>Level 1 merchants undergo a formal annual assessment, usually by a QSA, producing a Report on Compliance — the most rigorous validation.</span></div>
          <div class="cheat-pill"><strong>Attestation of Compliance (AOC)</strong><span>A signed summary confirming the assessment result, shared with acquiring banks and partners.</span></div>
          <div class="cheat-pill"><strong>Quarterly ASV Scans</strong><span>Most merchants must also pass quarterly external vulnerability scans by an Approved Scanning Vendor.</span></div>
        </div>
        <div class="highlight-box"><strong>For executives:</strong> the cheapest path to compliance is to <em>handle as little card data as possible</em> — outsourcing and tokenizing so you qualify for the simplest SAQ rather than a full ROC. Scope reduction is both a security and a cost strategy.</div>`,
        quiz:{ q:"What primarily determines whether a merchant completes a self-assessment (SAQ) versus a formal Report on Compliance (ROC)?", opts:["The merchant's industry","Their transaction volume and merchant level — the largest (Level 1) merchants require a formal annual ROC assessment, while smaller merchants may self-assess via SAQ","The country they operate in","Whether they use Visa or Mastercard"], ans:1, explain:"Validation rigor scales with transaction volume. Level 1 merchants need a formal ROC (typically by a QSA); smaller merchants may use the appropriate SAQ. Reducing how card data is handled can qualify a merchant for a simpler SAQ." } }
    ]
  });

  F.push({ id:"soc2", name:"SOC 2", subtitle:"Service Organization Control 2",
    category:"Privacy & Industry Regulations", color:"#b0512a", lessonsTotal:30, source:"SOC2/soc2_30day_curriculum.html",
    desc:"The leading U.S. attestation report demonstrating security controls to customers.",
    days:[
      { title:"What Is SOC 2?", tagline:"The independent audit report that proves you can be trusted with data",
        body:`<p><span class="key-term">SOC 2</span> (System and Organization Controls 2) is an independent audit report, issued by a licensed CPA firm, evaluating whether a service organization's controls protect customer data effectively. It was created by the <strong>AICPA</strong> — the American Institute of Certified Public Accountants.</p>
        <p>Unlike laws such as GDPR, SOC 2 is <strong>voluntary</strong> — but in practice it's a <em>de facto requirement</em> in technology. If you want to sell software to enterprises, hospitals, banks, or government, those customers will almost certainly demand a SOC 2 report before signing.</p>
        <div class="highlight-box">SOC 2 is not a product certification or a checklist — it is an <em>independent audit opinion</em>: a qualified auditor's professional judgment that your controls are operating effectively. That independent credibility is what makes it valuable.</div>`,
        quiz:{ q:"What organization created and maintains the SOC 2 standard?", opts:["ISACA","The European Union","AICPA (American Institute of Certified Public Accountants)","NIST"], ans:2, explain:"SOC 2 was created by the AICPA, the professional body for US accountants and auditors — which is why SOC 2 reports are issued by licensed CPA firms." } },

      { title:"Why Was SOC 2 Created?", tagline:"The cloud computing explosion that changed everything",
        body:`<p>In the early 2000s, most companies ran their own software on their own servers — your data stayed in your building. Then Salesforce, AWS, and Google began storing customers' data in <em>someone else's</em> computers — "the cloud." Suddenly businesses were handing sensitive information to outside companies they had little visibility into.</p>
        <div class="highlight-box"><strong>The problem:</strong> How does a business know a cloud provider handling its data is actually secure? They can't visit every data center or inspect every server. They needed an independent, standardized way to assess trust.</div>
        <div class="analogy-box"><strong>Think of it this way:</strong> When you buy food at a grocery store, you don't test every product — you trust that inspectors have done that work. SOC 2 creates that trusted inspector role for technology providers, so customers don't have to audit every vendor themselves.</div>
        <p>Before SOC 2, every enterprise sent different security questionnaires to every vendor — massive duplication. SOC 2 created a single standard that satisfies many customers at once.</p>`,
        quiz:{ q:"Which business trend most directly drove SOC 2's creation?", opts:["The invention of the internet in the 1990s","The rise of cloud computing — companies storing data on external providers' systems","The Sarbanes-Oxley Act","GDPR"], ans:1, explain:"Cloud computing created the need: when businesses began storing data in third-party systems, they needed a standardized way to assess whether providers protect it properly." } },

      { title:"SOC 1, SOC 2, and SOC 3 — What's the Difference?", tagline:"Three reports, three purposes",
        body:`<p>The AICPA has a family of SOC reports serving different purposes and audiences.</p>
        <div class="tsc-grid">
          <div class="tsc-security"><strong style="color:#501313">SOC 1 — Financial Controls</strong><br><span style="font-size:12px">Internal controls over <em>financial reporting</em>. For systems that could affect a customer's financial statements — payroll, pension administration. Tied to SOX.</span></div>
          <div class="tsc-availability"><strong style="color:#0C447C">SOC 2 — Security &amp; Trust</strong><br><span style="font-size:12px">Controls over security, availability, processing integrity, confidentiality, and privacy. The most requested report in tech.</span></div>
          <div class="tsc-integrity"><strong style="color:#633806">SOC 3 — Public Summary</strong><br><span style="font-size:12px">A simplified, publicly shareable version of SOC 2 — just the auditor's opinion. Used as a website trust badge.</span></div>
          <div class="tsc-confidential"><strong style="color:#3C3489">SOC 2+ (Emerging)</strong><br><span style="font-size:12px">A SOC 2 that also covers HIPAA, PCI DSS, ISO 27001, or NIST — one audit, multiple frameworks.</span></div>
        </div>
        <div class="highlight-box">SOC 2 reports are <strong>confidential</strong> — shared with customers under NDA. SOC 3 reports are <strong>public</strong>. That's why you see SOC 3 badges on websites but never full SOC 2 reports.</div>`,
        quiz:{ q:"A company wants to post proof of its security audit on its public website. Which report is designed for this?", opts:["SOC 1 — financial controls","SOC 2 — the detailed report","SOC 3 — the publicly shareable summary","SOC 2+ — multiple frameworks"], ans:2, explain:"SOC 3 is the publicly shareable summary containing only the auditor's opinion — no confidential control details — making it safe to post publicly." } },

      { title:"The AICPA and Trust Services Criteria", tagline:"The authority behind SOC 2 and the rulebook it uses",
        body:`<p>SOC 2 audits are governed by the AICPA's <span class="key-term">Trust Services Criteria (TSC)</span> — the standards auditors use to evaluate controls.</p>
        <div class="highlight-box">The TSC (updated 2017, with 2022 guidance) is the AICPA's framework for evaluating the security, availability, processing integrity, confidentiality, and privacy of technology systems.</div>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Common Criteria (CC)</strong><span>Controls that apply to every audit regardless of scope: control environment, risk assessment, monitoring, logical access, operations, and change management. Based on the COSO Internal Control framework.</span></div>
          <div class="cheat-pill"><strong>Additional Criteria</strong><span>Supplemental criteria that apply only when a specific category (Availability, Processing Integrity, Confidentiality, or Privacy) is in scope.</span></div>
        </div>
        <div class="analogy-box"><strong>Building-code analogy:</strong> Common Criteria are the universal rules every building follows — foundations, fire exits. Additional Criteria are specialized rules for certain building types. The category in scope determines which extra rules apply on top of the universal ones.</div>`,
        quiz:{ q:"What are the 'Common Criteria' in SOC 2?", opts:["Criteria specific to privacy only","Controls that apply to all SOC 2 audits regardless of which categories are in scope","Criteria only for financial companies","Optional guidelines"], ans:1, explain:"Common Criteria are the baseline security controls applied to every SOC 2 audit. Additional criteria apply only when specific categories like Availability or Privacy are in scope." } },

      { title:"The 5 Trust Services Categories", tagline:"The five areas SOC 2 can evaluate",
        body:`<p>The heart of SOC 2 is its <span class="key-term">5 Trust Services Categories</span> — only one is mandatory.</p>
        <div class="tsc-grid">
          <div class="tsc-security"><strong style="color:#501313">Security</strong> (mandatory)<br><span style="font-size:12px">Protects systems from unauthorized access, disclosure, or damage. The foundation of every SOC 2.</span></div>
          <div class="tsc-availability"><strong style="color:#0C447C">Availability</strong> (optional)<br><span style="font-size:12px">Systems are available as agreed. Critical for cloud providers with uptime commitments.</span></div>
          <div class="tsc-integrity"><strong style="color:#633806">Processing Integrity</strong> (optional)<br><span style="font-size:12px">Processing is complete, valid, accurate, and authorized. Key for payment and financial systems.</span></div>
          <div class="tsc-confidential"><strong style="color:#3C3489">Confidentiality</strong> (optional)<br><span style="font-size:12px">Confidential information is protected as committed — trade secrets, legal documents.</span></div>
          <div class="tsc-privacy"><strong style="color:#4B1528">Privacy</strong> (optional)<br><span style="font-size:12px">Personal information is handled per commitments and AICPA privacy criteria.</span></div>
        </div>
        <div class="highlight-box"><strong>Security is the only mandatory category.</strong> The other four are chosen based on what a company's services do and what customers care about. A company might cover only Security + Availability; another might cover all five.</div>`,
        quiz:{ q:"Which Trust Services Category is mandatory in every SOC 2 audit?", opts:["Availability","Privacy","Security","Confidentiality"], ans:2, explain:"Security (the Common Criteria) is the only mandatory category. The other four are optional, chosen based on the company's services and customer requirements." } },

      { title:"Security — The Foundation", tagline:"The one category every SOC 2 must include",
        body:`<p>The <span class="key-term">Security category</span> (the Common Criteria) is the mandatory foundation, evaluating whether information and systems are protected against unauthorized access, disclosure, modification, or destruction.</p>
        <div class="badge-row">
          <span class="badge badge-blue">Who can access your systems (access control)</span>
          <span class="badge badge-blue">How you detect and respond to threats</span>
          <span class="badge badge-blue">How you manage system changes safely</span>
          <span class="badge badge-blue">How you monitor for security events</span>
          <span class="badge badge-blue">Your security culture and risk assessment</span>
        </div>
        <div class="analogy-box"><strong>Foundation analogy:</strong> Security is like a building's foundation and locks — non-negotiable. Whether you also need a fireproof vault (confidentiality), 24/7 guards (availability), or perfect cameras (processing integrity) depends on the building's purpose. But no purpose justifies skipping the foundation.</div>
        <div class="highlight-box">When people say a company is "SOC 2 compliant" (there's no "certification"), they almost always mean the Security category was audited and found effective. The other four categories are supplementary. Security is based on COSO's Internal Control framework.</div>`,
        quiz:{ q:"Why is Security the mandatory foundation of every SOC 2?", opts:["It's the cheapest category to audit","Because without security controls, none of the other trust properties (availability, integrity, confidentiality, privacy) can be reliably achieved","Only financial companies need the others","GDPR requires it"], ans:1, explain:"If systems aren't protected from unauthorized access and tampering, you cannot reliably guarantee availability, integrity, confidentiality, or privacy. Security is the prerequisite for all other trust properties." } },

      { title:"Type I vs Type II Reports", tagline:"The distinction that determines how much a SOC 2 is worth",
        body:`<p>Every SOC 2 report is one of two types — and the difference matters enormously to the customers relying on it.</p>
        <div class="cheat-grid">
          <div class="cheat-pill"><strong>Type I — Point in Time</strong><span>Evaluates whether controls are <em>designed</em> appropriately as of a single date. It answers "are the right controls in place?" — but says nothing about whether they actually operate reliably over time. Faster and cheaper; often a first step.</span></div>
          <div class="cheat-pill"><strong>Type II — Over a Period</strong><span>Tests whether controls <em>operated effectively</em> over a period (typically 3–12 months). The auditor samples evidence across the window. It answers "do the controls actually work, consistently?" This is what sophisticated customers want.</span></div>
        </div>
        <div class="analogy-box"><strong>The driving-test analogy:</strong> Type I is like checking that a car has working brakes, lights, and seatbelts on inspection day. Type II is like watching the driver operate safely over many months. The second tells you far more about real-world reliability.</div>
        <div class="highlight-box">Most enterprise customers require a <strong>Type II</strong> report. Companies often start with a Type I to demonstrate readiness, then complete a Type II covering the following 6–12 month observation period.</div>`,
        quiz:{ q:"What is the difference between a SOC 2 Type I and Type II report?", opts:["There is no difference","Type I assesses whether controls are designed appropriately at a point in time; Type II tests whether they operated effectively over a period (often 6–12 months)","Type II is cheaper and weaker","Type I is only for banks"], ans:1, explain:"Type I evaluates control design at a single date; Type II tests operating effectiveness over a period, sampling evidence across the window — which is why enterprise customers prefer Type II." } }
    ]
  });

  F.push({ id:"hitrust", name:"HITRUST CSF", subtitle:"Common Security Framework",
    category:"Privacy & Industry Regulations", color:"#b0512a", lessonsTotal:30, source:"HITRUST/hitrust_30day_curriculum.html",
    desc:"A certifiable framework that harmonizes HIPAA, ISO, NIST, and PCI into one assessment.",
    days:[
      { title:"What Is HITRUST?", tagline:"The gold standard for healthcare security assurance",
        body:`<p><span class="key-term">HITRUST</span> (Health Information Trust Alliance), founded in 2007, created the <span class="key-term">HITRUST CSF</span> — the Common Security Framework — a certifiable security and privacy framework that has become the most widely adopted security certification in US healthcare.</p>
        <div class="analogy-box"><strong>Real-world analogy:</strong> Think of HITRUST CSF like the UL mark on electrical products. When you see it, you know the product has been independently tested and certified — you don't need to test it yourself. HITRUST does the same for an organization's security: one independent certification that says "these controls have been rigorously tested and verified."</div>
        <div class="highlight-box">It's a <strong>harmonized framework</strong> — it integrates requirements from HIPAA, ISO 27001, NIST, PCI DSS, SOC 2, and dozens of other sources into one unified set of controls, so a single HITRUST assessment can satisfy many frameworks at once. Voluntary, but effectively a market requirement in healthcare.</div>`,
        quiz:{ q:"What does HITRUST CSF stand for?", opts:["Health IT Security Testing Common Standards Framework","Health Information Trust Alliance — Common Security Framework","Healthcare IT Systems Trust and Compliance Framework","Health Information Technology Security and Trust Framework"], ans:1, explain:"HITRUST is the organization (Health Information Trust Alliance); CSF is the Common Security Framework. Founded in 2007, it's the most widely adopted security certification in US healthcare." } },

      { title:"Why Was HITRUST Created?", tagline:"The audit-fatigue problem that demanded a unified solution",
        body:`<p>Before HITRUST, US healthcare was drowning in security assessments — <span class="key-term">audit fatigue</span>.</p>
        <div class="highlight-box"><strong>The problem:</strong> a healthcare IT vendor serving multiple hospital systems might receive 30–40 different security questionnaires a year — each customer asking slightly different questions, requiring different documentation. Vendors spent more time answering questionnaires than improving security, and hospitals couldn't compare answers consistently.</div>
        <div class="badge-row">
          <span class="badge badge-coral">HIPAA Privacy &amp; Security Rules</span><span class="badge badge-coral">PCI DSS for billing</span><span class="badge badge-coral">ISO 27001 from partners</span><span class="badge badge-coral">State privacy laws</span><span class="badge badge-coral">NIST guidelines</span><span class="badge badge-coral">Cyber-insurance requirements</span><span class="badge badge-coral">Hospital questionnaires</span>
        </div>
        <div class="analogy-box"><strong>The fragmentation problem:</strong> imagine if every US state had different driver's-license requirements and traffic laws — driving across state lines would be chaos. Healthcare security before HITRUST was exactly that chaotic. HITRUST created the equivalent of one unified license: one standard, one assessment, one trusted result.</div>`,

<script>
/* To enable real cross-device accounts, create a free Supabase project and paste your
   Project URL and anon key below. Leave blank to use built-in local accounts (no backend). */
window.GRC_CONFIG = {
  supabaseUrl: "",      // e.g. "https://xxxx.supabase.co"
  supabaseAnonKey: "",  // e.g. "eyJhbGciOi..."
  appName: "GRC Academy"
};
</script>

<!-- ============ APPLICATION ============ -->
<script>
(function(){
  "use strict";
  const FRAMEWORKS = window.FRAMEWORKS || [];
  const CFG = window.GRC_CONFIG || {};
  const APP = document.getElementById('app');

  /* ---------- safe storage (degrades to memory if blocked, e.g. sandboxed preview) ---------- */
  const mem = {};
  const store = {
    get(k){ try{ return localStorage.getItem(k); }catch(e){ return mem[k] ?? null; } },
    set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ mem[k]=v; } },
    del(k){ try{ localStorage.removeItem(k); }catch(e){ delete mem[k]; } }
  };

  /* ---------- tiny crypto for local password hashing ---------- */
  async function hash(text){
    try{
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
    }catch(e){ // fallback (non-secure) if subtle crypto unavailable
      let h=0; for(let i=0;i<text.length;i++){ h=(h*31+text.charCodeAt(i))|0; } return 'fb'+(h>>>0).toString(16);
    }
  }

  /* ---------- local "backend" ---------- */
  const Users = {
    all(){ try{ return JSON.parse(store.get('grc_users')||'{}'); }catch(e){ return {}; } },
    save(o){ store.set('grc_users', JSON.stringify(o)); },
    async register(name,email,pw){
      const users = this.all(); const key = email.toLowerCase().trim();
      if(!name||!email||!pw) throw new Error('All fields are required.');
      if(pw.length<6) throw new Error('Password must be at least 6 characters.');
      if(users[key]) throw new Error('An account with this email already exists.');
      users[key] = { name:name.trim(), email:key, pw:await hash(pw), created:Date.now(), progress:{} };
      this.save(users); return users[key];
    },
    async login(email,pw){
      const users = this.all(); const key = email.toLowerCase().trim();
      const u = users[key];
      if(!u || u.pw !== await hash(pw)) throw new Error('Incorrect email or password.');
      return u;
    }
  };

  /* ---------- session + progress ---------- */
  let session = null;
  function loadSession(){ try{ session = JSON.parse(store.get('grc_session')||'null'); }catch(e){ session=null; } }
  function setSession(email){ session = email ? {email} : null; if(email) store.set('grc_session',JSON.stringify(session)); else store.del('grc_session'); }
  function currentUser(){ if(!session) return null; return Users.all()[session.email] || null; }
  function getProgress(fwId){ const u=currentUser(); return (u && u.progress && u.progress[fwId]) || {done:[]}; }
  function setDayComplete(fwId, dayIdx, complete){
    const users = Users.all(); const u = users[session.email]; if(!u) return;
    u.progress = u.progress || {}; u.progress[fwId] = u.progress[fwId] || {done:[]};
    const set = new Set(u.progress[fwId].done);
    complete ? set.add(dayIdx) : set.delete(dayIdx);
    u.progress[fwId].done = [...set].sort((a,b)=>a-b);
    Users.save(users);
  }

  /* ---------- helpers ---------- */
  const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const initials = n => (n||'?').split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
  function fwTotal(fw){ return Math.max(fw.lessonsTotal||0, fw.days.length); }
  function fwProgressPct(fw){ const d=getProgress(fw.id).done.length; const t=fwTotal(fw); return t?Math.round(d/t*100):0; }
  function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }

  /* ---------- ROUTER ---------- */
  let route = {view:'landing'};
  function go(v, extra){ route = Object.assign({view:v}, extra||{}); window.scrollTo(0,0); render(); }

  /* ---------- TOP BAR ---------- */
  function appbar(){
    const u = currentUser();
    return `<div class="appbar"><div class="appbar-inner">
      <div class="brand" onclick="GRC.nav('${u?'dashboard':'landing'}')">
        <div class="brand-mark">G</div>
        <div>${esc(CFG.appName||'GRC Academy')}<small>Framework Training</small></div>
      </div>
      <div class="spacer"></div>
      ${u ? `<div class="user-chip"><span class="uname">${esc(u.name)}</span><div class="avatar">${initials(u.name)}</div></div>
             <button class="btn btn-ghost btn-sm" onclick="GRC.logout()">Sign out</button>`
          : `<button class="btn btn-ghost btn-sm" onclick="GRC.nav('auth')">Sign in</button>
             <button class="btn btn-primary btn-sm" onclick="GRC.nav('auth',{tab:'register'})">Get started</button>`}
    </div></div>`;
  }

  /* ---------- LANDING ---------- */
  function landing(){
    const total = FRAMEWORKS.length;
    const lessons = FRAMEWORKS.reduce((s,f)=>s+(f.lessonsTotal||f.days.length),0);
    return `${appbar()}
    <div class="view">
      <div class="hero">
        <span class="eyebrow">For directors &amp; senior leadership</span>
        <h1>Understand the frameworks that <span class="grad">govern your business</span>—without the jargon.</h1>
        <p class="lead">Plain-English training on ${total} essential IT, cybersecurity, privacy, and AI governance frameworks. Built for executives who need the strategic picture, not the technical weeds.</p>
        <div class="hero-cta">
          <button class="btn btn-primary" onclick="GRC.nav('auth',{tab:'register'})">Create free account</button>
          <button class="btn btn-ghost" onclick="GRC.nav('auth')">Sign in</button>
        </div>
        <div class="trust-row">
          <div><b>${total}</b> frameworks</div>
          <div><b>${lessons}+</b> bite-size lessons</div>
          <div><b>100%</b> executive-friendly</div>
        </div>
      </div>
      <div class="feature-grid">
        <div class="feature"><div class="ficon">◷</div><h3>Five minutes a day</h3><p>Each framework is broken into short, daily lessons with real-world analogies — designed to fit a busy executive calendar.</p></div>
        <div class="feature"><div class="ficon">◎</div><h3>No technical background needed</h3><p>Every concept is explained the way you'd brief a board: clear language, business context, and why it matters to you.</p></div>
        <div class="feature"><div class="ficon">◔</div><h3>Track your progress</h3><p>Sign in to save where you left off across every framework, on any device. Pick up exactly where you stopped.</p></div>
        <div class="feature"><div class="ficon">✓</div><h3>Check your understanding</h3><p>A quick knowledge check at the end of each lesson reinforces the one idea that matters most.</p></div>
      </div>
    </div>${footer()}`;
  }

  /* ---------- AUTH ---------- */
  function auth(){
    const tab = route.tab==='register'?'register':'login';
    return `${appbar()}<div class="view"><div class="auth-wrap"><div class="auth-card">
      <h2>${tab==='login'?'Welcome back':'Create your account'}</h2>
      <div class="sub">${tab==='login'?'Sign in to continue your training.':'Start learning in under a minute. No credit card.'}</div>
      <div class="tabs">
        <button class="${tab==='login'?'active':''}" onclick="GRC.nav('auth',{tab:'login'})">Sign in</button>
        <button class="${tab==='register'?'active':''}" onclick="GRC.nav('auth',{tab:'register'})">Register</button>
      </div>
      <div id="form-error"></div>
      <form onsubmit="return GRC.submitAuth(event,'${tab}')">
        ${tab==='register'?`<div class="field"><label>Full name</label><input name="name" autocomplete="name" placeholder="Jane Director"></div>`:''}
        <div class="field"><label>Email</label><input name="email" type="email" autocomplete="email" placeholder="you@company.com"></div>
        <div class="field"><label>Password</label><input name="pw" type="password" autocomplete="${tab==='login'?'current-password':'new-password'}" placeholder="${tab==='register'?'At least 6 characters':'Your password'}"></div>
        <button class="btn btn-primary btn-block" type="submit">${tab==='login'?'Sign in':'Create account'}</button>
      </form>
      <p class="auth-note">${CFG.supabaseUrl?'Secured by Supabase cloud accounts.':'Accounts are stored privately in your browser for this demo. Enable cloud sync in deployment to use any device.'}</p>
    </div></div></div>`;
  }

  /* ---------- DASHBOARD ---------- */
  function dashboard(){
    const u = currentUser();
    const started = FRAMEWORKS.filter(f=>getProgress(f.id).done.length>0).length;
    const lessonsDone = FRAMEWORKS.reduce((s,f)=>s+getProgress(f.id).done.length,0);
    const completed = FRAMEWORKS.filter(f=>fwProgressPct(f)===100).length;

    const cats = [...new Set(FRAMEWORKS.map(f=>f.category))];
    let blocks = '';
    cats.forEach(cat=>{
      const items = FRAMEWORKS.filter(f=>f.category===cat);
      blocks += `<div class="cat-block">
        <div class="cat-head"><h2>${esc(cat)}</h2><span class="count">${items.length}</span><div class="rule"></div></div>
        <div class="card-grid">${items.map(card).join('')}</div></div>`;
    });

    return `${appbar()}<div class="view">
      <div class="dash-head">
        <div><h1>Welcome back, ${esc((u.name||'').split(' ')[0])}.</h1>
        <p>Your governance, risk &amp; compliance learning library.</p></div>
        <button class="btn btn-ghost btn-sm" onclick="GRC.resume()">↻ Resume last lesson</button>
      </div>
      <div class="stat-band">
        <div class="stat"><div class="k">Frameworks started</div><div class="v">${started}<small> / ${FRAMEWORKS.length}</small></div></div>
        <div class="stat"><div class="k">Lessons completed</div><div class="v">${lessonsDone}</div></div>
        <div class="stat"><div class="k">Frameworks finished</div><div class="v">${completed}</div></div>
      </div>
      ${blocks}
    </div>${footer()}`;
  }

  function card(fw){
    const pct = fwProgressPct(fw);
    const done = getProgress(fw.id).done.length;
    const partial = fw.days.some(d=>d._partial);
    const ribbon = pct===100 ? `<span class="ribbon done">Completed</span>`
                  : (!partial ? `<span class="ribbon full">Full course</span>`:'');
    return `<div class="fw-card" onclick="GRC.open('${fw.id}')">
      ${ribbon}
      <div class="fw-top">
        <div class="fw-badge" style="background:${fw.color}">${esc(abbrev(fw.name))}</div>
        <div><h3>${esc(fw.name)}</h3><div class="fw-cat">${esc(fw.subtitle||'')}</div></div>
      </div>
      <div class="fw-desc">${esc(fw.desc)}</div>
      <div class="fw-foot">
        <div class="fw-meta"><span>${done} / ${fwTotal(fw)} lessons</span><span>${pct}%</span></div>
        <div class="pbar"><i style="width:${pct}%"></i></div>
      </div>
    </div>`;
  }
  function abbrev(name){
    const m = name.replace('ISO/IEC','ISO').match(/[A-Z]+/g);
    if(/^\d/.test(name)) return name.slice(0,3);
    const letters = (name.match(/[A-Z0-9]/g)||[]).join('');
    return letters.slice(0,4) || name.slice(0,3).toUpperCase();
  }

  /* ---------- MODULE VIEWER ---------- */
  function module(){
    const fw = FRAMEWORKS.find(f=>f.id===route.fw); if(!fw) return dashboard();
    const dayIdx = Math.min(route.day||0, fw.days.length-1);
    const day = fw.days[dayIdx];
    const prog = getProgress(fw.id);
    const isDone = prog.done.includes(dayIdx);
    const pct = fwProgressPct(fw);

    const pips = fw.days.map((d,i)=>{
      const c = prog.done.includes(i)?'complete':''; const a = i===dayIdx?'active':'';
      return `<button class="day-pip ${c} ${a}" onclick="GRC.open('${fw.id}',${i})" title="${esc(d.title)}">${i+1}</button>`;
    }).join('');

    const q = day.quiz;
    const quizHtml = q ? `<div class="quiz" id="quiz">
      <div class="qlabel">Knowledge check</div>
      <div class="q">${esc(q.q)}</div>
      ${q.opts.map((o,i)=>`<button class="opt" data-i="${i}" onclick="GRC.answer(${i},${q.ans})">${esc(o)}</button>`).join('')}
      <div class="explain" id="explain"><b>${'Explanation: '}</b>${esc(q.explain)}</div>
    </div>`:'';

    const importNote = day._partial ? `<div class="import-note"><b>Preview lesson.</b> This is the executive overview for ${esc(fw.name)}. The complete ${fw.lessonsTotal}-lesson curriculum imports automatically from your source file via <code>scripts/build-frameworks.js</code> — or ask to have it added directly.</div>`:'';

    return `${appbar()}<div class="view view-narrow">
      <div class="mod-bar">
        <button class="btn btn-ghost btn-sm" onclick="GRC.nav('dashboard')">← Library</button>
        <div class="mod-title"><h1>${esc(fw.name)}</h1><p>${esc(fw.subtitle||'')}</p></div>
        <div class="spacer"></div>
        <div class="mod-prog"><div class="pbar"><i style="width:${pct}%"></i></div><span>${pct}%</span></div>
      </div>
      <div class="day-grid">${pips}</div>
      <div class="lesson-card">
        <div class="lesson-head">
          <div class="day-badge"><b>${dayIdx+1}</b><span>Lesson</span></div>
          <div><h2>${esc(day.title)}</h2><div class="tagline">${esc(day.tagline||'')}</div></div>
        </div>
        <div class="lesson-body">${day.body}</div>
        ${quizHtml}
        ${importNote}
        <div class="lesson-foot">
          <label class="complete-toggle" onclick="GRC.toggleDone('${fw.id}',${dayIdx})">
            <span class="check ${isDone?'on':''}" id="chk">${isDone?'✓':''}</span> Mark this lesson complete
          </label>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost btn-sm" ${dayIdx===0?'disabled':''} onclick="GRC.open('${fw.id}',${dayIdx-1})">← Prev</button>
            <button class="btn btn-primary btn-sm" ${dayIdx===fw.days.length-1?'disabled':''} onclick="GRC.next('${fw.id}',${dayIdx})">Next →</button>
          </div>
        </div>
      </div>
    </div>${footer()}`;
  }

  function footer(){ return `<footer class="site"><div class="inner">
    <div>${esc(CFG.appName||'GRC Academy')} · Executive framework training</div>
    <div>Content for educational use · Built for director-level learners</div>
  </div></footer>`; }

  /* ---------- RENDER ---------- */
  function render(){
    if((route.view==='dashboard'||route.view==='module') && !currentUser()){ route.view='auth'; }
    let html='';
    switch(route.view){
      case 'auth': html=auth(); break;
      case 'dashboard': html=dashboard(); break;
      case 'module': html=module(); break;
      default: html=landing();
    }
    APP.innerHTML = html;
    const f = document.querySelector('input[name]'); if(route.view==='auth' && f) f.focus();
  }

  /* ---------- PUBLIC ACTIONS ---------- */
  window.GRC = {
    nav:(v,extra)=>go(v,extra),
    open:(fwId,day=0)=>go('module',{fw:fwId,day}),
    next:(fwId,day)=>go('module',{fw:fwId,day:day+1}),
    logout:()=>{ setSession(null); go('landing'); },
    resume:()=>{ const last=store.get('grc_last'); if(last){ const[fw,day]=last.split('|'); go('module',{fw,day:+day}); } else toast('Open any framework to begin.'); },
    async submitAuth(e,tab){
      e.preventDefault();
      const fd = new FormData(e.target);
      const errBox = document.getElementById('form-error');
      try{
        let u;
        if(tab==='register'){ u = await Users.register(fd.get('name'),fd.get('email'),fd.get('pw')); }
        else { u = await Users.login(fd.get('email'),fd.get('pw')); }
        setSession(u.email); toast(tab==='register'?'Account created — welcome!':'Signed in.'); go('dashboard');
      }catch(err){ errBox.innerHTML = `<div class="form-error">${esc(err.message)}</div>`; }
      return false;
    },
    toggleDone(fwId,dayIdx){
      const now = !getProgress(fwId).done.includes(dayIdx);
      setDayComplete(fwId,dayIdx,now);
      const chk=document.getElementById('chk'); if(chk){ chk.classList.toggle('on',now); chk.textContent=now?'✓':''; }
      // refresh progress bar + pip
      go('module',{fw:fwId,day:dayIdx});
      if(now) toast('Progress saved.');
    },
    answer(i,correct){
      const opts=document.querySelectorAll('#quiz .opt');
      opts.forEach(o=>o.disabled=true);
      opts[i].classList.add(i===correct?'correct':'wrong');
      if(i!==correct) opts[correct].classList.add('correct');
      document.getElementById('explain').classList.add('show');
    }
  };

  /* track last opened lesson */
  const _open = window.GRC.open;
  window.GRC.open = (fwId,day=0)=>{ store.set('grc_last', fwId+'|'+day); _open(fwId,day); };

  /* ---------- BOOT ---------- */
  loadSession();
  go(currentUser()?'dashboard':'landing');
})();
</script>
</body>
